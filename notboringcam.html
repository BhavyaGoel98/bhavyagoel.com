<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<title>NOT BORING — Camera</title>
<style>
  /* ============================================================
     TOKENS
  ============================================================ */
  :root{
    --bg:#000000;
    --fg:#ffffff;
    --accent:#D7FF1A;        /* radioactive yellow */
    --accent-dim:rgba(215,255,26,0.28);
    --accent-ink:#0a0a00;
    --grey:#2a2a2a;
    --grey-light:#555555;
    --frame:6px;
    --safe-t:env(safe-area-inset-top,0px);
    --safe-b:env(safe-area-inset-bottom,0px);
    --font: 'Arial Black', 'Helvetica Neue', system-ui, -apple-system, sans-serif;
  }

  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; -webkit-user-select:none;}

  html,body{
    margin:0; padding:0; width:100%; height:100%;
    background:var(--bg); color:var(--fg);
    font-family:var(--font);
    overflow:hidden;
    overscroll-behavior:none;
    touch-action:none;
    position:fixed; inset:0;
  }

  #app{
    position:fixed; inset:0;
    height:100vh; height:100dvh;
    display:flex; flex-direction:column;
    background:var(--bg);
    padding-top:var(--safe-t);
    padding-bottom:var(--safe-b);
  }

  button{
    font-family:var(--font);
    background:none; border:none; color:var(--fg);
    cursor:pointer; padding:0; margin:0;
  }

  .mono-tight{ letter-spacing:-0.02em; }

  /* ============================================================
     TOP BAR
  ============================================================ */
  #topbar{
    flex:0 0 auto;
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 16px 10px;
    border-bottom:var(--frame) solid var(--fg);
  }
  .top-block{ display:flex; flex-direction:column; align-items:flex-start; min-width:62px; }
  .top-label{ font-size:9px; letter-spacing:0.18em; color:var(--grey-light); font-weight:900; }
  .top-value{ font-size:16px; font-weight:900; letter-spacing:-0.01em; }
  #isoBlock{ align-items:flex-start; }
  #aspectBtn{ align-items:flex-start; }
  #aspectBtn .top-value{ color:var(--accent); }
  #aspectBtn:active{ transform:scale(0.92); }

  #flipBtn{
    width:44px; height:44px; border-radius:50%;
    border:3px solid var(--fg);
    display:flex; align-items:center; justify-content:center;
    transition:transform .12s ease, background .12s ease;
  }
  #flipBtn svg{ width:20px; height:20px; }
  #flipBtn.pressed{ background:var(--fg); transform:scale(0.88); }
  #flipBtn.pressed svg{ fill:var(--bg); stroke:var(--bg); }

  /* ============================================================
     VIEWFINDER
  ============================================================ */
  #viewfinderWrap{
    flex:1 1 auto;
    display:flex; align-items:center; justify-content:center;
    overflow:hidden; position:relative;
    background:#000;
  }
  #viewfinder{
    position:relative;
    width:100%;
    max-height:100%;
    overflow:hidden;
    border:var(--frame) solid var(--fg);
    background:#070707;
    transition:aspect-ratio .25s cubic-bezier(.2,.8,.2,1);
  }
  #viewfinder[data-ar="1"]{ aspect-ratio:1/1; }
  #viewfinder[data-ar="43"]{ aspect-ratio:3/4; }
  #viewfinder[data-ar="169"]{ aspect-ratio:9/16; }

  #video{
    width:100%; height:100%; object-fit:cover;
    display:block; background:#000;
    transform:scaleX(1);
  }
  #video.mirror{ transform:scaleX(-1); }

  #processCanvas{ display:none; }

  .corner-tick{
    position:absolute; width:18px; height:18px; pointer-events:none;
    border-color:var(--accent); opacity:.9;
  }
  .corner-tick.tl{ top:10px; left:10px; border-top:3px solid var(--accent); border-left:3px solid var(--accent); }
  .corner-tick.tr{ top:10px; right:10px; border-top:3px solid var(--accent); border-right:3px solid var(--accent); }
  .corner-tick.bl{ bottom:10px; left:10px; border-bottom:3px solid var(--accent); border-left:3px solid var(--accent); }
  .corner-tick.br{ bottom:10px; right:10px; border-bottom:3px solid var(--accent); border-right:3px solid var(--accent); }

  #recDot{
    position:absolute; top:14px; left:50%; transform:translateX(-50%);
    display:flex; align-items:center; gap:6px;
    font-size:10px; font-weight:900; letter-spacing:.18em; color:var(--accent);
    opacity:0; transition:opacity .15s ease;
  }
  #recDot.show{ opacity:1; }
  #recDot .pip{ width:7px; height:7px; border-radius:50%; background:var(--accent); }

  #developingLabel{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    background:rgba(0,0,0,0.55); color:var(--accent);
    font-size:13px; font-weight:900; letter-spacing:.25em;
    opacity:0; pointer-events:none; transition:opacity .12s ease;
    z-index:5;
  }
  #developingLabel.show{ opacity:1; }

  /* flash */
  #flash{
    position:absolute; inset:0; background:#fff; opacity:0; pointer-events:none;
    z-index:20;
  }
  #flash.go{ animation:flashpop .18s ease forwards; }
  @keyframes flashpop{ 0%{opacity:0.95;} 100%{opacity:0;} }

  /* ============================================================
     BOTTOM CONTROLS
  ============================================================ */
  #bottombar{
    flex:0 0 auto;
    border-top:var(--frame) solid var(--fg);
    padding:10px 0 calc(16px + var(--safe-b)*0);
    display:flex; flex-direction:column; gap:10px;
  }

  /* --- profile wheel --- */
  #wheelWrap{
    position:relative; height:54px; overflow:hidden;
    border-bottom:2px solid var(--grey);
  }
  #wheelTrack{
    position:absolute; top:0; left:50%; height:100%;
    display:flex; align-items:center;
    will-change:transform;
  }
  .wheel-item{
    flex:0 0 auto;
    width:140px;
    display:flex; align-items:center; justify-content:center;
    font-size:13px; font-weight:900; letter-spacing:.12em;
    color:var(--grey-light);
    transform:scale(0.82);
    transition:color .15s ease, transform .15s ease, opacity .15s ease;
    opacity:.55;
  }
  .wheel-item.active{
    color:var(--accent);
    transform:scale(1.08);
    opacity:1;
  }
  #wheelCenterMark{
    position:absolute; left:50%; top:0; bottom:0; width:2px;
    background:transparent;
    transform:translateX(-50%);
    pointer-events:none;
  }
  #wheelCenterMark::before, #wheelCenterMark::after{
    content:""; position:absolute; left:-9px; width:0; height:0;
  }
  #wheelCenterMark::before{
    top:0; border-left:5px solid transparent; border-right:5px solid transparent;
    border-top:6px solid var(--accent);
  }
  #wheelCenterMark::after{
    bottom:0; border-left:5px solid transparent; border-right:5px solid transparent;
    border-bottom:6px solid var(--accent);
  }

  /* --- shutter row --- */
  #shutterRow{
    display:flex; align-items:center; justify-content:space-between;
    padding:4px 26px 0;
  }

  #galleryThumb{
    width:48px; height:48px; border:3px solid var(--fg);
    overflow:hidden; position:relative; background:var(--grey);
    flex:0 0 auto;
    transition:transform .1s ease;
  }
  #galleryThumb img{ width:100%; height:100%; object-fit:cover; display:block; }
  #galleryThumb .empty-icon{ width:100%; height:100%; display:flex; align-items:center; justify-content:center; }
  #galleryThumb .empty-icon svg{ width:18px; height:18px; opacity:.5; }
  #galleryThumb.pressed{ transform:scale(0.88); }

  #shutterBtn{
    width:78px; height:78px; border-radius:50%;
    border:5px solid var(--fg);
    display:flex; align-items:center; justify-content:center;
    flex:0 0 auto;
    position:relative;
    transition:transform .08s ease;
  }
  #shutterBtn::before{
    content:""; position:absolute; inset:7px; border-radius:50%;
    background:var(--fg);
    transition:background .08s ease, transform .08s ease;
  }
  #shutterBtn.pressed{ transform:scale(0.9); }
  #shutterBtn.pressed::before{ background:var(--accent); transform:scale(0.9); }

  #aspectMiniBtn{
    width:48px; height:48px; border:3px solid var(--fg);
    display:flex; align-items:center; justify-content:center;
    flex-direction:column; gap:1px;
    flex:0 0 auto;
    font-size:9px; font-weight:900; letter-spacing:.05em;
    transition:transform .1s ease, background .1s ease;
  }
  #aspectMiniBtn small{ font-size:7px; color:var(--grey-light); letter-spacing:.1em; }
  #aspectMiniBtn.pressed{ background:var(--fg); color:var(--bg); transform:scale(0.88); }
  #aspectMiniBtn.pressed small{ color:var(--bg); }

  /* ============================================================
     PRINT PREVIEW (polaroid slide-up)
  ============================================================ */
  #printOverlay{
    position:fixed; inset:0; z-index:40;
    display:flex; align-items:center; justify-content:center;
    background:rgba(0,0,0,0);
    pointer-events:none;
    transition:background .25s ease;
  }
  #printOverlay.show{ background:rgba(0,0,0,0.78); pointer-events:auto; }
  #printCard{
    width:78%; max-width:360px;
    background:#fff; padding:14px 14px 36px;
    transform:translateY(120%) rotate(-1.5deg);
    transition:transform .42s cubic-bezier(.17,.84,.32,1.05);
    box-shadow:0 30px 60px rgba(0,0,0,0.6);
  }
  #printOverlay.show #printCard{ transform:translateY(0) rotate(-1.5deg); }
  #printCard img{ width:100%; display:block; background:#111; }
  #printCard .cap{
    margin-top:10px; text-align:center; font-size:10px; font-weight:900;
    letter-spacing:.18em; color:#111;
  }

  /* ============================================================
     LIGHTBOX
  ============================================================ */
  #lightbox{
    position:fixed; inset:0; z-index:45; background:#000;
    display:none; align-items:center; justify-content:center;
    flex-direction:column;
  }
  #lightbox.show{ display:flex; }
  #lightbox img{ max-width:92%; max-height:78%; object-fit:contain; border:var(--frame) solid var(--fg); }
  #lightboxClose{
    position:absolute; top:calc(18px + var(--safe-t)); right:18px;
    width:40px; height:40px; border:3px solid var(--fg); border-radius:50%;
    display:flex; align-items:center; justify-content:center;
  }
  #lightboxClose svg{ width:16px; height:16px; }
  #lightboxHint{ margin-top:18px; font-size:10px; letter-spacing:.2em; color:var(--grey-light); font-weight:900; }

  /* ============================================================
     PERMISSION OVERLAY
  ============================================================ */
  #permOverlay{
    position:fixed; inset:0; z-index:50; background:#000;
    display:none; align-items:center; justify-content:center; flex-direction:column;
    padding:32px; text-align:center;
  }
  #permOverlay.show{ display:flex; }
  #permOverlay svg{ width:64px; height:64px; margin-bottom:22px; }
  #permOverlay h1{ font-size:20px; letter-spacing:-0.02em; margin:0 0 14px; font-weight:900; }
  #permOverlay p{ font-size:13px; line-height:1.6; color:#bdbdbd; max-width:320px; margin:0 0 8px; font-weight:400; }
  #permOverlay .steps{ text-align:left; max-width:300px; margin:14px 0 26px; }
  #permOverlay .steps div{ font-size:12px; line-height:1.8; color:#999; }
  #permOverlay .steps b{ color:var(--accent); }
  #retryBtn{
    border:3px solid var(--accent); color:var(--accent);
    padding:14px 34px; font-weight:900; letter-spacing:.12em; font-size:13px;
    transition:transform .1s ease, background .1s ease, color .1s ease;
  }
  #retryBtn.pressed{ background:var(--accent); color:var(--accent-ink); transform:scale(0.94); }

  /* ============================================================
     MISC
  ============================================================ */
  .hidden{ display:none !important; }
</style>
</head>
<body>

<div id="app">

  <!-- TOP BAR -->
  <div id="topbar">
    <div class="top-block" id="isoBlock">
      <span class="top-label">ISO</span>
      <span class="top-value mono-tight" id="isoValue">200</span>
    </div>

    <button class="top-block" id="aspectBtn" aria-label="Cycle aspect ratio">
      <span class="top-label">FRAME</span>
      <span class="top-value mono-tight" id="aspectValueTop">1:1</span>
    </button>

    <button id="flipBtn" aria-label="Flip camera">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17 2l4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/>
        <path d="M7 22l-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>
      </svg>
    </button>
  </div>

  <!-- VIEWFINDER -->
  <div id="viewfinderWrap">
    <div id="viewfinder" data-ar="1">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="processCanvas"></canvas>

      <div class="corner-tick tl"></div>
      <div class="corner-tick tr"></div>
      <div class="corner-tick bl"></div>
      <div class="corner-tick br"></div>

      <div id="recDot"><span class="pip"></span>LIVE</div>
      <div id="developingLabel">DEVELOPING…</div>
      <div id="flash"></div>
    </div>
  </div>

  <!-- BOTTOM BAR -->
  <div id="bottombar">

    <div id="wheelWrap">
      <div id="wheelTrack"></div>
      <div id="wheelCenterMark"></div>
    </div>

    <div id="shutterRow">
      <button id="galleryThumb" aria-label="Last photo">
        <span class="empty-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="1"/><circle cx="9" cy="9" r="2"/><path d="M21 15l-5-5L5 21"/>
          </svg>
        </span>
      </button>

      <button id="shutterBtn" aria-label="Take photo"></button>

      <button id="aspectMiniBtn" aria-label="Cycle aspect ratio">
        <span id="aspectMiniIcon">▭</span>
        <small id="aspectValueBottom">1:1</small>
      </button>
    </div>
  </div>
</div>

<!-- PRINT PREVIEW -->
<div id="printOverlay">
  <div id="printCard">
    <img id="printImg" alt="Captured photo">
    <div class="cap" id="printCap">RAW 01 — ISO 200</div>
  </div>
</div>

<!-- LIGHTBOX -->
<div id="lightbox">
  <button id="lightboxClose" aria-label="Close">
    <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
  </button>
  <img id="lightboxImg" alt="Last capture">
  <div id="lightboxHint">TAP ANYWHERE TO CLOSE</div>
</div>

<!-- PERMISSION OVERLAY -->
<div id="permOverlay">
  <svg viewBox="0 0 24 24" fill="none" stroke="#D7FF1A" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
    <circle cx="12" cy="13" r="4"/>
    <path d="M2 2l20 20" stroke="#ff3b30"/>
  </svg>
  <h1>CAMERA BLOCKED</h1>
  <p id="permMessage">We need camera access to shoot. Your browser is currently blocking it.</p>
  <div class="steps">
    <div><b>iPhone (Safari):</b> Settings → Safari → Camera → Allow</div>
    <div><b>Android (Chrome):</b> Site settings → Camera → Allow</div>
    <div>Then reload this page.</div>
  </div>
  <button id="retryBtn">TRY AGAIN</button>
</div>

<script>
(function(){
  "use strict";

  /* ============================================================
     STATE
  ============================================================ */
  const state = {
    facingMode: 'user',
    aspect: '1',          // '1' | '43' | '169'
    aspectLabel: { '1':'1:1', '43':'4:3', '169':'16:9' },
    isoByProfile: { RAW01: 200, CHROME: 320, NOIR: 800 },
    profiles: ['RAW01','CHROME','NOIR'],
    profileLabel: { RAW01:'RAW 01', CHROME:'CHROME', NOIR:'NOIR' },
    profile: 'CHROME',
    stream: null,
    lastPhotoURL: null,
    maxDim: 1280
  };

  const $ = (id) => document.getElementById(id);
  const video = $('video');
  const viewfinder = $('viewfinder');
  const isoValue = $('isoValue');
  const aspectValueTop = $('aspectValueTop');
  const aspectValueBottom = $('aspectValueBottom');
  const flipBtn = $('flipBtn');
  const aspectBtn = $('aspectBtn');
  const aspectMiniBtn = $('aspectMiniBtn');
  const shutterBtn = $('shutterBtn');
  const galleryThumb = $('galleryThumb');
  const processCanvas = $('processCanvas');
  const flashEl = $('flash');
  const developingLabel = $('developingLabel');
  const recDot = $('recDot');
  const printOverlay = $('printOverlay');
  const printImg = $('printImg');
  const printCap = $('printCap');
  const lightbox = $('lightbox');
  const lightboxImg = $('lightboxImg');
  const lightboxClose = $('lightboxClose');
  const permOverlay = $('permOverlay');
  const permMessage = $('permMessage');
  const retryBtn = $('retryBtn');
  const wheelTrack = $('wheelTrack');

  /* ============================================================
     AUDIO ENGINE — Web Audio synthesized tactile feedback
  ============================================================ */
  const Audio2 = (function(){
    let ctx = null;
    function ensure(){
      if(!ctx){
        const AC = window.AudioContext || window.webkitAudioContext;
        ctx = new AC();
      }
      if(ctx.state === 'suspended') ctx.resume();
      return ctx;
    }

    function noiseBuffer(c, dur){
      const n = c.sampleRate * dur;
      const buf = c.createBuffer(1, n, c.sampleRate);
      const d = buf.getChannelData(0);
      for(let i=0;i<n;i++) d[i] = Math.random()*2-1;
      return buf;
    }

    // short mechanical click
    function click(vol){
      const c = ensure(); const t = c.currentTime;
      vol = vol || 0.35;

      const osc = c.createOscillator();
      osc.type = 'square';
      osc.frequency.setValueAtTime(1800, t);
      osc.frequency.exponentialRampToValueAtTime(420, t+0.025);

      const g = c.createGain();
      g.gain.setValueAtTime(vol, t);
      g.gain.exponentialRampToValueAtTime(0.0001, t+0.035);

      osc.connect(g); g.connect(c.destination);
      osc.start(t); osc.stop(t+0.04);
    }

    // low thud
    function thud(vol){
      const c = ensure(); const t = c.currentTime;
      vol = vol || 0.5;

      const osc = c.createOscillator();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(150, t);
      osc.frequency.exponentialRampToValueAtTime(45, t+0.09);

      const g = c.createGain();
      g.gain.setValueAtTime(vol, t);
      g.gain.exponentialRampToValueAtTime(0.0001, t+0.13);

      osc.connect(g); g.connect(c.destination);
      osc.start(t); osc.stop(t+0.14);
    }

    // multilayer mechanical shutter snap
    function shutterSnap(){
      const c = ensure(); const t = c.currentTime;

      // layer 1: high mechanical pre-click (mirror flip)
      const o1 = c.createOscillator(); o1.type='square';
      o1.frequency.setValueAtTime(2600,t);
      o1.frequency.exponentialRampToValueAtTime(900,t+0.015);
      const g1 = c.createGain();
      g1.gain.setValueAtTime(0.28,t);
      g1.gain.exponentialRampToValueAtTime(0.0001,t+0.02);
      o1.connect(g1); g1.connect(c.destination);
      o1.start(t); o1.stop(t+0.025);

      // layer 2: noise burst (shutter curtain travel)
      const nb = noiseBuffer(c, 0.09);
      const src = c.createBufferSource(); src.buffer = nb;
      const bp = c.createBiquadFilter(); bp.type='bandpass';
      bp.frequency.value = 2200; bp.Q.value = 0.7;
      const ng = c.createGain();
      ng.gain.setValueAtTime(0.0001, t+0.012);
      ng.gain.exponentialRampToValueAtTime(0.38, t+0.02);
      ng.gain.exponentialRampToValueAtTime(0.0001, t+0.085);
      src.connect(bp); bp.connect(ng); ng.connect(c.destination);
      src.start(t+0.01); src.stop(t+0.1);

      // layer 3: low thud (shutter close / mirror return)
      const o2 = c.createOscillator(); o2.type='sine';
      o2.frequency.setValueAtTime(180, t+0.06);
      o2.frequency.exponentialRampToValueAtTime(40, t+0.16);
      const g2 = c.createGain();
      g2.gain.setValueAtTime(0.0001, t+0.06);
      g2.gain.exponentialRampToValueAtTime(0.55, t+0.075);
      g2.gain.exponentialRampToValueAtTime(0.0001, t+0.2);
      o2.connect(g2); g2.connect(c.destination);
      o2.start(t+0.06); o2.stop(t+0.21);

      // layer 4: tiny secondary click (curtain re-cock)
      const o3 = c.createOscillator(); o3.type='square';
      o3.frequency.setValueAtTime(1500, t+0.17);
      const g3 = c.createGain();
      g3.gain.setValueAtTime(0.16, t+0.17);
      g3.gain.exponentialRampToValueAtTime(0.0001, t+0.2);
      o3.connect(g3); g3.connect(c.destination);
      o3.start(t+0.17); o3.stop(t+0.21);
    }

    return { click, thud, shutterSnap, ensure };
  })();

  function vibrate(pattern){
    if(navigator.vibrate){ try{ navigator.vibrate(pattern); }catch(e){} }
  }

  // unlock audio context on first touch (mobile requirement)
  ['touchend','mousedown'].forEach(ev=>{
    document.addEventListener(ev, ()=>{ Audio2.ensure(); }, { once:true, passive:true });
  });

  /* ============================================================
     PRESS FEEDBACK helper (color invert + scale via .pressed class)
  ============================================================ */
  function wirePress(el, onRelease, sound){
    let active = false;
    const down = (e)=>{
      active = true;
      el.classList.add('pressed');
      if(sound !== false) Audio2.click(0.22);
    };
    const up = (e)=>{
      if(!active) return;
      active = false;
      el.classList.remove('pressed');
      if(typeof onRelease === 'function') onRelease(e);
    };
    el.addEventListener('pointerdown', down);
    el.addEventListener('pointerup', up);
    el.addEventListener('pointerleave', ()=>{ active=false; el.classList.remove('pressed'); });
    el.addEventListener('pointercancel', ()=>{ active=false; el.classList.remove('pressed'); });
  }

  /* ============================================================
     CAMERA
  ============================================================ */
  async function startCamera(facingMode){
    stopCamera();
    try{
      const constraints = {
        audio:false,
        video:{
          facingMode: { ideal: facingMode },
          width: { ideal: 1920 },
          height:{ ideal: 1920 }
        }
      };
      const stream = await navigator.mediaDevices.getUserMedia(constraints);
      state.stream = stream;
      video.srcObject = stream;
      video.classList.toggle('mirror', facingMode === 'user');
      await video.play().catch(()=>{});
      hidePermOverlay();
      recDot.classList.add('show');
    }catch(err){
      showPermOverlay(err);
    }
  }

  function stopCamera(){
    if(state.stream){
      state.stream.getTracks().forEach(t=>t.stop());
      state.stream = null;
    }
  }

  function showPermOverlay(err){
    recDot.classList.remove('show');
    let msg = 'We need camera access to shoot. Your browser is currently blocking it.';
    if(err && err.name === 'NotFoundError') msg = 'No camera was found on this device.';
    if(err && err.name === 'NotAllowedError') msg = 'Camera access was denied. Allow it below to keep shooting.';
    if(location.protocol === 'file:'){
      msg = 'This page was opened directly from a file, so the browser is blocking camera access for security. Host this file (even a simple local server) or open it over HTTPS, then reload.';
    }
    permMessage.textContent = msg;
    permOverlay.classList.add('show');
  }
  function hidePermOverlay(){ permOverlay.classList.remove('show'); }

  wirePress(flipBtn, ()=>{
    state.facingMode = state.facingMode === 'user' ? 'environment' : 'user';
    Audio2.thud(0.3);
    startCamera(state.facingMode);
  });

  wirePress(retryBtn, ()=>{ startCamera(state.facingMode); });

  /* ============================================================
     ASPECT RATIO
  ============================================================ */
  const aspectOrder = ['1','43','169'];
  function setAspect(ar){
    state.aspect = ar;
    viewfinder.setAttribute('data-ar', ar);
    const label = state.aspectLabel[ar];
    aspectValueTop.textContent = label;
    aspectValueBottom.textContent = label;
  }
  function cycleAspect(){
    const idx = aspectOrder.indexOf(state.aspect);
    const next = aspectOrder[(idx+1) % aspectOrder.length];
    setAspect(next);
    Audio2.click(0.3);
    vibrate(8);
  }
  wirePress(aspectBtn, cycleAspect, false);
  wirePress(aspectMiniBtn, cycleAspect, false);
  setAspect('1');

  /* ============================================================
     PROFILE WHEEL (swipeable dial)
  ============================================================ */
  const ITEM_W = 140;
  let wheelOffset = 0;        // px translateX applied to track
  let dragStartX = 0, dragStartOffset = 0, dragging = false;

  function buildWheel(){
    wheelTrack.innerHTML = '';
    state.profiles.forEach((p)=>{
      const d = document.createElement('div');
      d.className = 'wheel-item';
      d.dataset.profile = p;
      d.textContent = state.profileLabel[p];
      wheelTrack.appendChild(d);
    });
    snapToProfile(state.profile, false);
  }

  function indexForProfile(p){ return state.profiles.indexOf(p); }

  function applyWheelTransform(px, animate){
    wheelTrack.style.transition = animate ? 'transform .28s cubic-bezier(.2,.8,.2,1)' : 'none';
    wheelTrack.style.transform = 'translateX(' + px + 'px)';
  }

  function updateActiveHighlight(){
    const idx = indexForProfile(state.profile);
    [...wheelTrack.children].forEach((el,i)=>{
      el.classList.toggle('active', i === idx);
    });
  }

  function snapToProfile(p, animate){
    const idx = indexForProfile(p);
    wheelOffset = -idx * ITEM_W - ITEM_W/2;
    applyWheelTransform(wheelOffset, animate !== false);
    state.profile = p;
    updateActiveHighlight();
    updateIsoDisplay();
  }

  function updateIsoDisplay(){
    isoValue.textContent = state.isoByProfile[state.profile];
  }

  // pointer-based swipe
  wheelTrack.parentElement.addEventListener('pointerdown', (e)=>{
    dragging = true;
    dragStartX = e.clientX;
    dragStartOffset = wheelOffset;
    wheelTrack.setPointerCapture && wheelTrack.setPointerCapture(e.pointerId);
  });
  window.addEventListener('pointermove', (e)=>{
    if(!dragging) return;
    const dx = e.clientX - dragStartX;
    wheelOffset = dragStartOffset + dx;
    applyWheelTransform(wheelOffset, false);
  });
  window.addEventListener('pointerup', (e)=>{
    if(!dragging) return;
    dragging = false;
    const dx = e.clientX - dragStartX;
    const idxGuess = Math.round(-(dragStartOffset + dx + ITEM_W/2) / ITEM_W);
    const clamped = Math.max(0, Math.min(state.profiles.length-1, idxGuess));
    const changed = state.profiles[clamped] !== state.profile;
    snapToProfile(state.profiles[clamped]);
    if(changed){ Audio2.click(0.3); vibrate(6); }
    else { applyWheelTransform(wheelOffset, true); }
  });

  buildWheel();

  /* ============================================================
     IMAGE PROCESSING — "SuperRaw" film emulation
  ============================================================ */
  function clamp(v){ return v < 0 ? 0 : (v > 255 ? 255 : v); }

  function getCropRect(vw, vh, ar){
    let targetAR;
    if(ar === '1') targetAR = 1;
    else if(ar === '43') targetAR = 4/3;
    else targetAR = 16/9;

    let sw, sh;
    if(vw / vh > targetAR){
      sh = vh; sw = vh * targetAR;
    } else {
      sw = vw; sh = vw / targetAR;
    }
    const sx = (vw - sw) / 2;
    const sy = (vh - sh) / 2;
    return { sx, sy, sw, sh, targetAR };
  }

  function processFrame(ctx, w, h, profile, iso){
    const imgData = ctx.getImageData(0,0,w,h);
    const data = imgData.data;

    let contrastAmt, shadowThresh, shadowFactor, warm, grainBase, vignetteStrength, mono;
    if(profile === 'RAW01'){
      contrastAmt = 14; shadowThresh = 28; shadowFactor = 0.92; warm = 4;
      grainBase = 3.5; vignetteStrength = 0; mono = false;
    } else if(profile === 'CHROME'){
      contrastAmt = 34; shadowThresh = 46; shadowFactor = 0.8; warm = 14;
      grainBase = 6; vignetteStrength = 0.22; mono = false;
    } else { // NOIR
      contrastAmt = 46; shadowThresh = 52; shadowFactor = 0.72; warm = 0;
      grainBase = 13; vignetteStrength = 0.34; mono = true;
    }

    const cFactor = (259 * (contrastAmt + 255)) / (255 * (259 - contrastAmt));
    const grainAmp = (iso/200) * grainBase;

    const cx = w/2, cy = h/2;
    const maxDist = Math.sqrt(cx*cx + cy*cy);
    const useVignette = vignetteStrength > 0;

    for(let i=0; i<data.length; i+=4){
      let r = data[i], g = data[i+1], b = data[i+2];

      if(mono){
        const lum = 0.299*r + 0.587*g + 0.114*b;
        r = g = b = lum;
      }

      // contrast
      r = cFactor*(r-128)+128;
      g = cFactor*(g-128)+128;
      b = cFactor*(b-128)+128;

      // shadow crush
      const lum2 = 0.299*r + 0.587*g + 0.114*b;
      if(lum2 < shadowThresh){
        r *= shadowFactor; g *= shadowFactor; b *= shadowFactor;
      }

      // warm highlights
      if(warm > 0 && lum2 > 165){
        r += warm; b -= warm*0.7;
      }

      // grain (monochromatic, ISO-scaled)
      const noise = (Math.random()-0.5) * grainAmp * 2;
      r += noise; g += noise; b += noise;

      // vignette
      if(useVignette){
        const px = (i/4) % w;
        const py = Math.floor((i/4) / w);
        const dist = Math.sqrt((px-cx)*(px-cx) + (py-cy)*(py-cy));
        const f = 1 - vignetteStrength * Math.pow(dist/maxDist, 2);
        r *= f; g *= f; b *= f;
      }

      data[i]   = clamp(r);
      data[i+1] = clamp(g);
      data[i+2] = clamp(b);
    }

    ctx.putImageData(imgData, 0, 0);
  }

  /* ============================================================
     CAPTURE FLOW
  ============================================================ */
  function flashScreen(){
    flashEl.classList.remove('go');
    void flashEl.offsetWidth;
    flashEl.classList.add('go');
  }

  function triggerDownload(blob){
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const ts = new Date().toISOString().replace(/[:.]/g,'-');
    a.href = url;
    a.download = 'notboring-' + state.profileLabel[state.profile].replace(' ','') + '-' + ts + '.jpg';
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(()=>URL.revokeObjectURL(url), 5000);
  }

  function capturePhoto(){
    if(!video.videoWidth) return;

    Audio2.shutterSnap();
    vibrate([10,30,10]);
    flashScreen();
    developingLabel.classList.add('show');

    // slight delay so the shutter sound + flash register before the
    // (intentionally tactile) processing "develop" beat
    setTimeout(()=>{
      const vw = video.videoWidth, vh = video.videoHeight;
      const { sx, sy, sw, sh, targetAR } = getCropRect(vw, vh, state.aspect);

      const scale = state.maxDim / Math.max(sw, sh);
      const outW = Math.max(1, Math.round(sw*scale));
      const outH = Math.max(1, Math.round(sh*scale));

      processCanvas.width = outW;
      processCanvas.height = outH;
      const ctx = processCanvas.getContext('2d');

      ctx.save();
      if(video.classList.contains('mirror')){
        ctx.translate(outW, 0);
        ctx.scale(-1, 1);
      }
      ctx.drawImage(video, sx, sy, sw, sh, 0, 0, outW, outH);
      ctx.restore();

      const iso = state.isoByProfile[state.profile];
      processFrame(ctx, outW, outH, state.profile, iso);

      processCanvas.toBlob((blob)=>{
        developingLabel.classList.remove('show');
        if(!blob) return;

        const url = URL.createObjectURL(blob);
        if(state.lastPhotoURL) URL.revokeObjectURL(state.lastPhotoURL);
        state.lastPhotoURL = url;

        updateGalleryThumb(url);
        showPrintPreview(url);
        triggerDownload(blob);
      }, 'image/jpeg', 0.92);
    }, 90);
  }

  wirePress(shutterBtn, capturePhoto, false);

  /* ============================================================
     PRINT PREVIEW + GALLERY
  ============================================================ */
  function showPrintPreview(url){
    printImg.src = url;
    printCap.textContent = state.profileLabel[state.profile] + ' — ISO ' + state.isoByProfile[state.profile];
    printOverlay.classList.add('show');
    clearTimeout(showPrintPreview._t);
    showPrintPreview._t = setTimeout(hidePrintPreview, 2200);
  }
  function hidePrintPreview(){ printOverlay.classList.remove('show'); }
  printOverlay.addEventListener('pointerdown', hidePrintPreview);

  function updateGalleryThumb(url){
    galleryThumb.innerHTML = '<img src="' + url + '" alt="Last photo">';
  }

  wirePress(galleryThumb, ()=>{
    if(!state.lastPhotoURL) return;
    lightboxImg.src = state.lastPhotoURL;
    lightbox.classList.add('show');
  }, false);

  lightbox.addEventListener('pointerdown', ()=>{ lightbox.classList.remove('show'); });
  lightboxClose.addEventListener('pointerdown', (e)=>{ e.stopPropagation(); lightbox.classList.remove('show'); });

  /* ============================================================
     INIT
  ============================================================ */
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    showPermOverlay({ name:'Unsupported' });
    permMessage.textContent = 'This browser does not support camera access. Try the latest Safari or Chrome.';
  } else {
    startCamera(state.facingMode);
  }

  updateIsoDisplay();
  document.addEventListener('contextmenu', e=>e.preventDefault());

})();
</script>
</body>
</html>
