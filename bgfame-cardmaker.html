<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BG Fame Business Card Maker</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    :root{--bg:#111010;--s1:#1a1817;--s2:#222020;--border:rgba(201,161,46,.22);--gold:#c9a12e;--gold2:#a67c20;--gold-bright:#e8c84a;--cream:#e8e4de;--charcoal:#2a2a2a;--gold-dim:rgba(201,161,46,.1);--text:#f0ece4;--muted:rgba(240,236,228,.5);--danger:#ef4444;--success:#22c55e}
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body{min-height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}
    body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(201,161,46,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(201,161,46,.025) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0}
    body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% -5%,rgba(201,161,46,.07) 0%,transparent 65%);pointer-events:none;z-index:0}
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    .spinner{display:inline-block;width:13px;height:13px;border:2px solid rgba(245,200,66,.2);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}

    /* ── SPLASH ── */
    #splash{position:fixed;inset:0;z-index:1000;background:#0a0800;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .5s ease,transform .5s ease}
    #splash.hide{opacity:0;pointer-events:none;transform:scale(1.04)}
    .splash-logo{display:flex;flex-direction:column;align-items:center;gap:18px;animation:splashIn .7s cubic-bezier(.34,1.56,.64,1) both}
    @keyframes splashIn{from{opacity:0;transform:translateY(24px) scale(.92)}to{opacity:1;transform:translateY(0) scale(1)}}
    @keyframes splashBar{from{width:0}to{width:100%}}
    .splash-icon{width:72px;height:72px;background:linear-gradient(135deg,rgba(201,161,46,.15),rgba(42,42,42,.1));border:1px solid rgba(201,161,46,.35);border-radius:18px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
    .splash-icon::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(to right,transparent,#c9a12e,transparent)}
    .splash-wordmark{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;text-align:center;line-height:1.2}
    .splash-wordmark .w1{color:#c9a12e;font-size:18px}
    .splash-wordmark .w2{color:rgba(254,249,231,.45);font-size:11px;font-weight:500;display:block;letter-spacing:4px;text-transform:uppercase;margin-top:6px}
    .splash-bar-wrap{width:120px;height:1px;background:rgba(245,200,66,.12);border-radius:1px;overflow:hidden;margin-top:6px}
    .splash-bar{height:100%;background:linear-gradient(to right,#c9a12e,#2a2a2a);border-radius:1px;animation:splashBar 1.5s cubic-bezier(.4,0,.2,1) .3s both}
    /* ── NAV LOGO ── */
    .nav-logo-wrap{display:flex;align-items:center;gap:12px}
    .nav-logo-icon{width:54px;height:54px;background:none;border:none;overflow:hidden;border-radius:12px;flex-shrink:0}
    ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

    .navbar{height:80px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:rgba(10,8,0,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50}
    .nav-brand{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;background:linear-gradient(120deg,var(--gold),#fff8e1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .btn-back{background:transparent;border:1px solid var(--border);border-radius:7px;padding:5px 12px;color:var(--muted);font-family:inherit;font-size:12px;cursor:pointer;text-decoration:none;transition:all .2s;display:inline-flex;align-items:center;gap:5px}
    .btn-back:hover{border-color:#c9a12e;color:#e8e4de}

    .page{position:relative;z-index:1;max-width:1080px;margin:0 auto;padding:24px 18px 60px;display:grid;grid-template-columns:1fr 320px;gap:24px;align-items:start}

    /* PREVIEW AREA */
    .canvas-col{display:flex;flex-direction:column;gap:16px}
    .preview-area{background:#080600;border:1px solid var(--border);border-radius:16px;padding:28px 20px;display:flex;flex-direction:column;align-items:center;gap:16px;position:relative;overflow:hidden}
    .preview-area::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:200px;height:1px;background:linear-gradient(to right,transparent,#c9a12e,transparent)}
    .preview-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:2px}
    .side-toggle{display:flex;gap:3px;background:var(--s2);border-radius:8px;padding:3px;border:1px solid var(--border)}
    .side-btn{padding:6px 18px;border-radius:6px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .2s}
    .side-btn.active{background:var(--gold-dim);color:var(--gold);border:1px solid rgba(201,161,46,.35)}
    .biz-card{width:340px;height:194px;border-radius:10px;overflow:hidden;position:relative;box-shadow:0 20px 60px rgba(0,0,0,.9),0 0 0 1px rgba(201,161,46,.15)}

    /* ACTIONS */
    .dl-btns{display:flex;flex-direction:column;gap:7px}
    .btn-dl-png{width:100%;background:linear-gradient(135deg,#c9a12e,#2a2a2a);border:none;border-radius:10px;padding:12px;color:#000;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .2s}
    .btn-dl-png:hover{opacity:.88}
    .btn-dl-std{width:100%;background:transparent;border:1px solid var(--border);border-radius:10px;padding:10px;color:var(--text);font-family:inherit;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:all .2s}
    .btn-dl-std:hover{border-color:#c9a12e;color:#c9a12e}

    /* CONTROLS */
    .controls-col{display:flex;flex-direction:column;gap:12px}
    .ctrl-section{background:var(--s1);border:1px solid var(--border);border-radius:13px;padding:15px;position:relative;overflow:hidden}
    .ctrl-section::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(to right,transparent,rgba(201,161,46,.5),transparent)}
    .ctrl-section-title{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:#c9a12e;margin-bottom:11px;letter-spacing:.5px;text-transform:uppercase}
    .ctrl-group{display:flex;flex-direction:column;gap:4px;margin-bottom:9px}
    .ctrl-group:last-child{margin-bottom:0}
    .ctrl-label{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.8px}
    .ctrl-input{background:var(--s2);border:1px solid var(--border);border-radius:7px;padding:8px 10px;color:var(--text);font-family:inherit;font-size:12px;outline:none;resize:none;transition:border-color .2s;width:100%}
    .ctrl-input:focus{border-color:#c9a12e}
    .ctrl-input::placeholder{color:var(--muted)}

    /* THEME PICKER */
    .theme-search{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:7px;padding:7px 10px;color:var(--text);font-family:inherit;font-size:12px;outline:none;margin-bottom:8px}
    .theme-search:focus{border-color:#c9a12e}
    .theme-search::placeholder{color:var(--muted)}
    .theme-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;max-height:200px;overflow-y:auto}
    .theme-opt{border-radius:7px;overflow:hidden;border:2px solid transparent;cursor:pointer;transition:all .2s}
    .theme-opt.active{border-color:#c9a12e}
    .theme-opt:hover:not(.active){border-color:rgba(201,161,46,.4)}
    .theme-preview{height:40px;position:relative;overflow:hidden}
    .theme-opt-name{font-size:9px;font-weight:600;background:var(--s2);color:var(--muted);padding:2px 4px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .theme-opt.active .theme-opt-name{color:#c9a12e}

    /* LAYOUT PICKER */
    .layout-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
    .layout-opt{background:var(--s2);border:2px solid var(--border);border-radius:7px;padding:7px 4px;text-align:center;cursor:pointer;font-size:10px;color:var(--muted);font-weight:600;transition:all .2s}
    .layout-opt.active{border-color:#c9a12e;color:#c9a12e;background:rgba(201,161,46,.1)}
    .layout-opt:hover:not(.active){border-color:rgba(201,161,46,.35)}

    /* LOGO */
    .btn-upload{width:100%;background:var(--s2);border:1.5px dashed var(--border);border-radius:7px;padding:10px;color:var(--muted);font-family:inherit;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:all .2s}
    .btn-upload:hover{border-color:#c9a12e;color:#c9a12e}
    .logo-thumb{width:100%;height:55px;object-fit:contain;border-radius:6px;display:none;margin-bottom:5px;background:var(--s2);padding:4px}

    /* TOAST */
    #toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:10px 16px;font-size:13px;z-index:9999;opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap}
    #toast.show{transform:translateX(-50%) translateY(0);opacity:1}
    #toast.success{border-color:var(--success);color:var(--success)}
    #toast.error{border-color:var(--danger);color:var(--danger)}
    #toast.info{border-color:#c9a12e;color:#c9a12e}

    @media(max-width:768px){
      .page{grid-template-columns:1fr;padding:14px 13px 40px}
      .controls-col{order:-1}
      .biz-card{width:100%;height:auto;aspect-ratio:1.75}
    }
  </style>
</head>
