    body {

        text-transform: uppercase;

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;cursor:default;important}

      --surface:rgba(255,255,255,0.04);

      --ease:cubic-bezier(0.16,1,0.3,1);
    }
    html{scroll-behavior:smooth}
    body{background:var(--bg);color:var(--text);
         font-weight:300;min-height:100vh;overflow-x:hidden;cursor:default;important}
    a{color:inherit;text-decoration:none}


    /* ── BLOBS ── */
    .blob{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0;opacity:.12}
    .blob-1{width:450px;height:450px;background:rgba(245,158,11,0.8);top:-120px;right:-80px;animation:blobDrift1 14s ease-in-out infinite alternate}
    .blob-2{width:350px;height:350px;background:#7c3aed;bottom:-80px;left:-60px;animation:blobDrift2 18s ease-in-out infinite alternate}
    @keyframes blobDrift1{from{transform:translate(0,0)}to{transform:translate(-40px,50px) scale(1.1)}}
    @keyframes blobDrift2{from{transform:translate(0,0)}to{transform:translate(40px,-40px) scale(1.1)}}

    /* ── NOISE ── */
    body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.5;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves=[...]

    /* ── MESH ── */
    .mesh{position:fixed;inset:0;z-index:0;pointer-events:none;
      background:radial-gradient(circle at 18% 28%,rgba(245,158,11,0.055) 0%,transparent 42%),
                 radial-gradient(circle at 82% 72%,rgba(124,58,237,0.065) 0%,transparent 42%)}

    ::-webkit-scrollbar{width:3px}
    ::-webkit-scrollbar-track{background:var(--bg)}
    ::-webkit-scrollbar-thumb{background:var(--accent);border-radius:3px}

    /* ── NAV ── */
    nav{position:fixed;top:0;left:0;right:0;z-index:200;height:68px;padding:0 8%;
        display:flex;align-items:center;justify-content:space-between;
        background:rgba(5,8,16,0.75);backdrop-filter:blur(18px);
        border-bottom:1px solid var(--border);transition:box-shadow .35s}
    nav.scrolled{box-shadow:0 4px 40px rgba(0,0,0,.65)}
    .logo{font-size:1.15rem;font-weight:700;color:var(--accent)}
    .logo span{color:var(--text)}
    .nav-links{display:flex;gap:2rem;align-items:center}
    .nav-links a{color:var(--muted);font-size:.83rem;font-weight:700;
                 transition:color .25s;position:relative}
    .nav-links a::after{content:'';position:absolute;bottom:-4px;left:0;right:0;height:1px;
                        background:var(--accent);transform:scaleX(0);transform-origin:left;transition:transform .25s}
    .nav-links a:hover,.nav-links a.active{color:var(--accent)}
    .nav-links a:hover::after,.nav-links a.active::after{transform:scaleX(1)}
    .nav-cta{background:transparent !important;border:1px solid var(--border) !important;
             color:var(--accent) !important;padding:.38rem 1.1rem;border-radius:50px}
    .nav-cta:hover{background:rgba(245,158,11,0.07) !important;box-shadow:var(--glow-sm)}
    .nav-cta::after{display:none !important}

    /* ── HERO ── */
    .hero{position:relative;z-index:1;padding:9rem 5% 3.5rem;
          text-align:center;display:flex;flex-direction:column;align-items:center}
    .hero-logo{width:130px;height:130px;border-radius:50%;object-fit:cover;object-position:top;
               border:2px solid rgba(245,158,11,0.3);
               box-shadow:0 0 50px rgba(245,158,11,0.2);
               margin-bottom:1.5rem;animation:fadeUp .6s ease both}
    .eyebrow{display:inline-flex;align-items:center;gap:.5rem;font-size:.73rem;font-weight:700;
             font-family: 'Space Grotesk', sans-serif; text-transform: uppercase; letter-spacing: -1px;
             color:var(--accent);

             margin-bottom:1rem;animation:fadeUp .7s .05s ease both}

       color:#fff;animation:fadeUp .8s .1s ease both}

          margin-top:1.2rem;animation:fadeUp .8s .18s ease both}
    .tag{font-size:.73rem;padding:.3rem .85rem;border-radius:50px;
         border:1px solid var(--border);color:var(--muted)}
    .actions{display:flex;gap:1rem;margin-top:1.8rem;flex-wrap:wrap;justify-content:center;
             animation:fadeUp .8s .26s ease both}
    .btn{display:inline-flex;align-items:center;gap:.4rem;padding:.72rem 1.8rem;
         border-radius:50px;font-size:.88rem;font-weight:700;transition:all .35s var(--ease);}
    .btn-primary{background:var(--accent);color:#050810;box-shadow:0 0 20px rgba(245,158,11,0.28)}
    .btn-primary:hover{background:#fff;box-shadow:0 0 34px rgba(245,158,11,0.55);transform:translateY(-3px)}
    .btn-ghost{border:1px solid var(--border);color:var(--text)}
    .btn-ghost:hover{border-color:var(--accent);color:var(--accent);box-shadow:var(--glow-sm);transform:translateY(-3px)}

    /* ── SECTIONS ── */
    .section{position:relative;z-index:1;padding:3.5rem 8%;max-width:100%;margin:0 auto}
    .section-inner{max-width:1100px;margin:0 auto}
    .sec-label{font-size:.7rem;font-weight:700;
               font-family: 'Space Grotesk', sans-serif; text-transform: uppercase; letter-spacing: -1px;
               color:var(--accent);margin-bottom:.5rem}
    .sec-label::before{content:'// ';opacity:.5}
    .sec-title{font-size:clamp(1.6rem,3.5vw,2.4rem);
               font-weight:700;color:#fff;margin-bottom:1rem; font-family: 'Space Grotesk', sans-serif; text-transform: uppercase; letter-spacing: -1px;}
    .sec-bar{width:42px;height:2px;background:linear-gradient(90deg,var(--accent),transparent);
             border-radius:2px;margin-bottom:2rem}

    /* ── TOPICS ── */
    .topics-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem}
    .topic-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;
                padding:1.5rem 1.2rem;text-align:center;
                transition:transform .3s var(--ease),border-color .3s,box-shadow .3s}
    .topic-card:hover{transform:translateY(-4px);border-color:rgba(245,158,11,0.3);box-shadow:var(--glow-sm)}
    .topic-emoji{font-size:1.9rem;margin-bottom:.65rem;display:block}
    .topic-name{font-weight:700;font-size:.95rem;color:#fff; font-family: 'Space Grotesk', sans-serif; text-transform: uppercase; letter-spacing: -1px;}

    /* ── VIDEO CARDS ── */
    .vid-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.3rem}
    .vid-card{background:var(--card);border:1px solid var(--border);border-radius:16px;
              overflow:hidden;transition:transform .3s var(--ease),border-color .3s,box-shadow .3s;cursor:default;}
    .vid-card:hover{transform:translateY(-4px);border-color:rgba(245,158,11,0.3);

    .vid-card.playing{border-color:var(--accent) !important;
                      box-shadow:0 0 0 2px rgba(245,158,11,0.25),0 20px 50px rgba(0,0,0,.7) !important;
                      transform:none !important}
    .v-thumb{position:relative;aspect-ratio:16/9;overflow:hidden;background:#0a0a14;cursor:default;}
    .v-thumb img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s}
    .vid-card:hover .v-thumb img{transform:scale(1.04)}
    .play-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
                  background:rgba(0,0,0,.45);transition:background .25s}
    .vid-card:hover .play-overlay{background:rgba(0,0,0,.18)}
    .play-btn{width:52px;height:52px;background:var(--accent);border-radius:50%;
              display:flex;align-items:center;justify-content:center;
              box-shadow:0 4px 22px rgba(245,158,11,0.45);transition:transform .2s}
    .vid-card:hover .play-btn{transform:scale(1.1)}
    .play-btn svg{width:20px;height:20px;fill:#050810;margin-left:4px}
    .v-player{display:none;aspect-ratio:16/9;background:#000}
    .v-player iframe{width:100%;height:100%;border:none;display:block}
    .vid-card.playing .v-thumb{display:none}
    .vid-card.playing .v-player{display:block}

    footer{position:relative;z-index:1;padding:2.2rem 8%;text-align:center;
           font-size:.8rem;color:var(--muted);border-top:1px solid var(--border)}
    footer span{color:var(--accent)}

    @keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:none}}
    .reveal{opacity:0;transform:translateY(18px);transition:opacity .65s ease,transform .65s ease}
    .reveal.v{opacity:1;transform:none}

    @media(max-width:700px){
      nav{padding:0 5%}
      .nav-links a:not(.nav-cta){display:none}
      .shorts-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr))}
    }
  </style>

<script>
/* ── INTERACTIVE PARTICLE NETWORK ── */
(function(){
  var R='245',G='158',B='11';
  var cv=document.createElement('canvas');
  cv.style.cssText='position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none;background:transparent';
  document.body.insertBefore(cv,document.body.firstChild);
  var ctx=cv.getContext('2d');
  var W,H,pts=[],mouse={x:-1000,y:-1000,radius:150};

  function Particle(){
    this.x=Math.random()*W; this.y=Math.random()*H;
    this.baseX=this.x; this.baseY=this.y;
    this.size=Math.random()*1.5+1;
    this.density=(Math.random()*30)+1;
  }
  Particle.prototype.draw=function(){
    ctx.fillStyle='rgba('+R+','+G+','+B+',0.8)';
    ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill();
  };
  Particle.prototype.update=function(){
    var dx=mouse.x-this.x,dy=mouse.y-this.y;
    var dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<mouse.radius){
      var fx=dx/dist,fy=dy/dist;
      var force=(mouse.radius-dist)/mouse.radius;
      this.x-=fx*force*this.density;
      this.y-=fy*force*this.density;
    } else {
      if(this.x!==this.baseX){var ex=this.x-this.baseX;this.x-=ex/10;}
      if(this.y!==this.baseY){var ey=this.y-this.baseY;this.y-=ey/10;}
    }
  };

  function connect(){
    var thresh=(W/7)*(H/7);
    for(var a=0;a<pts.length;a++){
      for(var b=a;b<pts.length;b++){
        var dx=pts[a].x-pts[b].x,dy=pts[a].y-pts[b].y;
        var d=dx*dx+dy*dy;
        if(d<thresh){
          var op=1-(d/20000);
          if(op<0)op=0;
          ctx.strokeStyle='rgba('+R+','+G+','+B+','+op+')';
          ctx.lineWidth=0.5;
          ctx.beginPath();ctx.moveTo(pts[a].x,pts[a].y);ctx.lineTo(pts[b].x,pts[b].y);ctx.stroke();
        }
      }
    }
  }

  function init(){
    pts=[];
    var n=Math.min(Math.floor(W*H/9000),150);
    for(var i=0;i<n;i++)pts.push(new Particle());
  }

  function resize(){
    W=cv.width=window.innerWidth;
    H=cv.height=window.innerHeight;
    init();
  }

  function frame(){
    ctx.clearRect(0,0,W,H);
    for(var i=0;i<pts.length;i++){pts[i].update();pts[i].draw();}
    connect();
    requestAnimationFrame(frame);
  }

  window.addEventListener('resize',resize,{passive:true});
  window.addEventListener('mousemove',function(e){mouse.x=e.clientX;mouse.y=e.clientY;},{passive:true});
  resize();
  frame();
})();
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>*{cursor:none !important}</style>
<script>
/* ── GSAP MAGNETIC CURSOR (ThinkCraft exact) ── */
(function(){
  var SIZE=24,PAD=8,LERP=.1,SM=.04,MX=1,MY=.3;
  var cur=document.createElement('div');
  cur.id='gsap-cursor';
  cur.style.cssText='position:fixed;top:0;left:0;width:'+SIZE+'px;height:'+SIZE+'px;border-radius:50%;background:#fff;mix-blend-mode:difference;pointer-events:none;z-index:9999;opacity:0;will-change:t[...]
  document.body.appendChild(cur);
  var tx=-100,ty=-100,cx=-100,cy=-100,px=-100,py=-100,hov=false;

  /* ticker owns: x, y, scaleX, scaleY, rotate — only when not hov */
  gsap.ticker.add(function(){
    if(hov)return;
    cx+=(tx-cx)*LERP; cy+=(ty-cy)*LERP;
    var dx=cx-px, dy=cy-py; px=cx; py=cy;
    var spd=Math.sqrt(dx*dx+dy*dy)*SM;
    gsap.set(cur,{x:cx,y:cy,rotate:Math.atan2(dy,dx)*(180/Math.PI),scaleX:1+Math.min(spd,MX),scaleY:1-Math.min(spd,MY)});
  });

  /* first move: snap into position */
  window.addEventListener('pointermove',function(e){
    cx=e.clientX-SIZE/2; cy=e.clientY-SIZE/2; px=cx; py=cy; tx=cx; ty=cy;
    gsap.set(cur,{x:cx,y:cy,opacity:1});
  },{once:true,passive:true});

  /* continuous tracking + text squish */
  window.addEventListener('pointermove',function(e){
    tx=e.clientX-SIZE/2; ty=e.clientY-SIZE/2;
    gsap.to(cur,{opacity:1,duration:.2});
    var t=e.target;
    if(!hov&&(t.tagName==='P'||t.tagName==='SPAN'||/^H[1-6]$/.test(t.tagName)||window.getComputedStyle(t).cursor==='text'))
      gsap.to(cur,{scaleX:.5,scaleY:1.5,duration:.3});
  },{passive:true});

  document.addEventListener('mouseleave',function(){gsap.to(cur,{opacity:0,duration:.3});});
  document.addEventListener('mouseenter',function(){gsap.to(cur,{opacity:1,duration:.3});});

  /* click burst */
  window.addEventListener('click',function(e){
    for(var v=0;v<8;v++){(function(i){
      var p=document.createElement('div');
      p.style.cssText='position:fixed;width:4px;height:4px;background:#fff;border-radius:50%;pointer-events:none;z-index:9998;mix-blend-mode:difference';
      document.body.appendChild(p);
      var a=Math.PI*2*i/8, d=45+Math.random()*55;
      gsap.fromTo(p,{x:e.clientX,y:e.clientY,opacity:1},
        {x:e.clientX+Math.cos(a)*d,y:e.clientY+Math.sin(a)*d,opacity:0,duration:.6,ease:'power2.out',onComplete:function(){p.remove();}});
    })(v);}
  });

  var SEL='a,button,input,select,textarea,.btn,.card,.vid-card,.hcard,.nav-link,[data-magnetic]';

  function attach(el){
    if(el._mc)return; el._mc=true;
    var xTo=gsap.quickTo(el,'x',{duration:1,ease:'elastic.out(1,.3)'});
    var yTo=gsap.quickTo(el,'y',{duration:1,ease:'elastic.out(1,.3)'});

    el.addEventListener('pointerenter',function(){
      hov=true;
      var r=el.getBoundingClientRect();
      var br=window.getComputedStyle(el).borderRadius||'8px';
      gsap.killTweensOf(cur);
      /* enter: gsap.to owns everything — ticker paused */
      gsap.to(cur,{
        x:r.left-PAD, y:r.top-PAD,
        width:r.width+PAD*2, height:r.height+PAD*2,
        borderRadius:br, scaleX:1, scaleY:1, rotate:0,
        duration:.4, ease:'power3.out'
      });
    });

    el.addEventListener('pointerleave',function(){
      hov=false;
      gsap.killTweensOf(cur);
      /* leave: only fold the SIZE back — ticker resumes and handles x/y/scale/rotate */
      gsap.to(cur,{
        width:SIZE, height:SIZE, borderRadius:'50%',
        duration:.45, ease:'elastic.out(1,.5)'
      });
      xTo(0); yTo(0);
    });

    el.addEventListener('pointermove',function(e){
      var r=el.getBoundingClientRect();
      xTo((e.clientX-(r.left+r.width/2))*.2);
      yTo((e.clientY-(r.top+r.height/2))*.2);
    });

    el.addEventListener('pointerout',function(){xTo(0);yTo(0);});
  }

  document.querySelectorAll(SEL).forEach(attach);
  new MutationObserver(function(muts){
    muts.forEach(function(m){
      m.addedNodes.forEach(function(n){
        if(n.nodeType===1){
          if(n.matches&&n.matches(SEL))attach(n);
          if(n.querySelectorAll)n.querySelectorAll(SEL).forEach(attach);
        }
      });
    });
  }).observe(document.body,{childList:true,subtree:true});
})();
</script>
