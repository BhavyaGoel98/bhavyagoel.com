<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BG Code Tutor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F1F3EE;
    --bg-elev:#FFFFFF;
    --ink:#15191E;
    --ink-soft:#57636C;
    --ink-faint:#8A9298;
    --accent:#1F8A70;
    --accent-deep:#0E5A47;
    --accent-soft:#E3F1EC;
    --warm:#F2A93B;
    --warm-deep:#8A5B12;
    --warm-soft:#FBEDD3;
    --code-bg:#11151C;
    --code-text:#E7ECEF;
    --code-accent:#7FD9C4;
    --success:#2FBF71;
    --success-soft:#E5F8EE;
    --error:#E2574C;
    --error-soft:#FBE9E7;
    --border:#DCE2DC;
    --radius:14px;
    --radius-sm:8px;
    --shadow:0 2px 10px rgba(20,25,30,.06);
    --shadow-lg:0 12px 32px rgba(20,25,30,.14);
    --font-display:'Space Grotesk',system-ui,sans-serif;
    --font-body:'Inter',system-ui,sans-serif;
    --font-mono:'JetBrains Mono',ui-monospace,'Courier New',monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:var(--font-body);
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  #app{max-width:720px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}
  button{font-family:inherit;cursor:pointer;}
  input,textarea{font-family:inherit;}
  h1,h2,h3{font-family:var(--font-display);margin:0;letter-spacing:-0.01em;}
  p{margin:0;line-height:1.5;}
  a{color:var(--accent-deep);}
  ::selection{background:var(--warm-soft);}

  :focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px;}

  /* ---------- Topbar ---------- */
  .topbar{
    position:sticky;top:0;z-index:20;
    display:flex;align-items:center;gap:10px;
    padding:14px 20px;background:rgba(241,243,238,.92);backdrop-filter:blur(6px);
    border-bottom:1px solid var(--border);
  }
  .topbar .back{
    width:34px;height:34px;border-radius:50%;border:1px solid var(--border);
    background:var(--bg-elev);display:flex;align-items:center;justify-content:center;
    font-size:16px;flex:none;
  }
  .topbar .wordmark{font-family:var(--font-display);font-weight:700;font-size:16px;flex:1;}
  .topbar .wordmark .dot{color:var(--accent);}
  .free-badge{
    font-family:var(--font-mono);font-size:11px;font-weight:600;color:var(--accent-deep);
    background:var(--accent-soft);border-radius:999px;padding:5px 10px;white-space:nowrap;
  }
  .icon-btn{
    width:34px;height:34px;border-radius:50%;border:1px solid var(--border);
    background:var(--bg-elev);display:flex;align-items:center;justify-content:center;font-size:15px;
  }

  /* ---------- Layout ---------- */
  .screen{padding:20px 20px 48px;flex:1;}
  .stack{display:flex;flex-direction:column;gap:14px;}
  .row{display:flex;align-items:center;gap:10px;}
  .between{justify-content:space-between;}

  /* ---------- Buttons ---------- */
  .btn{
    border:none;border-radius:999px;padding:13px 22px;font-weight:600;font-size:14.5px;
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    transition:transform .12s ease, box-shadow .12s ease;
  }
  .btn:active{transform:scale(.97);}
  .btn-primary{background:var(--ink);color:#fff;}
  .btn-primary:disabled{background:#C7CCC8;color:#fff;cursor:not-allowed;}
  .btn-accent{background:var(--accent);color:#fff;}
  .btn-warm{background:var(--warm);color:#3A2705;}
  .btn-ghost{background:transparent;color:var(--ink);border:1px solid var(--border);}
  .btn-soft{background:var(--bg-elev);color:var(--ink);border:1px solid var(--border);}
  .btn-danger{background:var(--error-soft);color:var(--error);}
  .btn-block{width:100%;}
  .btn-sm{padding:8px 14px;font-size:13px;}

  /* ---------- Cards ---------- */
  .card{
    background:var(--bg-elev);border:1px solid var(--border);border-radius:var(--radius);
    padding:18px;box-shadow:var(--shadow);
  }
  .card-tap{cursor:pointer;transition:transform .12s ease;}
  .card-tap:active{transform:scale(.985);}
  .card.locked{opacity:.55;}

  /* ---------- Welcome ---------- */
  .hero-term{
    background:var(--code-bg);color:var(--code-text);border-radius:var(--radius);
    padding:18px 18px 20px;font-family:var(--font-mono);font-size:13px;line-height:1.7;
    box-shadow:var(--shadow-lg);
  }
  .term-dots{display:flex;gap:6px;margin-bottom:12px;}
  .term-dots span{width:9px;height:9px;border-radius:50%;display:inline-block;background:#3a4150;}
  .term-dots span:nth-child(1){background:#E2574C;}
  .term-dots span:nth-child(2){background:#F2A93B;}
  .term-dots span:nth-child(3){background:#2FBF71;}
  .cursor-blink{display:inline-block;width:7px;height:14px;background:var(--code-accent);margin-left:2px;animation:blink 1s steps(1) infinite;vertical-align:middle;}
  @keyframes blink{50%{opacity:0;}}
  .name-input{
    width:100%;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px;
    font-size:16px;background:var(--bg-elev);color:var(--ink);
  }
  .name-input:focus{border-color:var(--accent);}

  /* ---------- Progress bar ---------- */
  .progress-track{height:8px;border-radius:999px;background:var(--border);overflow:hidden;}
  .progress-fill{height:100%;background:var(--accent);border-radius:999px;transition:width .4s ease;}

  /* ---------- Language grid ---------- */
  .lang-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .lang-card{padding:16px;}
  .lang-emoji{font-size:26px;}
  .soon-tag{
    font-family:var(--font-mono);font-size:10px;font-weight:600;color:var(--ink-faint);
    background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:2px 6px;
  }

  /* ---------- Streak grid (signature element) ---------- */
  .streak-card{padding:18px;}
  .streak-grid{display:grid;grid-template-columns:repeat(20,1fr);gap:3px;margin-top:12px;}
  .streak-cell{width:100%;aspect-ratio:1;border-radius:3px;background:var(--border);}
  .streak-legend{display:flex;align-items:center;gap:6px;margin-top:10px;font-size:11px;color:var(--ink-faint);font-family:var(--font-mono);}
  .legend-chip{width:9px;height:9px;border-radius:2px;display:inline-block;}

  /* ---------- Lesson list ---------- */
  .unit-lesson-row{display:flex;align-items:center;gap:12px;padding:14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg-elev);}
  .lesson-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex:none;border:2px solid var(--border);color:var(--ink-faint);font-weight:700;}
  .lesson-dot.done{background:var(--accent);border-color:var(--accent);color:#fff;}
  .lesson-dot.current{border-color:var(--ink);color:var(--ink);}
  .unit-lesson-row.locked{opacity:.55;cursor:default;}

  /* ---------- Lesson player ---------- */
  .lesson-goal{font-size:13px;color:var(--accent-deep);font-weight:600;text-transform:uppercase;letter-spacing:.03em;font-family:var(--font-mono);}
  .lesson-explain{font-size:15.5px;color:var(--ink);}
  .example-box{background:var(--code-bg);border-radius:var(--radius-sm);overflow:hidden;}
  .example-code{color:var(--code-text);font-family:var(--font-mono);font-size:13px;padding:14px;white-space:pre-wrap;margin:0;}
  .example-out{border-top:1px solid #232a35;padding:10px 14px;font-family:var(--font-mono);font-size:12px;color:var(--code-accent);}
  .example-out .label{color:#5b6573;text-transform:uppercase;letter-spacing:.05em;font-size:10px;display:block;margin-bottom:3px;}

  .editor-label{font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-faint);font-weight:600;}
  .code-editor{
    width:100%;min-height:140px;background:var(--code-bg);color:var(--code-text);
    border:none;border-radius:var(--radius-sm);padding:14px;font-family:var(--font-mono);font-size:13.5px;
    line-height:1.6;resize:vertical;
  }
  .code-editor:focus{outline:2px solid var(--accent);}
  .output-panel{
    background:#0B0E13;color:var(--code-text);border-radius:var(--radius-sm);
    font-family:var(--font-mono);font-size:13px;padding:14px;min-height:48px;white-space:pre-wrap;
    border:1px solid #1d242e;
  }
  .output-panel.empty{color:#4b5563;}
  .output-panel .ok{color:var(--code-accent);}
  .output-panel .err{color:#ff8a80;}
  .html-frame{width:100%;min-height:160px;border:1px solid var(--border);border-radius:var(--radius-sm);background:#fff;}
  .sql-table{width:100%;border-collapse:collapse;font-family:var(--font-mono);font-size:12.5px;}
  .sql-table th,.sql-table td{border:1px solid #232a35;padding:6px 8px;text-align:left;}
  .sql-table th{color:var(--code-accent);background:#161c25;}

  .hint-list{display:flex;flex-direction:column;gap:8px;}
  .hint-item{background:var(--warm-soft);border:1px solid #f0d8a3;border-radius:var(--radius-sm);padding:10px 12px;font-size:13.5px;color:var(--warm-deep);}

  .feedback-banner{border-radius:var(--radius-sm);padding:12px 14px;font-size:14px;font-weight:500;display:flex;align-items:center;gap:8px;}
  .feedback-banner.success{background:var(--success-soft);color:var(--accent-deep);}
  .feedback-banner.error{background:var(--error-soft);color:var(--error);}

  .recap-box{background:var(--accent-soft);border-radius:var(--radius-sm);padding:14px;font-size:14px;color:var(--accent-deep);}

  /* ---------- Quiz ---------- */
  .quiz-dots{display:flex;gap:6px;}
  .quiz-dots span{width:8px;height:8px;border-radius:50%;background:var(--border);}
  .quiz-dots span.active{background:var(--ink);}
  .quiz-dots span.answered{background:var(--accent);}
  .option-btn{
    display:block;width:100%;text-align:left;padding:14px 16px;border-radius:var(--radius-sm);
    border:1.5px solid var(--border);background:var(--bg-elev);font-size:14.5px;font-weight:500;
  }
  .option-btn.selected{border-color:var(--ink);}
  .option-btn.correct{border-color:var(--success);background:var(--success-soft);}
  .option-btn.incorrect{border-color:var(--error);background:var(--error-soft);}
  .fill-input{width:100%;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:13px 14px;font-size:15px;font-family:var(--font-mono);}

  /* ---------- Toast ---------- */
  #toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#fff;padding:12px 18px;border-radius:999px;font-size:13.5px;
    font-weight:500;box-shadow:var(--shadow-lg);opacity:0;transition:all .25s ease;pointer-events:none;
    z-index:50;max-width:90%;text-align:center;
  }
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  .badge{font-family:var(--font-mono);font-size:11px;font-weight:600;border-radius:6px;padding:3px 8px;display:inline-block;}
  .badge-locked{background:var(--bg);color:var(--ink-faint);border:1px solid var(--border);}

  .empty-state{text-align:center;padding:30px 10px;color:var(--ink-soft);font-size:14px;}

  /* ---------- Loading ---------- */
  .loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:14px;}
  .spinner{width:28px;height:28px;border-radius:50%;border:3px solid var(--border);border-top-color:var(--accent);animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  @media (min-width:560px){
    .lesson-grid-cols{display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:start;}
  }
  @media (prefers-reduced-motion: reduce){
    *{animation:none !important;transition:none !important;}
  }
</style>

<body>
<div id="app"></div>
<div id="toast"></div>

<script>
/* =========================================================
   BG CODE TUTOR — single-file prototype
   Storage: window.storage (artifact-persistent, personal/private)
   ========================================================= */

/* ---------------- Utilities ---------------- */
function escapeHtml(str){
  return String(str)
    .replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;')
    .replaceAll('"','&quot;').replaceAll("'",'&#39;');
}
function uidFromDate(){ return new Date().toISOString().slice(0,10); }
function showToast(msg, ms=2400){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(()=> t.classList.remove('show'), ms);
}

/* ---------------- SQL demo dataset ---------------- */
const SONGS_TABLE = [
  {id:1, title:'Loop De Loop',      artist:'The Iterators', genre:'electronic', year:2019, plays:154},
  {id:2, title:'Recursive Love',    artist:'Call Stack',    genre:'pop',        year:2021, plays:320},
  {id:3, title:'Boolean Heart',     artist:'True Colors',   genre:'pop',        year:2018, plays:210},
  {id:4, title:'Stack Overflow',    artist:'The Iterators', genre:'rock',       year:2022, plays:410},
  {id:5, title:'Null Pointer Blues',artist:'Deep Debug',    genre:'jazz',       year:2017, plays:95},
  {id:6, title:'Array of Sunshine', artist:'True Colors',   genre:'pop',        year:2020, plays:275},
  {id:7, title:'Binary Sunset',     artist:'Deep Debug',    genre:'electronic', year:2023, plays:500},
  {id:8, title:'Hash It Out',       artist:'Call Stack',    genre:'hiphop',     year:2022, plays:188},
];

/* ---------------- Code execution engines ---------------- */

// JavaScript: real execution in a sandboxed Function, console.log captured.
function runJS(code){
  const logs = [];
  const fakeConsole = {
    log:(...args)=> logs.push(args.map(a=> typeof a==='object'? JSON.stringify(a) : String(a)).join(' ')),
  };
  try{
    const fn = new Function('console', code);
    fn(fakeConsole);
    return {ok:true, output: logs.join('\n')};
  }catch(e){
    return {ok:false, error: e.message, output: logs.join('\n')};
  }
}

// Python-lite: tiny interpreter for the beginner subset used in lessons
// (assignment, +-*/, string/number literals, f-strings, print()).
function pyTokenize(s){
  const tokens=[]; let i=0;
  while(i<s.length){
    const c=s[i];
    if(/\s/.test(c)){ i++; continue; }
    if(c==='"'||c==="'"){
      const quote=c; let j=i+1, str='';
      while(j<s.length && s[j]!==quote){ str+=s[j]; j++; }
      tokens.push({type:'str', value:str}); i=j+1; continue;
    }
    if(/[0-9]/.test(c)){
      let j=i, num='';
      while(j<s.length && /[0-9.]/.test(s[j])){ num+=s[j]; j++; }
      tokens.push({type:'num', value:parseFloat(num)}); i=j; continue;
    }
    if(/[+\-*/]/.test(c)){ tokens.push({type:'op', value:c}); i++; continue; }
    if(/[a-zA-Z_]/.test(c)){
      let j=i, id='';
      while(j<s.length && /[a-zA-Z0-9_]/.test(s[j])){ id+=s[j]; j++; }
      if(id==='f' && (s[j]==='"'||s[j]==="'")){
        const quote=s[j]; let k=j+1, str='';
        while(k<s.length && s[k]!==quote){ str+=s[k]; k++; }
        tokens.push({type:'fstr', value:str}); i=k+1; continue;
      }
      tokens.push({type:'id', value:id}); i=j; continue;
    }
    i++; // skip unknown char
  }
  return tokens;
}
function pyResolve(tok, vars){
  if(!tok) return '';
  if(tok.type==='str') return tok.value;
  if(tok.type==='num') return tok.value;
  if(tok.type==='id'){
    if(!(tok.value in vars)) throw new Error(`name '${tok.value}' is not defined`);
    return vars[tok.value];
  }
  if(tok.type==='fstr'){
    return tok.value.replace(/\{([^}]+)\}/g, (m,name)=>{
      const t = pyTokenize(name.trim())[0];
      return String(pyResolve(t, vars));
    });
  }
  return '';
}
function pyEvalTokens(tokens, vars){
  if(tokens.length===0) return '';
  let result = pyResolve(tokens[0], vars);
  let i=1;
  while(i<tokens.length-1 || (i<tokens.length && tokens[i].type==='op')){
    const op = tokens[i] && tokens[i].value;
    const rhs = pyResolve(tokens[i+1], vars);
    if(op==='+'){
      if(typeof result==='number' && typeof rhs==='number') result = result+rhs;
      else result = String(result)+String(rhs);
    } else if(op==='-'){ result = Number(result)-Number(rhs); }
    else if(op==='*'){ result = Number(result)*Number(rhs); }
    else if(op==='/'){ result = Number(result)/Number(rhs); }
    else break;
    i+=2;
  }
  return result;
}
function pySplitTopCommas(s){
  const parts=[]; let cur=''; let inQuote=null;
  for(const ch of s){
    if(inQuote){ cur+=ch; if(ch===inQuote) inQuote=null; continue; }
    if(ch==='"'||ch==="'"){ inQuote=ch; cur+=ch; continue; }
    if(ch===','){ parts.push(cur); cur=''; continue; }
    cur+=ch;
  }
  if(cur.trim()!=='') parts.push(cur);
  return parts;
}
function runPythonLite(code){
  const vars = {}; const logs = [];
  try{
    const lines = code.split('\n');
    for(const raw of lines){
      const line = raw.trim();
      if(!line || line.startsWith('#')) continue;
      const printMatch = line.match(/^print\((.*)\)$/);
      if(printMatch){
        const parts = pySplitTopCommas(printMatch[1]);
        const outs = parts.map(p=> pyEvalTokens(pyTokenize(p), vars));
        logs.push(outs.map(String).join(' '));
        continue;
      }
      const assignMatch = line.match(/^([a-zA-Z_][a-zA-Z0-9_]*)\s*=\s*(.+)$/);
      if(assignMatch){
        vars[assignMatch[1]] = pyEvalTokens(pyTokenize(assignMatch[2]), vars);
        continue;
      }
      throw new Error('This mini-Python runner only understands variable assignments and print(). Try simplifying that line.');
    }
    return {ok:true, output: logs.join('\n'), vars};
  }catch(e){
    return {ok:false, error: e.message, output: logs.join('\n')};
  }
}

// SQL-lite: minimal SELECT engine over the in-memory songs table.
function runSQLLite(query, table){
  try{
    const q = query.trim().replace(/;\s*$/,'');
    const m = q.match(/^SELECT\s+(.+?)\s+FROM\s+(\w+)(?:\s+WHERE\s+(.+?))?(?:\s+ORDER BY\s+(.+?))?(?:\s+LIMIT\s+(\d+))?$/is);
    if(!m) throw new Error('Could not parse that. Check the SELECT ... FROM ... shape of your query.');
    let [, colsRaw, tableName, whereRaw, orderRaw, limitRaw] = m;
    if(tableName.toLowerCase()!=='songs') throw new Error(`Unknown table "${tableName}". This database only has "songs".`);
    let rows = table.slice();
    if(whereRaw){
      const conds = whereRaw.split(/\s+AND\s+/i).map(c=>{
        const cm = c.match(/^(\w+)\s*(=|!=|>=|<=|>|<)\s*(.+)$/);
        if(!cm) throw new Error('Could not parse the WHERE clause.');
        let [, col, op, valRaw] = cm;
        valRaw = valRaw.trim();
        let val;
        if(/^'.*'$/.test(valRaw) || /^".*"$/.test(valRaw)) val = valRaw.slice(1,-1);
        else val = parseFloat(valRaw);
        return {col, op, val};
      });
      rows = rows.filter(r=> conds.every(c=>{
        const rv = r[c.col];
        if(rv===undefined) throw new Error(`Unknown column "${c.col}".`);
        switch(c.op){
          case '=': return rv==c.val;
          case '!=': return rv!=c.val;
          case '>': return rv>c.val;
          case '<': return rv<c.val;
          case '>=': return rv>=c.val;
          case '<=': return rv<=c.val;
        }
      }));
    }
    if(orderRaw){
      const om = orderRaw.match(/^(\w+)\s*(ASC|DESC)?$/i);
      if(!om) throw new Error('Could not parse the ORDER BY clause.');
      const [, col, dir] = om;
      const d = (dir||'ASC').toUpperCase();
      rows = rows.slice().sort((a,b)=> a[col]>b[col]?1:a[col]<b[col]?-1:0);
      if(d==='DESC') rows.reverse();
    }
    if(limitRaw) rows = rows.slice(0, parseInt(limitRaw,10));
    let cols;
    if(colsRaw.trim()==='*') cols = Object.keys(table[0]);
    else cols = colsRaw.split(',').map(c=>c.trim());
    const result = rows.map(r=>{
      const o={}; cols.forEach(c=> o[c]=r[c]); return o;
    });
    return {ok:true, rows:result, columns:cols};
  }catch(e){
    return {ok:false, error:e.message};
  }
}

/* ---------------- Curriculum data ---------------- */
const LANGUAGES = [
  {
    id:'python', name:'Python', emoji:'🐍', engine:'python',
    levels:{
      beginner:{
        units:[{
          id:'py-u1', title:'Python Basics',
          lessons:[
            {
              id:'py-l1', title:'Say hello with print()',
              goal:'Use print() to display a message',
              explanation:'print() shows whatever text you put inside the parentheses, as long as it is wrapped in quotes.',
              example:{code:'print("Hi there!")', output:'Hi there!'},
              starterCode:'print("Hello, world!")',
              task:'Change the message so it greets the world from BG Code Tutor.',
              hints:[
                'print() displays whatever is inside its parentheses.',
                'Text must be wrapped in quotes, like "this".',
                'Try: print("Hello from BG Code Tutor!")'
              ],
              recap:'print() is how Python shows output to the screen — you will use it constantly.',
              validate:(code, run)=>{

    currentLanguageId:null,
    progress:{},               // lessonId -> {status:'done', completedAt}
    quizProgress:{},           // quizId -> {status:'done', score, completedAt}
  };
}
let persisted = defaultState();
let ui = {
  screen:'loading',
  currentLanguageId:null,
  currentLessonId:null,
  currentQuizId:null,
  hintIndex:0,
  codeDraft:{},          // lessonId/quizQid -> code string
  lastResult:{},         // lessonId/quizQid -> {success, message}
  quizIndex:0,
  quizAnswers:{},         // qid -> selected answer
  quizFeedback:{},
  confirmingReset:false,
};

async function loadState(){
  try{
    const res = await window.storage.get(STORAGE_KEY, false);
    if(res && res.value){
      const parsed = JSON.parse(res.value);
      persisted = Object.assign(defaultState(), parsed);
    }
  }catch(e){
    persisted = defaultState();
  }
}
async function saveState(){
  try{
    await window.storage.set(STORAGE_KEY, JSON.stringify(persisted), false);
  }catch(e){
    showToast("Couldn't save progress — it will still work for this session.");
  }
}

/* ---------------- Derived helpers ---------------- */
function lessonStatus(lessonId){
  return (persisted.progress[lessonId] && persisted.progress[lessonId].status) || 'todo';
}
function markLessonDone(lessonId){
  persisted.progress[lessonId] = {status:'done', completedAt: Date.now()};
  saveState();
}
function quizStatus(quizId){
  return (persisted.quizProgress[quizId] && persisted.quizProgress[quizId].status) || 'todo';
}
function markQuizDone(quizId, score){
  persisted.quizProgress[quizId] = {status:'done', score, completedAt: Date.now()};
  saveState();
}
function langCompletion(lang){
  const lessons = allLessonsOf(lang);
  const done = lessons.filter(l=> lessonStatus(l.id)==='done').length;
  const quiz = findUnit(lang).quiz;
  const quizDone = quizStatus(quiz.id)==='done';
  const total = lessons.length + 1;
  const doneCount = done + (quizDone?1:0);
  return {done:doneCount, total, pct: Math.round((doneCount/total)*100)};
}
function findContinueTarget(){
  const preferred = ui.currentLanguageId || persisted.currentLanguageId;
  const order = preferred ? [findLanguage(preferred), ...LANGUAGES.filter(l=>l.id!==preferred)] : LANGUAGES;
  for(const lang of order){
    if(!lang) continue;
    const lessons = allLessonsOf(lang);
    const next = lessons.find(l=> lessonStatus(l.id)!=='done');
    if(next) return {langId:lang.id, lessonId:next.id};
    const quiz = findUnit(lang).quiz;
    if(quizStatus(quiz.id)!=='done') return {langId:lang.id, quizId:quiz.id};
  }
  return null;
}
function activityHeatmap(){
  const counts = {};
  Object.values(persisted.progress).forEach(p=>{
    const d = new Date(p.completedAt).toISOString().slice(0,10);
    counts[d] = (counts[d]||0)+1;
  });
  Object.values(persisted.quizProgress).forEach(p=>{
    const d = new Date(p.completedAt).toISOString().slice(0,10);
    counts[d] = (counts[d]||0)+1;
  });
  return counts;
}
function currentStreakDays(){
  const counts = activityHeatmap();
  let streak = 0;
  let d = new Date();
  while(true){
    const key = d.toISOString().slice(0,10);
    if(counts[key]){ streak++; d.setDate(d.getDate()-1); }
    else break;
  }
  return streak;
}

/* ---------------- Navigation ---------------- */
function goto(screen, extra={}){
  ui.screen = screen;
  Object.assign(ui, extra);
  render();
}

/* ---------------- Rendering ---------------- */
function topbar({back=null, title='', showFree=true}={}){
  return `
    <div class="topbar">
      ${back ? `<button class="back" data-action="${back}" aria-label="Back">←</button>` : `<span style="width:34px"></span>`}
      <div class="wordmark">${title || `BG CODE<span class="dot">.</span>TUTOR`}</div>
      ${showFree ? `<span class="free-badge">100% FREE</span>` : ''}
    </div>`;
}

function render(){
  const root = document.getElementById('app');
  let html = '';
  switch(ui.screen){
    case 'loading': html = renderLoading(); break;
    case 'welcome': html = renderWelcome(); break;
    case 'dashboard': html = renderDashboard(); break;
    case 'languages': html = renderLanguages(); break;
    case 'units': html = renderUnits(); break;
    case 'lesson': html = renderLessonScreen(); break;
    case 'quiz': html = renderQuizScreen(); break;
    case 'settings': html = renderSettings(); break;

  root.innerHTML = html;
  mountScreen();
  window.scrollTo(0,0);
}

function renderQuestionMarkup(q, idx, lang){
  const qid = idx;
  const answer = ui.quizAnswers[qid];

  if(q.type==='mcq'){
    const opts = q.options.map((opt,i)=>{
      let cls='option-btn';
      if(feedback){
        if(i===q.correctIndex) cls+=' correct';
        else if(answer===i) cls+=' incorrect';
      } else if(answer===i) cls+=' selected';
      return `<button class="${cls}" data-action="quiz-select-mcq" data-idx="${i}" ${feedback?'disabled':''}>${escapeHtml(opt)}</button>`;
    }).join('');
    return `<div class="stack" style="gap:10px;">${opts}</div>`;
  }
  if(q.type==='fill'){
    return `
      <input id="quiz-fill-input" class="fill-input" placeholder="Type your answer" ${feedback?'disabled':''}>
      ${!feedback ? `<button class="btn btn-accent" style="margin-top:10px;" data-action="quiz-submit-fill">Submit</button>` : ''}`;
  }
  if(q.type==='code'){
    const engine = q.engine;
    return `
      <div class="stack" style="gap:8px;">
        <textarea id="quiz-code-editor" class="code-editor" spellcheck="false"></textarea>

  }
  return '';
}

/* ---------------- Mounting / post-render binding ---------------- */
function mountScreen(){
  bindGlobalActions();
  if(ui.screen==='welcome') mountWelcome();
  if(ui.screen==='lesson') mountLesson();
  if(ui.screen==='quiz') mountQuiz();
  if(ui.screen==='settings') mountSettings();
}

function bindGlobalActions(){
  document.querySelectorAll('[data-action]').forEach(el=>{
    el.addEventListener('click', onAction);
  });
}

function onAction(e){
  const el = e.currentTarget;
  const action = el.getAttribute('data-action');
  switch(action){
    case 'start-learning': return handleStartLearning();
    case 'goto-dashboard': return goto('dashboard');
    case 'goto-languages': return goto('languages');
    case 'goto-units': return goto('units', {currentLessonId:null});
    case 'goto-settings': return goto('settings');
    case 'open-language': ui.currentLanguageId = el.getAttribute('data-lang'); persisted.currentLanguageId = ui.currentLanguageId; saveState(); return goto('units');
    case 'open-lesson':
      ui.currentLanguageId = el.getAttribute('data-lang');
      ui.currentLessonId = el.getAttribute('data-lesson');
      ui.hintIndex = 0;
      return goto('lesson');
    case 'open-quiz':
      ui.currentLanguageId = el.getAttribute('data-lang');
      ui.currentQuizId = el.getAttribute('data-quiz');
      ui.quizIndex = 0; ui.quizAnswers = {}; ui.quizFeedback = {};
      return goto('quiz');
    case 'run-lesson': return handleRunLesson();
    case 'check-lesson': return handleCheckLesson();
    case 'show-hint': return handleShowHint();
    case 'quiz-select-mcq': return handleQuizSelectMcq(el);
    case 'quiz-submit-fill': return handleQuizSubmitFill();
    case 'quiz-run-code': return handleQuizRunCode();
    case 'quiz-submit-code': return handleQuizSubmitCode();
    case 'quiz-next': return handleQuizNext();
    case 'retry-quiz': ui.quizIndex=0; ui.quizAnswers={}; ui.quizFeedback={}; return render();
    case 'finish-quiz': return handleFinishQuiz();
    case 'save-name': return handleSaveName();
    case 'export-progress': return handleExportProgress();
    case 'ask-reset': ui.confirmingReset=true; return render();
    case 'cancel-reset': ui.confirmingReset=false; return render();
    case 'confirm-reset': return handleConfirmReset();
  }
}

function mountWelcome(){
  const input = document.getElementById('name-field');
  const btn = document.getElementById('start-btn');
  input.focus();
  input.addEventListener('input', ()=>{
    btn.disabled = input.value.trim().length===0;
  });
  input.addEventListener('keydown', (e)=>{
    if(e.key==='Enter' && input.value.trim().length>0) handleStartLearning();
  });
}

function mountLesson(){
  const lang = findLanguage(ui.currentLanguageId);
  const lesson = findLesson(lang, ui.currentLessonId);
  const editor = document.getElementById('lesson-editor');
  const draft = ui.codeDraft[lesson.id];
  editor.value = draft!==undefined ? draft : lesson.starterCode;
  editor.addEventListener('input', ()=>{ ui.codeDraft[lesson.id] = editor.value; });
  // Replay last run output if present, otherwise auto-run once so the panel isn't empty
  let lastRun = ui.codeDraft['__lastrun_'+lesson.id];
  if(!lastRun){
    lastRun = executeForLanguage(lang, editor.value);
    ui.codeDraft['__lastrun_'+lesson.id] = lastRun;
  }
  paintLessonOutput(lang, lastRun);
}

function mountQuiz(){
  const q = currentQuizQuestion();
  if(!q) return;
  if(q.type==='code'){
    const editor = document.getElementById('quiz-code-editor');
    if(editor){
      const key = '__quizcode_'+ui.quizIndex;
      editor.value = ui.codeDraft[key] !== undefined ? ui.codeDraft[key] : q.starterCode;
      editor.addEventListener('input', ()=>{ ui.codeDraft[key] = editor.value; });
      const lastRun = ui.codeDraft['__quizlastrun_'+ui.quizIndex];
      if(lastRun) paintQuizOutput(q, lastRun);
    }
  }
}

function mountSettings(){
  const fileInput = document.getElementById('import-input');
  if(fileInput){
    fileInput.addEventListener('change', handleImportProgress);
  }
}

/* ---------------- Action handlers ---------------- */
function handleStartLearning(){
  const input = document.getElementById('name-field');
  const name = input.value.trim();
  if(!name) return;
  persisted.user = {name};
  saveState();
  showToast(`Welcome, ${name}! Let's get coding.`);
  goto('dashboard');
}

function getLessonOutputEl(){ return document.getElementById('output-panel'); }
function getHtmlFrameEl(){ return document.getElementById('html-frame'); }

function paintLessonOutput(lang, run){
  if(lang.engine==='html'){
    const frame = getHtmlFrameEl();
    if(frame) frame.srcdoc = run.html || '';
    return;
  }
  const panel = getLessonOutputEl();
  if(!panel) return;
  panel.classList.remove('empty');
  if(lang.engine==='sql'){
    if(!run.ok){ panel.innerHTML = `<span class="err">${escapeHtml(run.error)}</span>`; return; }
    if(!run.rows.length){ panel.textContent = '(0 rows)'; return; }
    const cols = run.columns;
    let t = '<table class="sql-table"><tr>'+cols.map(c=>`<th>${escapeHtml(c)}</th>`).join('')+'</tr>';
    run.rows.forEach(r=>{ t += '<tr>'+cols.map(c=>`<td>${escapeHtml(String(r[c]))}</td>`).join('')+'</tr>'; });
    t += '</table>';
    panel.innerHTML = t;
    return;
  }
  // js / python
  if(!run.ok){
    panel.innerHTML = (run.output ? escapeHtml(run.output)+'\n' : '') + `<span class="err">${escapeHtml(run.error)}</span>`;
  } else {
    panel.innerHTML = `<span class="ok">${escapeHtml(run.output) || '(no output — did you forget print/console.log?)'}</span>`;
  }
}

function executeForLanguage(lang, code){
  if(lang.engine==='js') return runJS(code);
  if(lang.engine==='python') return runPythonLite(code);
  if(lang.engine==='sql') return runSQLLite(code, SONGS_TABLE);
  if(lang.engine==='html') return {ok:true, html:code};
  return {ok:false, error:'Unknown engine'};
}

function handleRunLesson(){
  const lang = findLanguage(ui.currentLanguageId);
  const lesson = findLesson(lang, ui.currentLessonId);
  const editor = document.getElementById('lesson-editor');
  const code = editor.value;
  ui.codeDraft[lesson.id] = code;
  const run = executeForLanguage(lang, code);
  ui.codeDraft['__lastrun_'+lesson.id] = run;
  paintLessonOutput(lang, run);
}

function handleCheckLesson(){
  const lang = findLanguage(ui.currentLanguageId);
  const lesson = findLesson(lang, ui.currentLessonId);
  const editor = document.getElementById('lesson-editor');
  const code = editor.value;
  ui.codeDraft[lesson.id] = code;
  const run = executeForLanguage(lang, code);
  ui.codeDraft['__lastrun_'+lesson.id] = run;
  const result = lesson.validate(code, run);
  ui.lastResult[lesson.id] = result;
  if(result.success && lessonStatus(lesson.id)!=='done'){
    markLessonDone(lesson.id);
    showToast('Lesson complete! 🎉');
  }
  render();
}

function handleShowHint(){
  const lang = findLanguage(ui.currentLanguageId);
  const lesson = findLesson(lang, ui.currentLessonId);
  if(ui.hintIndex < lesson.hints.length) ui.hintIndex++;
  render();
}

/* ---- Quiz logic ---- */
function currentQuizQuestion(){
  const lang = findLanguage(ui.currentLanguageId);
  if(!lang) return null;
  const unit = findUnit(lang);
  const quiz = unit.quiz;
  return quiz.questions[ui.quizIndex];
}
function handleQuizSelectMcq(el){
  const q = currentQuizQuestion();
  const idx = ui.quizIndex;
  if(ui.quizFeedback[idx]) return;
  const chosen = parseInt(el.getAttribute('data-idx'),10);
  ui.quizAnswers[idx] = chosen;
  const success = chosen === q.correctIndex;
  ui.quizFeedback[idx] = {success, message: success ? 'Correct!' : 'Not quite — the highlighted option was correct.'};
  render();
}
function handleQuizSubmitFill(){
  const idx = ui.quizIndex;
  const q = currentQuizQuestion();
  const input = document.getElementById('quiz-fill-input');
  const val = input.value.trim().toLowerCase();
  const success = q.accept.some(a=> a.toLowerCase()===val);
  ui.quizAnswers[idx] = val;
  ui.quizFeedback[idx] = {success, message: success ? 'Correct!' : `Expected: ${q.accept[0]}`};
  render();
}
function handleQuizRunCode(){
  const q = currentQuizQuestion();
  const lang = {engine:q.engine, id:'quiz-'+q.engine};
  const editor = document.getElementById('quiz-code-editor');
  const code = editor.value;
  ui.codeDraft['__quizcode_'+ui.quizIndex] = code;
  const run = executeForLanguage(lang, code);
  ui.codeDraft['__quizlastrun_'+ui.quizIndex] = run;
  paintQuizOutput(q, run);
}
function paintQuizOutput(q, run){
  const panel = document.getElementById('quiz-output-panel');
  if(!panel) return;
  panel.classList.remove('empty');
  if(q.engine==='sql'){
    if(!run.ok){ panel.innerHTML = `<span class="err">${escapeHtml(run.error)}</span>`; return; }
    if(!run.rows.length){ panel.textContent='(0 rows)'; return; }
    const cols = run.columns;
    let t = '<table class="sql-table"><tr>'+cols.map(c=>`<th>${escapeHtml(c)}</th>`).join('')+'</tr>';
    run.rows.forEach(r=>{ t += '<tr>'+cols.map(c=>`<td>${escapeHtml(String(r[c]))}</td>`).join('')+'</tr>'; });
    t += '</table>';
    panel.innerHTML = t;
    return;
  }
  if(q.engine==='html'){ panel.textContent = '(HTML preview not shown for quiz tasks — check answer to validate)'; return; }
  if(!run.ok){ panel.innerHTML = (run.output?escapeHtml(run.output)+'\n':'') + `<span class="err">${escapeHtml(run.error)}</span>`; }
  else panel.innerHTML = `<span class="ok">${escapeHtml(run.output) || '(no output)'}</span>`;
}
function handleQuizSubmitCode(){
  const idx = ui.quizIndex;
  const q = currentQuizQuestion();
  const lang = {engine:q.engine, id:'quiz-'+q.engine};
  const editor = document.getElementById('quiz-code-editor');
  const code = editor.value;
  const run = executeForLanguage(lang, code);
  ui.codeDraft['__quizlastrun_'+ui.quizIndex] = run;
  const result = q.validate(code, run);
  ui.quizFeedback[idx] = result;
  render();
}
function handleQuizNext(){
  ui.quizIndex++;
  render();
}
function handleFinishQuiz(){
  const lang = findLanguage(ui.currentLanguageId);
  const unit = findUnit(lang);
  const quiz = unit.quiz;
  const correctCount = Object.values(ui.quizFeedback).filter(f=>f.success).length;
  const pct = Math.round((correctCount/quiz.questions.length)*100);
  if(pct>=60) markQuizDone(quiz.id, pct);
  goto('units');
}

/* ---- Settings handlers ---- */
function handleSaveName(){
  const input = document.getElementById('settings-name');
  const name = input.value.trim();
  if(!name) return showToast('Name cannot be empty.');
  persisted.user = {name};
  saveState();
  showToast('Name updated.');
}
function handleExportProgress(){
  const blob = new Blob([JSON.stringify(persisted, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'bg-code-tutor-progress.json';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('Progress exported.');
}
function handleImportProgress(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    try{
      const parsed = JSON.parse(reader.result);
      persisted = Object.assign(defaultState(), parsed);
      saveState();
      showToast('Progress imported.');
      render();
    }catch(err){
      showToast('That file could not be read as valid progress data.');
    }
  };
  reader.readAsText(file);
}
function handleConfirmReset(){
  persisted = defaultState();
  ui.confirmingReset = false;
  saveState();
  showToast('Progress reset.');
  goto('welcome');
}

/* ---------------- Init ---------------- */
async function init(){
  render(); // shows loading screen immediately
  await loadState();
  ui.screen = persisted.user ? 'dashboard' : 'welcome';
  ui.currentLanguageId = persisted.currentLanguageId;
  render();
}
init();
</script>
