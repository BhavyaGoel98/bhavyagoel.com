<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BG Code Tutor • Learn to Code</title>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
        import { 
            getAuth, 
            createUserWithEmailAndPassword, 
            signInWithEmailAndPassword, 
            signInWithPopup,
            GoogleAuthProvider,
            signOut, 
            onAuthStateChanged 
        } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDwVt9oEUVKgYLgqThbYldIbq8HTm_eTmg",
            authDomain: "bg-code-tutor.firebaseapp.com",
            projectId: "bg-code-tutor",
            storageBucket: "bg-code-tutor.firebasestorage.app",
            messagingSenderId: "129372610030",
            appId: "1:129372610030:web:3b72e4ad2dba22951282ff",
            measurementId: "G-PYYXTLRN4X"
        };

        window.firebaseApp = initializeApp(firebaseConfig);
        window.auth = getAuth(window.firebaseApp);
        window.GoogleAuthProvider = GoogleAuthProvider;
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #080c14;
            --bg-card: #0f1624;
            --bg-card2: #141d2e;
            --bg-elevated: #1a2438;
            --border: rgba(100,200,255,0.10);
            --border-glow: rgba(0,220,255,0.35);
            --cyan: #00dcff;
            --cyan-dim: rgba(0,220,255,0.15);
            --cyan-glow: 0 0 20px rgba(0,220,255,0.4);
            --orange: #ff6b35;
            --lime: #9bff57;
            --violet: #b57bff;
            --gold: #ffcc00;
            --text-primary: #e8f4ff;
            --text-secondary: #7a9bbf;
            --text-muted: #3d5270;
            --font-display: 'Syne', sans-serif;
            --font-mono: 'Space Mono', monospace;
            --font-body: 'DM Sans', sans-serif;
            --radius-md: 14px;
            --radius-xl: 28px;
        }

        /* === LOGIN SCREEN === */
        .login-screen {
            position: fixed; inset: 0; background: var(--bg-base);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000; flex-direction: column; padding: 20px;
        }
        .logo-img { width: 180px; filter: drop-shadow(0 0 30px var(--cyan)); }
        .app-title { font-family: var(--font-display); font-size: 32px; font-weight: 800; letter-spacing: -1px; color: var(--cyan); margin-top: 12px; }

        .auth-form {
            width: 100%; max-width: 360px; background: var(--bg-card);
            border: 1px solid var(--border); border-radius: var(--radius-xl);
            padding: 32px 28px;
        }
        .auth-input {
            width: 100%; background: var(--bg-elevated); border: 1px solid var(--border);
            border-radius: var(--radius-md); padding: 16px 18px; color: var(--text-primary);
            font-family: var(--font-mono); margin-bottom: 16px; font-size: 15px;
        }
        .auth-input:focus { outline: none; border-color: var(--cyan); box-shadow: var(--cyan-glow); }

        .auth-btn, .google-btn, .guest-btn {
            width: 100%; padding: 16px; border-radius: var(--radius-md);
            font-family: var(--font-display); font-size: 16px; font-weight: 700;
            margin-top: 12px; cursor: pointer;
        }
        .auth-btn { background: var(--cyan); color: #05111f; border: none; }
        .google-btn { 
            background: white; color: #000; border: 1px solid #dadce0; 
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .guest-btn { 
            background: transparent; color: var(--text-secondary); 
            border: 1px solid var(--border); 
        }

        .divider {
            margin: 20px 0; text-align: center; color: var(--text-muted);
            position: relative;
        }
        .divider::before {
            content: ''; position: absolute; top: 50%; left: 0; right: 0;
            height: 1px; background: var(--border);
        }
        .divider span { background: var(--bg-card); padding: 0 12px; }

        /* === MAIN APP HEADER === */
        .app-header {
            padding: 12px 16px; background: var(--bg-card);
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }
        .user-info {
            display: flex; align-items: center; gap: 12px;
        }
        .user-avatar {
            width: 42px; height: 42px; border-radius: 50%;
            object-fit: cover; border: 2px solid var(--cyan);
        }
        .user-name {
            font-family: var(--font-display); font-weight: 700; color: var(--text-primary);
        }
        .user-email {
            font-size: 12px; color: var(--text-muted); font-family: var(--font-mono);
        }
    </style>
</head>
<body>
    <!-- Ambient Particles -->
    <div class="particles" id="particles"></div>

    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="login-screen">
        <div style="text-align:center; margin-bottom:40px;">
            <img src="https://i.ibb.co/RpcTXdqV/a-typography-focused-logo-design-where-t-tm-Ao4-Mz-ZRh-WLFpd-XKmn-VUg-IEETGPFQTTSk4x9-CJAWTz-Q-sd.jpg" 
                 alt="BG Code Tutor" class="logo-img">
            <div class="app-title">BG Code Tutor</div>
            <p style="color:var(--text-muted); font-size:13px;">Master coding the fun way</p>
        </div>

        <div class="auth-form">
            <h2 id="auth-title" style="font-family:var(--font-display); font-size:24px; text-align:center; margin-bottom:24px;">Sign In</h2>
            
            <input type="email" id="email" class="auth-input" placeholder="your@email.com">
            <input type="password" id="password" class="auth-input" placeholder="Password">

            <div id="auth-error" style="color:#ff6b35; font-size:13px; text-align:center; min-height:20px;"></div>

            <button onclick="handleEmailAuth()" id="email-auth-btn" class="auth-btn">Sign In</button>

            <div class="divider"><span>OR</span></div>

            <button onclick="handleGoogleLogin()" class="google-btn">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" width="20" height="20" alt="Google">
                Continue with Google
            </button>

            <button onclick="continueAsGuest()" class="guest-btn">
                Continue as Guest
            </button>

            <div onclick="toggleAuthMode()" id="toggle-text" 
                 style="color:var(--cyan); cursor:pointer; font-size:13px; margin-top:24px; text-align:center;">
                Don't have an account? <strong>Sign Up</strong>
            </div>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="main-app" style="display:none; height:100dvh; flex-direction:column;">
        
        <!-- Enhanced Header with User Info -->
        <div class="app-header">
            <div style="display:flex; align-items:center; gap:12px;">
                <img src="https://i.ibb.co/RpcTXdqV/a-typography-focused-logo-design-where-t-tm-Ao4-Mz-ZRh-WLFpd-XKmn-VUg-IEETGPFQTTSk4x9-CJAWTz-Q-sd.jpg" 
                     style="height:38px; border-radius:8px;">
                <div style="font-family:var(--font-display); font-weight:700; color:var(--cyan);">BG Code Tutor</div>
            </div>
            
            <div class="user-info" onclick="showUserMenu()">
                <img id="user-avatar" src="https://i.pravatar.cc/150?img=68" class="user-avatar" alt="Avatar">
                <div>
                    <div id="user-name" class="user-name">Guest User</div>
                    <div id="user-subtitle" class="user-email">guest@bgcodetutor.com</div>
                </div>
            </div>
        </div>

        <!-- Your Original App Content -->
        <div id="app" style="flex:1; overflow:hidden; max-width:480px; margin:0 auto; width:100%; background:var(--bg-base);">
            <!-- Paste your full original dashboard, lesson, stats, profile views + bottom nav here -->
            <!-- For now showing a welcome message. Replace with your complete UI. -->
            <div id="view-home" class="view active" style="padding:20px;">
                <h2 style="color:var(--cyan); text-align:center; margin-top:40px;">Welcome back, <span id="welcome-name">Coder</span>!</h2>
                <p style="text-align:center; color:var(--text-muted);">Your full beautiful UI goes here.</p>
            </div>
        </div>

        <!-- Bottom Navigation (your original) -->
        <nav id="bottom-nav">
            <!-- Your original bottom nav -->
        </nav>
    </div>

    <script type="module">
        let isLoginMode = true;
        let currentUser = null;

        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').textContent = isLoginMode ? 'Sign In' : 'Create Account';
            document.getElementById('email-auth-btn').textContent = isLoginMode ? 'Sign In' : 'Sign Up';
            document.getElementById('toggle-text').innerHTML = isLoginMode 
                ? `Don't have an account? <strong>Sign Up</strong>` 
                : `Already have an account? <strong>Sign In</strong>`;
        }

        async function handleEmailAuth() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorEl = document.getElementById('auth-error');

            if (!email || !password) {
                errorEl.textContent = 'Please fill all fields';
                return;
            }

            errorEl.textContent = '';

            try {
                if (isLoginMode) {
                    await signInWithEmailAndPassword(window.auth, email, password);
                } else {
                    await createUserWithEmailAndPassword(window.auth, email, password);
                }
            } catch (error) {
                let msg = 'Authentication failed';
                if (error.code === 'auth/wrong-password') msg = 'Incorrect password';
                else if (error.code === 'auth/user-not-found') msg = 'No account found';
                else if (error.code === 'auth/email-already-in-use') msg = 'Email already registered';
                errorEl.textContent = msg;
            }
        }

        async function handleGoogleLogin() {
            const provider = new window.GoogleAuthProvider();
            const errorEl = document.getElementById('auth-error');
            try {
                await signInWithPopup(window.auth, provider);
            } catch (error) {
                errorEl.textContent = 'Google sign-in failed. Please try again.';
            }
        }

        function continueAsGuest() {
            // Simulate guest user
            currentUser = {
                displayName: "Guest Coder",
                email: "guest@bgcodetutor.com",
                photoURL: "https://i.pravatar.cc/150?img=68",
                isGuest: true
            };
            showMainApp();
        }

        function showMainApp() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';

            // Update header with user info
            if (currentUser) {
                document.getElementById('user-name').textContent = currentUser.displayName || currentUser.email?.split('@')[0] || "Coder";
                document.getElementById('user-subtitle').textContent = currentUser.email || "Guest Mode";
                document.getElementById('user-avatar').src = currentUser.photoURL || "https://i.pravatar.cc/150?img=68";
                document.getElementById('welcome-name').textContent = currentUser.displayName || "Coder";
            }
        }

        function logout() {
            if (currentUser && currentUser.isGuest) {
                // For guest, just go back to login
                document.getElementById('main-app').style.display = 'none';
                document.getElementById('login-screen').style.display = 'flex';
            } else {
                signOut(window.auth);
            }
        }

        function showUserMenu() {
            const name = document.getElementById('user-name').textContent;
            if (confirm(`Signed in as ${name}\n\nWould you like to logout?`)) {
                logout();
            }
        }

        // Auth State Listener
        onAuthStateChanged(window.auth, (user) => {
            if (user) {
                currentUser = {
                    displayName: user.displayName,
                    email: user.email,
                    photoURL: user.photoURL,
                    isGuest: false
                };
                showMainApp();
            }
        });

        console.log('%c✅ BG Code Tutor is ready with Google Login + Guest Mode + User Profile Display!', 'color:#00dcff; font-size:14px;');
    </script>
</body>
</html>
