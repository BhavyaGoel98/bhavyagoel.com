<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BG Code Tutor — Learn. Code. Level Up.</title>
<meta name="description" content="Interactive coding tutor with gamified lessons for HTML, CSS, JavaScript, Python and more.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:hsl(222,47%,7%);--fg:hsl(210,40%,92%);
--card:hsl(222,40%,10%);--card-fg:hsl(210,40%,92%);
--primary:hsl(187,100%,50%);--primary-fg:hsl(222,47%,7%);
--secondary:hsl(160,84%,39%);--secondary-fg:hsl(210,40%,98%);
--muted:hsl(222,30%,15%);--muted-fg:hsl(215,20%,55%);
--accent:hsl(222,30%,18%);--accent-fg:hsl(187,100%,50%);
--border:hsl(222,30%,18%);
--destructive:hsl(0,84%,60%);
--radius:0.75rem;
--sidebar-bg:hsl(222,47%,5%);
}
html,body{height:100%;font-family:'Inter',sans-serif;background:var(--bg);color:var(--fg);overflow:hidden}
code,.font-code{font-family:'Fira Code',monospace}
a{color:inherit;text-decoration:none}
button{cursor:pointer;border:none;background:none;font-family:inherit;color:inherit}
input{font-family:inherit}
/* Scrollbar */
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:hsl(222,30%,25%);border-radius:3px}

/* Utilities */
.glow-cyan{box-shadow:0 0 20px hsla(187,100%,50%,0.3),0 0 40px hsla(187,100%,50%,0.1)}
.glow-cyan-hover:hover{box-shadow:0 0 30px hsla(187,100%,50%,0.5),0 0 60px hsla(187,100%,50%,0.2)}
.text-gradient-cyan{background:linear-gradient(135deg,hsl(187,100%,50%),hsl(160,84%,39%));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.border-glow{border:1px solid hsla(187,100%,50%,0.2)}

@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulseGlow{0%,100%{box-shadow:0 0 15px hsla(187,100%,50%,0.3)}50%{box-shadow:0 0 30px hsla(187,100%,50%,0.6)}}
@keyframes spin{to{transform:rotate(360deg)}}
.anim-slide{animation:slideUp .5s ease-out forwards}
.anim-pulse{animation:pulseGlow 2s ease-in-out infinite}

/* Layout */
#app{display:flex;height:100vh;width:100%}
.sidebar{width:240px;background:var(--sidebar-bg);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:24px 0;flex-shrink:0;overflow:hidden;transition:width .2s}
.sidebar.collapsed{width:56px}
.sidebar .logo-area{padding:0 16px;margin-bottom:24px;display:flex;align-items:center;gap:12px}
.sidebar .logo-area img{width:36px;height:36px;border-radius:8px;object-fit:cover;flex-shrink:0}
.sidebar .logo-text h1{font-size:14px;font-weight:700;white-space:nowrap}
.sidebar .logo-text p{font-size:10px;color:var(--muted-fg);white-space:nowrap}
.sidebar .stats{padding:0 16px;margin-bottom:20px;display:flex;gap:12px;font-size:12px}
.sidebar .stats .xp{color:var(--primary);display:flex;align-items:center;gap:4px;font-weight:600}
.sidebar .stats .streak{color:var(--secondary);display:flex;align-items:center;gap:4px;font-weight:600}
.sidebar nav{flex:1}
.sidebar nav button{width:100%;display:flex;align-items:center;gap:12px;padding:10px 16px;font-size:14px;font-weight:500;color:var(--muted-fg);transition:all .2s;border-radius:0}
.sidebar nav button:hover{color:var(--primary);background:var(--accent)}
.sidebar nav button.active{color:var(--primary);background:var(--accent);border-right:2px solid var(--primary)}
.sidebar nav button svg{width:18px;height:18px;flex-shrink:0}
.sidebar .bottom{margin-top:auto;padding:0 16px}
.sidebar .bottom .user-info{display:flex;align-items:center;gap:8px;margin-bottom:12px;padding:0 4px}
.sidebar .bottom .user-info .avatar{width:28px;height:28px;border-radius:50%;background:hsla(187,100%,50%,0.2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--primary);flex-shrink:0}
.sidebar .bottom .user-info span{font-size:12px;color:var(--muted-fg);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sidebar .bottom .logout-btn{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:8px;color:var(--muted-fg);font-size:14px;font-weight:500;transition:all .2s;width:100%}
.sidebar .bottom .logout-btn:hover{color:var(--destructive);background:hsla(0,84%,60%,0.1)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:48px;display:flex;align-items:center;border-bottom:1px solid var(--border);background:hsla(222,40%,10%,0.3);padding:0 8px}
.topbar .toggle-btn{padding:6px;border-radius:8px;color:var(--muted-fg);transition:color .2s}
.topbar .toggle-btn:hover{color:var(--primary)}
.content{flex:1;overflow:auto}

/* Login */
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;background:var(--bg)}
.login-card{width:100%;max-width:400px}
.login-card .logo-center{display:flex;flex-direction:column;align-items:center;margin-bottom:32px}
.login-card .logo-center img{width:96px;height:96px;border-radius:16px;margin-bottom:16px}
.login-card .logo-center h1{font-size:28px;font-weight:700}
.login-card .logo-center p{font-size:14px;color:var(--muted-fg);margin-top:4px}
.login-card .form-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px;box-shadow:0 0 40px hsla(187,100%,50%,0.08)}
.login-card .form-box h2{font-size:20px;font-weight:600;text-align:center;margin-bottom:24px}
.login-card .error-msg{margin-bottom:16px;padding:12px;border-radius:8px;background:hsla(0,84%,60%,0.1);border:1px solid hsla(0,84%,60%,0.3);color:var(--destructive);font-size:12px}
.login-card .input-group{position:relative;margin-bottom:12px}
.login-card .input-group svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--muted-fg)}
.login-card .input-group input{width:100%;padding:12px 16px 12px 40px;border-radius:12px;background:var(--muted);border:1px solid var(--border);color:var(--fg);font-size:14px;outline:none;transition:all .2s}
.login-card .input-group input::placeholder{color:var(--muted-fg)}
.login-card .input-group input:focus{border-color:hsla(187,100%,50%,0.5);box-shadow:0 0 0 2px hsla(187,100%,50%,0.15)}
.login-card .submit-btn{width:100%;padding:12px;border-radius:12px;background:var(--primary);color:var(--primary-fg);font-weight:600;font-size:14px;transition:opacity .2s;margin-top:4px}
.login-card .submit-btn:hover{opacity:0.9}
.login-card .submit-btn:disabled{opacity:0.5}
.login-card .divider{display:flex;align-items:center;gap:12px;margin:20px 0}
.login-card .divider span{font-size:12px;color:var(--muted-fg)}
.login-card .divider div{flex:1;height:1px;background:var(--border)}
.login-card .google-btn{width:100%;padding:12px;border-radius:12px;background:var(--muted);border:1px solid var(--border);font-weight:500;font-size:14px;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s}
.login-card .google-btn:hover{border-color:hsla(187,100%,50%,0.4)}
.login-card .toggle-auth{text-align:center;font-size:12px;color:var(--muted-fg);margin-top:24px}
.login-card .toggle-auth button{color:var(--primary);font-weight:500}
.login-card .toggle-auth button:hover{text-decoration:underline}

/* Dashboard */
.dash-stats{padding:16px 24px;border-bottom:1px solid var(--border);background:hsla(222,40%,10%,0.3)}
.dash-stats .welcome{font-size:14px;color:var(--muted-fg);margin-bottom:12px}
.dash-stats .welcome span{color:var(--primary);font-weight:600}
.dash-stats .stat-row{display:flex;align-items:center;gap:24px;flex-wrap:wrap}
.dash-stats .stat-item{display:flex;align-items:center;gap:8px}
.dash-stats .stat-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.dash-stats .stat-icon.cyan{background:hsla(187,100%,50%,0.1);border:1px solid hsla(187,100%,50%,0.3)}
.dash-stats .stat-icon.green{background:hsla(160,84%,39%,0.1);border:1px solid hsla(160,84%,39%,0.3)}
.dash-stats .stat-val{font-size:18px;font-weight:700}
.dash-stats .stat-label{font-size:10px;color:var(--muted-fg)}

/* Course Catalog */
.catalog{padding:24px;overflow:auto;flex:1}
.catalog .header{margin-bottom:24px}
.catalog .header h2{font-size:24px;font-weight:700;display:flex;align-items:center;gap:12px;margin-bottom:4px}
.catalog .header p{font-size:14px;color:var(--muted-fg)}
.catalog .filters{display:flex;flex-wrap:wrap;align-items:center;gap:12px;margin-bottom:24px}
.catalog .search-box{position:relative;flex:1;min-width:200px;max-width:320px}
.catalog .search-box svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--muted-fg)}
.catalog .search-box input{width:100%;padding:10px 16px 10px 36px;border-radius:8px;background:var(--muted);border:1px solid var(--border);color:var(--fg);font-size:14px;outline:none;transition:all .2s}
.catalog .search-box input:focus{border-color:hsla(187,100%,50%,0.5)}
.catalog .cat-pills{display:flex;gap:8px;flex-wrap:wrap}
.catalog .cat-pill{padding:6px 12px;border-radius:99px;font-size:12px;font-weight:500;border:1px solid var(--border);background:var(--muted);color:var(--muted-fg);transition:all .2s}
.catalog .cat-pill:hover{border-color:hsla(187,100%,50%,0.3);color:var(--fg)}
.catalog .cat-pill.active{background:hsla(187,100%,50%,0.2);color:var(--primary);border-color:hsla(187,100%,50%,0.4)}
.catalog .count{font-size:12px;color:var(--muted-fg);margin-bottom:16px;display:flex;align-items:center;gap:6px}
.catalog .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}
.course-card{width:100%;text-align:left;padding:16px;border-radius:12px;background:var(--card);border:1px solid var(--border);transition:all .3s}
.course-card:hover{border-color:hsla(187,100%,50%,0.4);box-shadow:0 0 30px hsla(187,100%,50%,0.15)}
.course-card .top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.course-card .icon{font-size:28px}
.course-card .cat-badge{font-size:10px;font-weight:500;color:var(--muted-fg);background:var(--muted);padding:2px 8px;border-radius:99px}
.course-card h3{font-size:14px;font-weight:700;margin-bottom:4px;transition:color .2s}
.course-card:hover h3{color:var(--primary)}
.course-card .desc{font-size:12px;color:var(--muted-fg);margin-bottom:12px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.course-card .bottom{display:flex;justify-content:space-between;align-items:center}
.course-card .levels{font-size:10px;color:var(--muted-fg)}
.course-card .arrow{font-size:16px;color:var(--muted-fg);transition:all .2s}
.course-card:hover .arrow{color:var(--primary);transform:translateX(4px)}

/* Modal */
.modal-overlay{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;background:hsla(222,47%,7%,0.8);backdrop-filter:blur(4px)}
.modal{width:100%;max-width:480px;margin:0 16px;border-radius:16px;background:var(--card);border:1px solid var(--border);padding:24px;max-height:80vh;overflow:auto}
.modal .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.modal .modal-header .course-info{display:flex;align-items:center;gap:12px}
.modal .modal-header .course-info .icon{font-size:36px}
.modal .modal-header .course-info h2{font-size:18px;font-weight:700}
.modal .modal-header .course-info p{font-size:12px;color:var(--muted-fg)}
.modal .close-btn{padding:6px;border-radius:8px;color:var(--muted-fg);transition:background .2s}
.modal .close-btn:hover{background:var(--muted)}
.modal .level-item{width:100%;display:flex;align-items:center;gap:12px;padding:12px;border-radius:12px;transition:all .2s;text-align:left;margin-bottom:8px}
.modal .level-item.completed{background:hsla(160,84%,39%,0.1);border:1px solid hsla(160,84%,39%,0.3)}
.modal .level-item.unlocked{background:var(--muted);border:1px solid var(--border)}
.modal .level-item.unlocked:hover{border-color:hsla(187,100%,50%,0.4)}
.modal .level-item.locked{background:hsla(222,30%,15%,0.5);border:1px solid hsla(222,30%,18%,0.5);opacity:0.5;cursor:not-allowed}
.modal .level-circle{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.modal .level-circle.completed{background:var(--secondary);color:var(--secondary-fg)}
.modal .level-circle.unlocked{background:hsla(187,100%,50%,0.2);color:var(--primary);border:1px solid hsla(187,100%,50%,0.4)}
.modal .level-circle.locked{background:var(--muted);color:var(--muted-fg);border:1px solid var(--border)}
.modal .level-title{font-size:14px;font-weight:500}
.modal .level-xp{font-size:10px;color:var(--muted-fg);display:flex;align-items:center;gap:4px;margin-top:2px}
.modal .start-btn{width:100%;margin-top:24px;padding:12px;border-radius:12px;background:var(--primary);color:var(--primary-fg);font-weight:600;font-size:14px;transition:opacity .2s}
.modal .start-btn:hover{opacity:0.9}

/* Lesson Workspace */
.lesson-page{display:flex;flex-direction:column;height:100%}
.lesson-topbar{display:flex;align-items:center;gap:16px;padding:12px 16px;border-bottom:1px solid var(--border);background:hsla(222,40%,10%,0.5)}
.lesson-topbar .back-btn{padding:6px;border-radius:8px;color:var(--muted-fg);transition:background .2s}
.lesson-topbar .back-btn:hover{background:var(--muted)}
.lesson-topbar .progress-area{flex:1}
.lesson-topbar .progress-area .info{display:flex;justify-content:space-between;margin-bottom:4px;font-size:12px}
.lesson-topbar .progress-area .info .label{font-weight:500}
.lesson-topbar .progress-area .info .step{color:var(--muted-fg)}
.lesson-topbar .progress-bar{width:100%;height:8px;background:var(--muted);border-radius:4px;overflow:hidden}
.lesson-topbar .progress-bar .fill{height:100%;background:linear-gradient(to right,var(--primary),var(--secondary));border-radius:4px;transition:width .5s}
.lesson-topbar .xp-badge{font-size:12px;color:var(--primary);font-weight:600;display:flex;align-items:center;gap:4px}
.lesson-body{flex:1;display:flex;overflow:hidden}
.lesson-chat{width:280px;border-right:1px solid var(--border);display:flex;flex-direction:column;background:hsla(222,40%,10%,0.3)}
.lesson-chat .chat-header{padding:12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600}
.lesson-chat .chat-header .bot-icon{color:var(--primary)}
.lesson-chat .chat-messages{flex:1;overflow:auto;padding:12px;display:flex;flex-direction:column;gap:12px}
.lesson-chat .chat-msg{font-size:12px;line-height:1.6;padding:12px;border-radius:12px;max-width:90%}
.lesson-chat .chat-msg.bot{background:var(--muted);color:var(--fg)}
.lesson-chat .chat-msg.user{background:hsla(187,100%,50%,0.1);color:var(--primary);margin-left:auto;border:1px solid hsla(187,100%,50%,0.2)}
.lesson-workspace{flex:1;padding:24px;overflow:auto;display:flex;flex-direction:column}
.lesson-workspace .req-box{margin-bottom:24px;padding:16px;border-radius:12px;background:hsla(222,30%,15%,0.5);border:1px solid var(--border)}
.lesson-workspace .req-box .req-header{display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:14px;font-weight:600}
.lesson-workspace .req-item{display:flex;align-items:center;gap:8px;font-size:12px;margin-bottom:8px}
.lesson-workspace .req-item .check{width:16px;height:16px;border-radius:50%;border:1px solid hsla(215,20%,55%,0.3);display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0}
.lesson-workspace .req-item .check.done{background:var(--secondary);border-color:var(--secondary);color:var(--secondary-fg)}
.lesson-workspace .req-item .check.done + span{color:var(--secondary)}
.lesson-workspace .code-area{margin-bottom:24px}
.lesson-workspace .code-area label{display:block;font-size:12px;font-weight:500;color:var(--muted-fg);margin-bottom:8px}
.lesson-workspace .code-area .assembly{min-height:80px;padding:16px;border-radius:12px;background:var(--card);border:1px solid var(--border);font-family:'Fira Code',monospace;font-size:14px;display:flex;flex-wrap:wrap;gap:8px;align-items:flex-start}
.lesson-workspace .code-area .assembly .placeholder{color:hsla(215,20%,55%,0.5);font-size:12px}
.lesson-workspace .chip{padding:6px 12px;border-radius:8px;font-size:12px;font-family:'Fira Code',monospace;transition:all .2s}
.lesson-workspace .chip.placed{background:hsla(187,100%,50%,0.1);color:var(--primary);border:1px solid hsla(187,100%,50%,0.3)}
.lesson-workspace .chip.placed:hover{background:hsla(187,100%,50%,0.2)}
.lesson-workspace .chip.available{background:var(--muted);color:var(--fg);border:1px solid var(--border)}
.lesson-workspace .chip.available:hover{border-color:hsla(187,100%,50%,0.4);color:var(--primary)}
.lesson-workspace .chip.available:disabled{opacity:0.3;cursor:not-allowed}
.lesson-workspace .chip.available:disabled:hover{border-color:var(--border);color:var(--fg)}
.lesson-workspace .chips-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:24px}
.lesson-workspace .feedback{margin-bottom:16px;padding:12px;border-radius:12px;font-size:12px;display:flex;align-items:flex-start;gap:8px}
.lesson-workspace .feedback.success{background:hsla(160,84%,39%,0.1);border:1px solid hsla(160,84%,39%,0.3);color:var(--secondary)}
.lesson-workspace .feedback.error{background:hsla(0,84%,60%,0.1);border:1px solid hsla(0,84%,60%,0.3);color:var(--destructive)}
.lesson-workspace .actions{display:flex;gap:12px}
.btn-neon{padding:8px 16px;border-radius:8px;background:var(--primary);color:var(--primary-fg);font-weight:600;font-size:13px;transition:opacity .2s;display:flex;align-items:center;gap:4px}
.btn-neon:hover{opacity:0.9}
.btn-outline{padding:8px 16px;border-radius:8px;background:transparent;border:1px solid var(--border);color:var(--fg);font-weight:500;font-size:13px;transition:all .2s;display:flex;align-items:center;gap:4px}
.btn-outline:hover{border-color:hsla(187,100%,50%,0.4);color:var(--primary)}

/* AI Tutor */
.ai-page{display:flex;flex-direction:column;height:100%}
.ai-page .ai-header{padding:24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.ai-page .ai-header .ai-icon{width:40px;height:40px;border-radius:12px;background:hsla(187,100%,50%,0.1);border:1px solid hsla(187,100%,50%,0.3);display:flex;align-items:center;justify-content:center;font-size:20px}
.ai-page .ai-header h2{font-size:18px;font-weight:700}
.ai-page .ai-header p{font-size:12px;color:var(--muted-fg)}
.ai-page .ai-messages{flex:1;overflow:auto;padding:24px;display:flex;flex-direction:column;gap:16px}
.ai-page .ai-msg{max-width:80%;padding:16px;border-radius:16px;font-size:14px;line-height:1.6}
.ai-page .ai-msg.bot{background:var(--muted);border-top-left-radius:4px}
.ai-page .ai-msg.user{background:hsla(187,100%,50%,0.1);color:var(--primary);border:1px solid hsla(187,100%,50%,0.2);margin-left:auto;border-top-right-radius:4px}
.ai-page .ai-input{padding:16px;border-top:1px solid var(--border);background:hsla(222,40%,10%,0.5);display:flex;gap:8px}
.ai-page .ai-input input{flex:1;padding:12px 16px;border-radius:12px;background:var(--muted);border:1px solid var(--border);color:var(--fg);font-size:14px;outline:none;transition:all .2s}
.ai-page .ai-input input:focus{border-color:hsla(187,100%,50%,0.5)}
.ai-page .ai-input button{width:46px;height:46px;border-radius:12px;background:var(--primary);color:var(--primary-fg);display:flex;align-items:center;justify-content:center;font-size:18px;transition:opacity .2s}
.ai-page .ai-input button:hover{opacity:0.9}

/* Founder */
.founder-page{padding:32px;overflow:auto;flex:1}
.founder-page .inner{max-width:560px;margin:0 auto}
.founder-page .avatar{width:96px;height:96px;border-radius:50%;background:linear-gradient(135deg,hsla(187,100%,50%,0.2),hsla(160,84%,39%,0.2));border:2px solid hsla(187,100%,50%,0.3);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:40px}
.founder-page h1{font-size:24px;font-weight:700;text-align:center;margin-bottom:8px}
.founder-page .sub{text-align:center;color:var(--muted-fg);font-size:14px;margin-bottom:32px}
.founder-page .card{background:var(--card);border-radius:16px;border:1px solid var(--border);padding:24px;margin-bottom:24px}
.founder-page .card h2{font-size:18px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.founder-page .card p{font-size:14px;color:var(--muted-fg);line-height:1.7}
.founder-page .social-btns{display:flex;gap:12px}
.founder-page .social-btn{display:flex;align-items:center;gap:8px;padding:10px 16px;border-radius:12px;background:var(--muted);border:1px solid var(--border);font-size:14px;color:var(--muted-fg);transition:all .2s}
.founder-page .social-btn:hover{color:var(--primary);border-color:hsla(187,100%,50%,0.4)}

/* Settings */
.settings-page{padding:32px;overflow:auto;flex:1}
.settings-page .inner{max-width:560px;margin:0 auto}
.settings-page h1{font-size:24px;font-weight:700;margin-bottom:32px;display:flex;align-items:center;gap:12px}
.settings-page h1 .icon{color:var(--primary)}
.settings-page .setting-item{width:100%;display:flex;align-items:center;gap:16px;padding:16px;border-radius:12px;background:var(--card);border:1px solid var(--border);transition:all .2s;text-align:left;margin-bottom:12px}
.settings-page .setting-item:hover{border-color:hsla(187,100%,50%,0.4)}
.settings-page .setting-icon{width:40px;height:40px;border-radius:12px;background:var(--muted);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--primary);font-size:18px}
.settings-page .setting-item h3{font-size:14px;font-weight:600}
.settings-page .setting-item p{font-size:12px;color:var(--muted-fg)}

/* Loading */
.loading-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.spinner{width:40px;height:40px;border:2px solid var(--primary);border-top-color:transparent;border-radius:50%;animation:spin .8s linear infinite}

/* Responsive */
@media(max-width:768px){
.sidebar{position:fixed;left:0;top:0;bottom:0;z-index:40;transform:translateX(-100%);transition:transform .3s}
.sidebar.open{transform:translateX(0)}
.sidebar-backdrop{display:none;position:fixed;inset:0;z-index:39;background:hsla(222,47%,7%,0.7)}
.sidebar-backdrop.open{display:block}
.lesson-chat{width:100%;border-right:none;max-height:200px;border-bottom:1px solid var(--border)}
.lesson-body{flex-direction:column}
}
</style>

// ===== Helpers =====
function calcLevel(xp){return Math.floor(xp/500)+1}
function getToday(){return new Date().toISOString().split('T')[0]}
function $(sel){return document.querySelector(sel)}
function escHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

// ===== Firebase Auth =====
async function fetchOrCreateProgress(u) {
  const ref = db.collection('users').doc(u.uid);
  const snap = await ref.get();
  const today = getToday();
  if(snap.exists){
    const d = snap.data();
    const yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
    const ys = yesterday.toISOString().split('T')[0];
    let ns = d.streak||0;
    if(d.lastLoginDate===ys) ns=d.streak+1;
    else if(d.lastLoginDate!==today) ns=1;
    state.progress = {...d, streak:ns, lastLoginDate:today, level:calcLevel(d.xp||0), completedLessons:d.completedLessons||[], courseProgress:d.courseProgress||{}};
    ref.update({streak:ns, lastLoginDate:today}).catch(()=>{});
  } else {
    const fresh = {xp:0,streak:1,level:1,badges:0,lastLoginDate:today,completedLessons:[],courseProgress:{}};
    await ref.set({...fresh, createdAt:firebase.firestore.FieldValue.serverTimestamp(), displayName:u.displayName||u.email});
    state.progress = fresh;
  }
}

auth.onAuthStateChanged(async u => {
  state.user = u;
  if(u){try{await fetchOrCreateProgress(u)}catch(e){console.error(e)}}
  else{state.progress={xp:0,streak:0,level:1,badges:0,lastLoginDate:'',completedLessons:[],courseProgress:{}}}
  state.loading = false;
  render();
});

async function doSignIn(){
  state.loginError=''; state.loginLoading=true; render();
  try{await auth.signInWithEmailAndPassword(state.loginEmail,state.loginPassword)}
  catch(e){state.loginError=e.message.replace('Firebase: ','');state.loginLoading=false;render()}
}
async function doSignUp(){
  state.loginError=''; state.loginLoading=true; render();
  try{
    const cred = await auth.createUserWithEmailAndPassword(state.loginEmail,state.loginPassword);
    await cred.user.updateProfile({displayName:state.loginName});
  }catch(e){state.loginError=e.message.replace('Firebase: ','');state.loginLoading=false;render()}
}
async function doGoogle(){
  state.loginError=''; state.loginLoading=true; render();
  try{await auth.signInWithPopup(googleProvider)}
  catch(e){state.loginError=e.message.replace('Firebase: ','');state.loginLoading=false;render()}
}
function doLogout(){auth.signOut()}

// ===== Render =====
function render() {
  const app = document.getElementById('app');
  if(state.loading){
    app.innerHTML = `<div class="loading-screen"><div class="spinner"></div></div>`;
    return;
  }
  if(!state.user){
    app.innerHTML = renderLogin();
    bindLogin();
    return;
  }
  app.innerHTML = renderApp();
  bindApp();
}

  const form=$('#loginForm');

    state.loginMode==='signup'?doSignUp():doSignIn();

    case 'settings': return renderSettings();
    case 'lesson': return renderLesson();
    default: return renderDashboard();
  }
}

function bindApp(){
  document.querySelectorAll('[data-page]').forEach(b=>b.onclick=()=>{state.page=b.dataset.page;state.sidebarOpen=false;render()});
  const lb=$('#logoutBtn');if(lb)lb.onclick=doLogout;
  const ts=$('#toggleSidebar');if(ts)ts.onclick=()=>{state.sidebarOpen=!state.sidebarOpen;render()};
  const sb=$('#sidebarBackdrop');if(sb)sb.onclick=()=>{state.sidebarOpen=false;render()};
  // Page-specific bindings
  switch(state.page){
    case 'dashboard': case 'curriculum': bindCatalog(); break;
    case 'ai-tutor': bindAI(); break;
    case 'lesson': bindLesson(); break;
  }
}

      <div class="stat-item"><div class="stat-icon green">${icon('flame')}</div><div><div class="stat-val">${p.streak}</div><div class="stat-label">Day Streak</div></div></div>
      <div class="stat-item"><div class="stat-icon cyan">${icon('trophy')}</div><div><div class="stat-val">${p.badges}</div><div class="stat-label">Badges</div></div></div>
      <div class="stat-item"><div class="stat-icon green">${icon('target')}</div><div><div class="stat-val">Level ${p.level}</div><div class="stat-label">Current Rank</div></div></div>
    </div>
  </div>${renderCatalog()}`;
}

// ===== Catalog =====
function renderCatalog(){
  const filtered = courses.filter(c=>{
    const mc = state.selectedCategory==='All'||c.category===state.selectedCategory;
    const ms = c.name.toLowerCase().includes(state.searchQuery.toLowerCase());
    return mc&&ms;
  });
  return `<div class="catalog anim-slide">
    <div class="header"><h2>${icon('trending',24)} Course Catalog</h2><p>Choose a language. Master it. Level up.</p></div>
    <div class="filters">
      <div class="search-box">${icon('search',16)}<input type="text" placeholder="Search courses..." id="searchInput" value="${escHtml(state.searchQuery)}"></div>
      <div class="cat-pills">${categories.map(c=>`<button class="cat-pill ${state.selectedCategory===c?'active':''}" data-cat="${c}">${c}</button>`).join('')}</div>
    </div>
    <div class="count">${icon('star',14)} ${filtered.length} courses available</div>
    <div class="grid">${filtered.map(c=>`
      <button class="course-card" data-course="${c.id}">
        <div class="top"><span class="icon">${c.icon}</span><span class="cat-badge">${c.category}</span></div>
        <h3>${c.name}</h3>
        <div class="desc">${c.description}</div>
        <div class="bottom"><span class="levels">${c.levels} levels</span><span class="arrow">${icon('chevron',16)}</span></div>
      </button>`).join('')}
    </div>
  </div>
  ${state.selectedCourse?renderModal():''}`;
}

function renderModal(){
  const c=state.selectedCourse;
  const levels=Array.from({length:c.levels},(_,i)=>({id:i+1,title:i===0?'Hello World':i===1?'Variables & Types':i===2?'Control Flow':i===3?'Functions':i===4?'Arrays & Loops':`Level ${i+1}`,unlocked:i<3,completed:i<1,xp:(i+1)*50}));
  return `<div class="modal-overlay" id="modalOverlay">
    <div class="modal anim-slide" id="modalContent">
      <div class="modal-header">
        <div class="course-info"><span class="icon">${c.icon}</span><div><h2>${c.name}</h2><p>${c.levels} levels • ${c.category}</p></div></div>
        <button class="close-btn" id="closeModal">${icon('x',20)}</button>
      </div>
      ${levels.map(l=>`<button class="level-item ${l.completed?'completed':l.unlocked?'unlocked':'locked'}" ${l.unlocked?`data-start-level="${l.id}"`:'disabled'}>
        <div class="level-circle ${l.completed?'completed':l.unlocked?'unlocked':'locked'}">${l.completed?icon('check',16):l.unlocked?icon('play',14):icon('lock',14)}</div>
        <div><div class="level-title">${l.title}</div><div class="level-xp">${icon('star',12)} ${l.xp} XP</div></div>
      </button>`).join('')}
      <button class="start-btn" data-start-level="1">Start Learning</button>
    </div>
  </div>`;
}

function bindCatalog(){
  const si=$('#searchInput');
  if(si)si.oninput=e=>{state.searchQuery=e.target.value;render()};
  document.querySelectorAll('[data-cat]').forEach(b=>b.onclick=()=>{state.selectedCategory=b.dataset.cat;render()});
  document.querySelectorAll('[data-course]').forEach(b=>b.onclick=()=>{state.selectedCourse=courses.find(c=>c.id===b.dataset.course);render()});
  const mo=$('#modalOverlay');if(mo)mo.onclick=e=>{if(e.target===mo){state.selectedCourse=null;render()}};
  const mc=$('#modalContent');if(mc)mc.onclick=e=>e.stopPropagation();
  const cm=$('#closeModal');if(cm)cm.onclick=()=>{state.selectedCourse=null;render()};
  document.querySelectorAll('[data-start-level]').forEach(b=>b.onclick=()=>{
    state.lessonCourse=state.selectedCourse;state.lessonLevel=parseInt(b.dataset.startLevel);
    state.lessonStep=0;state.placedChips=[];state.feedback=null;
    state.checkedReqs=new Array(sampleLesson[0].requirements.length).fill(false);
    state.chatMessages=[{role:'bot',text:sampleLesson[0].botMessage}];
    state.selectedCourse=null;state.page='lesson';render();
  });
}

// ===== Lesson =====
function renderLesson(){
  const step=sampleLesson[state.lessonStep];
  const progress=(state.lessonStep/sampleLesson.length)*100;
  const cid=state.lessonCourse?.id?.toUpperCase()||'';
  return `<div class="lesson-page">
    <div class="lesson-topbar">
      <button class="back-btn" id="lessonBack">${icon('back',20)}</button>
      <div class="progress-area">
        <div class="info"><span class="label">${cid} • Level ${state.lessonLevel}</span><span class="step">Step ${state.lessonStep+1}/${sampleLesson.length}</span></div>
        <div class="progress-bar"><div class="fill" style="width:${progress}%"></div></div>
      </div>
      <div class="xp-badge">${icon('zap',14)} +50 XP</div>
    </div>
    <div class="lesson-body">
      <div class="lesson-chat">
        <div class="chat-header"><span class="bot-icon">${icon('bot',16)}</span> Code Tutor Bot</div>
        <div class="chat-messages">${state.chatMessages.map(m=>`<div class="chat-msg ${m.role}">${escHtml(m.text)}</div>`).join('')}</div>
      </div>
      <div class="lesson-workspace">
        <div class="req-box anim-slide">
          <div class="req-header">${icon('target',16)} 🎯 Requirements</div>
          ${step.requirements.map((r,i)=>`<div class="req-item"><div class="check ${state.checkedReqs[i]?'done':''}">${state.checkedReqs[i]?icon('check',10):''}</div><span>${escHtml(r)}</span></div>`).join('')}
        </div>
        <div class="code-area anim-slide">
          <label>Your Code</label>
          <div class="assembly">${state.placedChips.length===0?'<span class="placeholder">Click chips below to build your code...</span>':state.placedChips.map(id=>{
            const ch=step.chips.find(c=>c.id===id);
            return `<button class="chip placed" data-remove="${id}">${escHtml(ch?.text||'')}</button>`;
          }).join('')}</div>
        </div>
        <div class="code-area">
          <label>Available Chips</label>
          <div class="chips-row">${step.chips.map(ch=>`<button class="chip available" data-add="${ch.id}" ${state.placedChips.includes(ch.id)?'disabled':''}>${escHtml(ch.text)}</button>`).join('')}</div>
        </div>
        ${state.feedback?`<div class="feedback ${state.feedback.type} anim-slide">${state.feedback.type==='success'?icon('check',16):icon('x',16)} ${escHtml(state.feedback.message)}</div>`:''}
        <div class="actions">
          <button class="btn-outline" id="resetBtn">${icon('reset',14)} Reset</button>
          ${state.feedback?.type==='success'?`<button class="btn-neon" id="nextBtn">${state.lessonStep<sampleLesson.length-1?'Next Step →':'Complete Lesson 🎉'}</button>`:`<button class="btn-neon" id="submitBtn">${icon('send',14)} Submit</button>`}
        </div>
      </div>
    </div>
  </div>`;
}

function bindLesson(){
  const bb=$('#lessonBack');if(bb)bb.onclick=()=>{state.page='dashboard';render()};
  document.querySelectorAll('[data-add]').forEach(b=>b.onclick=()=>{if(!state.placedChips.includes(b.dataset.add)){state.placedChips.push(b.dataset.add);state.feedback=null;render()}});
  document.querySelectorAll('[data-remove]').forEach(b=>b.onclick=()=>{state.placedChips=state.placedChips.filter(id=>id!==b.dataset.remove);state.feedback=null;render()});
  const rb=$('#resetBtn');if(rb)rb.onclick=()=>{state.placedChips=[];state.feedback=null;state.checkedReqs=new Array(sampleLesson[state.lessonStep].requirements.length).fill(false);render()};
  const sb=$('#submitBtn');if(sb)sb.onclick=handleSubmitLesson;
  const nb=$('#nextBtn');if(nb)nb.onclick=handleNextStep;
}

function handleSubmitLesson(){
  const step=sampleLesson[state.lessonStep];
  const correct=JSON.stringify(state.placedChips)===JSON.stringify(step.correctOrder);
  const placed=state.placedChips.map(id=>step.chips.find(c=>c.id===id)?.text||'');
  if(correct){
    state.feedback={type:'success',message:'Perfect! 🎉 Your code is correct!'};
    state.chatMessages.push({role:'user',text:'Submit: '+placed.join('')},{role:'bot',text:'Excellent work! ✅ That\'s exactly right. You earned +50 XP!'});
    state.checkedReqs=new Array(step.requirements.length).fill(true);
  } else {
    let msg='Not quite right. ';
    if(state.placedChips.length===0) msg+="You haven't placed any code chips yet!";
    else if(state.placedChips.length<step.correctOrder.length) msg+='Your code is incomplete. Check the requirements.';
    else if(placed.includes('</h2>')) msg+='You used </h2> but your opening tag is <h1>. Tags must match!';
    else if(placed.includes('</div>')) msg+='You used </div> instead of the correct closing tag.';
    else msg+='Check the order. '+step.hint;
    state.feedback={type:'error',message:msg};
    state.chatMessages.push({role:'user',text:'Submit: '+placed.join('')},{role:'bot',text:'🔍 '+msg});
    state.checkedReqs=step.requirements.map((_,i)=>i<state.placedChips.length&&state.placedChips[i]===step.correctOrder[i]);
  }
  render();
}

function handleNextStep(){
  if(state.lessonStep<sampleLesson.length-1){
    state.lessonStep++;
    state.placedChips=[];state.feedback=null;
    state.checkedReqs=new Array(sampleLesson[state.lessonStep].requirements.length).fill(false);
    state.chatMessages.push({role:'bot',text:sampleLesson[state.lessonStep].botMessage});
  } else {
    state.page='dashboard';
  }
  render();
}

// ===== AI Tutor =====
function renderAI(){
  return `<div class="ai-page">
    <div class="ai-header"><div class="ai-icon anim-pulse">${icon('bot',20)}</div><div><h2>AI Coding Copilot</h2><p>Powered by AI • Debug, learn, and build faster</p></div></div>
    <div class="ai-messages" id="aiMsgs">${state.aiMessages.map(m=>`<div class="ai-msg ${m.role} anim-slide">${escHtml(m.text)}</div>`).join('')}</div>
    <div class="ai-input"><input type="text" placeholder="Ask me anything about coding..." id="aiInput" value="${escHtml(state.aiInput)}"><button id="aiSend">${icon('send',18)}</button></div>
  </div>`;
}

function bindAI(){
  const inp=$('#aiInput');const btn=$('#aiSend');
  function send(){
    const v=(inp?.value||'').trim();if(!v)return;
    state.aiMessages.push({role:'user',text:v},{role:'bot',text:"I'm currently in demo mode! To enable real AI responses, connect an AI backend. I'd be happy to help with debugging, explaining concepts, or reviewing your code once connected. 🚀"});
    state.aiInput='';render();
    setTimeout(()=>{const el=$('#aiMsgs');if(el)el.scrollTop=el.scrollHeight},50);
  }
  if(inp){inp.onkeydown=e=>{if(e.key==='Enter')send()};inp.oninput=e=>state.aiInput=e.target.value}
  if(btn)btn.onclick=send;
}

// ===== Founder =====
function renderFounder(){
  return `<div class="founder-page"><div class="inner anim-slide">
    <div style="text-align:center">
      <div class="avatar glow-cyan">${icon('code',40)}</div>
      <h1>The Founder</h1>
      <p class="sub">Creator of BG Code Tutor</p>
    </div>
    <div class="card"><h2><span style="color:var(--destructive)">${icon('heart',16)}</span> Our Mission</h2><p>BG Code Tutor was born from a simple belief: learning to code should feel like playing a game, not reading a textbook. We combine interactive chip-based exercises, AI-powered tutoring, and a gamified progression system to make programming accessible and fun for everyone.</p></div>
    <div class="card"><h2>Connect</h2><div class="social-btns">
      <button class="social-btn glow-cyan-hover">${icon('globe',16)} Website</button>
      <button class="social-btn glow-cyan-hover">${icon('github',16)} GitHub</button>
      <button class="social-btn glow-cyan-hover">${icon('linkedin',16)} LinkedIn</button>
    </div></div>
  </div></div>`;
}

// ===== Settings =====
function renderSettings(){
  return `<div class="settings-page"><div class="inner anim-slide">
    <h1><span class="icon">${icon('settings',24)}</span> Settings</h1>
    ${[['user','Profile','Manage your account details and avatar'],['bell','Notifications','Configure learning reminders and alerts'],['palette','Appearance','Theme and display preferences'],['shield','Privacy & Security','Password, 2FA, and data settings']].map(([ic,t,d])=>
      `<button class="setting-item glow-cyan-hover"><div class="setting-icon">${icon(ic,20)}</div><div><h3>${t}</h3><p>${d}</p></div></button>`
    ).join('')}
    <p style="text-align:center;font-size:12px;color:var(--muted-fg);margin-top:32px">Sign in with Email or Google to sync your progress across devices.</p>
  </div></div>`;
}

// ===== Init =====
window.addEventListener('resize',()=>{if(window.innerWidth>768)state.sidebarOpen=false});
render();
</script>
