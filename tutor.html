<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeBrutal | Free Coding Lessons</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg: #F0F0F0;
            --primary: #A3E635;
            --secondary: #FB923C;
            --accent: #818CF8;
            --white: #ffffff;
            --black: #000000;
            --error: #FF5F5F;
            --border: 3px solid #000000;
            --shadow: 5px 5px 0px #000000;
        }

        * { box-sizing: border-box; font-family: 'Space Grotesk', sans-serif; }
        body { background-color: var(--bg); margin: 0; padding-bottom: 50px; }

        /* Neubrutalism UI */
        nav {
            background: var(--white);
            border-bottom: var(--border);
            padding: 15px 20px;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100;
        }
        .logo { font-weight: 900; font-size: 1.5rem; }

        .card {
            background: var(--white); border: var(--border);
            box-shadow: var(--shadow); padding: 25px; margin-bottom: 20px;
        }

        .btn {
            background: var(--primary); border: var(--border);
            box-shadow: var(--shadow); padding: 12px 20px;
            font-weight: bold; cursor: pointer; display: flex;
            align-items: center; justify-content: center; gap: 8px;
            width: 100%; font-size: 1rem;
        }
        .btn:active { transform: translate(3px, 3px); box-shadow: 0px 0px 0px black; }
        .btn-google { background: white; margin-top: 10px; }
        .btn-link { background: none; border: none; box-shadow: none; text-decoration: underline; cursor: pointer; width: auto; margin: 0 auto; display: block; margin-top: 15px;}

        input {
            width: 100%; padding: 12px; margin: 8px 0 15px 0;
            border: var(--border); font-size: 1rem; outline: none;
        }
        input:focus { background: #fdfdfd; border-color: var(--accent); }

        .view { display: none; padding: 20px; max-width: 500px; margin: 0 auto; }
        .view.active { display: block; }

        .stats-bar { display: flex; gap: 15px; font-weight: bold; align-items: center; }
        #error-msg { color: var(--error); font-weight: bold; margin-bottom: 10px; text-align: center; }

        /* Code Editor */
        textarea {
            width: 100%; height: 180px; background: #222; color: #0f0;
            padding: 15px; border: var(--border); font-family: monospace;
        }
        iframe { width: 100%; height: 120px; background: white; border: var(--border); margin-top: 10px;}
    </style>
</head>
<body>

    <nav>
        <div class="logo">CODEBRUTAL</div>
        <div id="nav-stats" class="stats-bar hidden">
            <span>🔥 <span id="user-streak">0</span></span>
            <span>⚡ <span id="user-xp">0</span></span>
            <button onclick="logout()" style="border:none; background:none; cursor:pointer;"><i data-lucide="log-out"></i></button>
        </div>
    </nav>

    <!-- AUTH VIEW -->
    <div id="auth-view" class="view active">
        <div class="card">
            <h1 id="auth-title" style="margin-top:0">Welcome!</h1>
            <div id="error-msg"></div>
            
            <div id="signup-fields">
                <label>Full Name</label>
                <input type="text" id="auth-name" placeholder="John Doe">
            </div>

            <label>Email</label>
            <input type="email" id="auth-email" placeholder="hello@example.com">
            
            <label>Password</label>
            <input type="password" id="auth-pass" placeholder="••••••••">

            <button class="btn" id="main-auth-btn" onclick="handleEmailAuth()">Create Account</button>
            
            <div style="text-align: center; margin: 15px 0;">OR</div>

            <button class="btn btn-google" onclick="loginGoogle()">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/button/google/web/desktop/1x/g_logo.png" width="18">
                Continue with Google
            </button>

            <button class="btn-link" id="toggle-auth-mode" onclick="toggleAuthMode()">
                Already have an account? Log In
            </button>
        </div>
    </div>

    <!-- DASHBOARD VIEW -->
    <div id="dashboard-view" class="view">
        <h2 id="welcome-msg">Hi there!</h2>
        <div id="roadmap-container"></div>
    </div>

    <!-- LESSON VIEW -->
    <div id="lesson-view" class="view">
        <button class="btn-link" onclick="showView('dashboard-view')" style="margin:0 0 10px 0">← Back to Roadmap</button>
        <div class="card">
            <h2 id="lesson-title"></h2>
            <p id="lesson-theory"></p>
        </div>
        <textarea id="code-input" spellcheck="false"></textarea>
        <iframe id="preview"></iframe>
        <div id="feedback" style="margin-top:15px; font-weight:bold"></div>
        <button class="btn" style="margin-top:15px" onclick="checkCode()">Submit Answer</button>
    </div>

    <script>
        // 1. CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyDwVt9oEUVKgYLgqThbYldIbq8HTm_eTmg",
            authDomain: "bg-code-tutor.firebaseapp.com",
            projectId: "bg-code-tutor",
            storageBucket: "bg-code-tutor.firebasestorage.app",
            messagingSenderId: "129372610030",
            appId: "1:129372610030:web:3b72e4ad2dba22951282ff"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // 2. STATE
        let isLoginMode = false; // Toggle between login and signup
        let userData = { xp: 0, streak: 0, completed: [] };
        let currentLesson = null;
        const LESSONS = [
            { id: 'h1', title: 'The Headline', theory: 'Use &lt;h1&gt;Hello&lt;/h1&gt; to create a main heading.', solution: '<h1>Hello</h1>', xp: 10 },
            { id: 'h2', title: 'Paragraphs', theory: 'Use &lt;p&gt;World&lt;/p&gt; for text paragraphs.', solution: '<p>World</p>', xp: 10 }
        ];

        // 3. AUTH LOGIC
        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').innerText = isLoginMode ? "Welcome Back!" : "Create Account";
            document.getElementById('signup-fields').style.display = isLoginMode ? "none" : "block";
            document.getElementById('main-auth-btn').innerText = isLoginMode ? "Log In" : "Create Account";
            document.getElementById('toggle-auth-mode').innerText = isLoginMode ? "New here? Create account" : "Already have an account? Log In";
        }

        async function handleEmailAuth() {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            const name = document.getElementById('auth-name').value;
            const errorEl = document.getElementById('error-msg');
            errorEl.innerText = "";

            try {
                if (isLoginMode) {
                    await auth.signInWithEmailAndPassword(email, pass);
                } else {
                    if(!name) throw new Error("Please enter your name.");
                    const res = await auth.createUserWithEmailAndPassword(email, pass);
                    // Set display name for email user
                    await res.user.updateProfile({ displayName: name });
                    await syncUserToFirestore(res.user, name);
                }
            } catch (err) {
                errorEl.innerText = err.message;
            }
        }

        function loginGoogle() {
            auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
        }

        function logout() { auth.signOut(); }

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                await syncUserToFirestore(user);
                showView('dashboard-view');
                document.getElementById('nav-stats').classList.remove('hidden');
                renderRoadmap();
            } else {
                showView('auth-view');
                document.getElementById('nav-stats').classList.add('hidden');
            }
        });

        // 4. DATA SYNC
        async function syncUserToFirestore(user, nameOverride) {
            const userRef = db.collection('users').doc(user.uid);
            const doc = await userRef.get();
            if (!doc.exists) {
                userData = { 
                    name: nameOverride || user.displayName || 'Coder', 
                    xp: 0, streak: 1, completed: [], 
                    last_active: firebase.firestore.FieldValue.serverTimestamp() 
                };
                await userRef.set(userData);
            } else {
                userData = doc.data();
            }
            updateUIStats();
        }

        function updateUIStats() {
            document.getElementById('user-xp').innerText = userData.xp;
            document.getElementById('user-streak').innerText = userData.streak;
            document.getElementById('welcome-msg').innerText = `Hi, ${userData.name}!`;
        }

        // 5. LESSON ENGINE
        function showView(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function renderRoadmap() {
            const container = document.getElementById('roadmap-container');
            container.innerHTML = '<h3>HTML Basics</h3>';
            LESSONS.forEach((l) => {
                const done = userData.completed.includes(l.id);
                const card = document.createElement('div');
                card.className = 'card';
                card.style.cursor = 'pointer';
                card.style.display = 'flex';
                card.style.justifyContent = 'space-between';
                card.innerHTML = `<span>${done ? '✅' : '⚪'} ${l.title}</span> <span>${l.xp} XP</span>`;
                card.onclick = () => startLesson(l);
                container.appendChild(card);
            });
            lucide.createIcons();
        }

        function startLesson(l) {
            currentLesson = l;
            document.getElementById('lesson-title').innerText = l.title;
            document.getElementById('lesson-theory').innerHTML = l.theory;
            document.getElementById('code-input').value = "";
            document.getElementById('feedback').innerText = "";
            document.getElementById('preview').srcdoc = "";
            
            document.getElementById('code-input').oninput = (e) => {
                document.getElementById('preview').srcdoc = e.target.value;
            };
            showView('lesson-view');
        }

        async function checkCode() {
            const code = document.getElementById('code-input').value.replace(/\s/g, '').toLowerCase();
            const sol = currentLesson.solution.replace(/\s/g, '').toLowerCase();

            if (code.includes(sol)) {
                document.getElementById('feedback').innerHTML = "🔥 CORRECT!";
                if (!userData.completed.includes(currentLesson.id)) {
                    userData.xp += currentLesson.xp;
                    userData.completed.push(currentLesson.id);
                    await db.collection('users').doc(auth.currentUser.uid).update({
                        xp: userData.xp,
                        completed: userData.completed
                    });
                    updateUIStats();
                }
                setTimeout(() => showView('dashboard-view'), 1200);
            } else {
                document.getElementById('feedback').innerHTML = "❌ Try again!";
            }
        }

        lucide.createIcons();
    </script>
</body>
</html>
