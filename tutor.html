<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BG Code Tutor | Ultimate Edition</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body { margin: 0; padding: 0; background: #0B1121; color: #E2F0FF; overflow-x: hidden; }
        #root { min-height: 100vh; }
        
        /* Custom Animations */
        @keyframes blink { 0%, 100% { opacity: 0.25; } 50% { opacity: 1; } }
        @keyframes livePulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
        @keyframes shakeAnim { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-44px); } }
        @keyframes logoSpin { 0% { transform: scale(1); } 50% { transform: scale(1.05); filter: drop-shadow(0 0 10px #00E5FF); } 100% { transform: scale(1); } }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0B1121; }
        ::-webkit-scrollbar-thumb { background: #1C2D45; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        const LOGO_URL = "https://i.ibb.co/23sCRprR/a-typography-focused-logo-design-where-t-tm-Ao4-Mz-ZRh-WLFpd-XKmn-VUg-IEETGPFQTTSk4x9-CJAWTz-Q-sd.jpg";

        /* ─────────────────────────────────────────────────────────
           FIREBASE CONFIG
        ───────────────────────────────────────────────────────── */
        const FB_CONFIG = {
            apiKey: "AIzaSyDwVt9oEUVKgYLgqThbYldIbq8HTm_eTmg",
            authDomain: "bg-code-tutor.firebaseapp.com",
            projectId: "bg-code-tutor",
            storageBucket: "bg-code-tutor.firebasestorage.app",
            messagingSenderId: "129372610030",
            appId: "1:129372610030:web:3b72e4ad2dba22951282ff",
            measurementId: "G-PYYXTLRN4X",
        };

        let _auth = null, _db = null, _gProvider = null;
        async function getFirebase() {
            if (_auth) return { auth:_auth, db:_db, gProvider:_gProvider };
            const { initializeApp, getApps } = await import("https://esm.sh/firebase@10.7.1/app");
            const { getAuth, GoogleAuthProvider } = await import("https://esm.sh/firebase@10.7.1/auth");
            const { getFirestore } = await import("https://esm.sh/firebase@10.7.1/firestore");
            const app = getApps().length ? getApps()[0] : initializeApp(FB_CONFIG);
            _auth = getAuth(app);
            _db = getFirestore(app);
            _gProvider = new GoogleAuthProvider();
            return { auth:_auth, db:_db, gProvider:_gProvider };
        }

        const C = {
            bg:'#0B1121', surface:'#0D1628', card:'#111827',
            cardHover:'#141E32', border:'#1C2D45', borderBright:'#243D5C',
            cyan:'#00E5FF', green:'#00FF88', orange:'#FF7A3D',
            purple:'#A855F7', pink:'#FF3D7F', amber:'#FFB830',
            text:'#E2F0FF', muted:'#5C7EA8', dim:'#1C2D45', dimText:'#3A5474',
            danger:'#FF4560',
        };

        const STEPS = [
            { id:0, type:'bot', text:"Hey there! 👋 I'm BG — your personal code tutor. Today we're building your very first webpage. Excited? You should be!" },
            { id:1, type:'bot', text:"HTML stands for HyperText Markup Language. Every website you've visited — Google, YouTube, Instagram — all start with HTML. It's the skeleton of the web." },
            { id:2, type:'code', text:"This is an <h1> tag — it creates a big bold heading. The browser renders it large. Check the live preview →", code:'<h1>Hello, World!</h1>', bodyHtml:'<h1 style="color:#00E5FF;font-family:sans-serif;margin:0">Hello, World!</h1>', xp:10 },
            { id:3, type:'mcq', text:"Quick checkpoint! What does HTML stand for?", question:"What does HTML stand for?", opts:["HyperText Markup Language","High Transfer Machine Language","Hyperlink Text Manipulation Logic","Home Tool Markup Language"], correct:0, xp:20 },
            { id:4, type:'chips', text:"Your turn! Tap blocks IN ORDER to write a heading 'I am a coder':", chips:["<h1>","I am a coder","</h1>"], correct:[0,1,2], bodyHtml:'<h1 style="color:#00FF88;font-family:sans-serif;margin:0">I am a coder</h1>', xp:30 },
            { id:5, type:'bot', text:"🔥 NAILED IT! You just wrote real HTML — the same syntax powering billions of websites. Remember this moment." },
            { id:6, type:'chips', text:"Now add a paragraph. A <p> tag creates body text. Assemble it:", chips:["<p>","I love coding!","</p>"], correct:[0,1,2], bodyHtml:'<h1 style="color:#00FF88;font-family:sans-serif;margin:0 0 12px">I am a coder</h1><p style="color:#E2F0FF;font-family:sans-serif;margin:0">I love coding!</p>', xp:30 },
            { id:7, type:'mcq', text:"HTML has 6 heading levels (h1–h6). Which creates the largest heading?", question:"Which tag creates the largest heading?", opts:["<h6>","<heading>","<title>","<h1>"], correct:3, xp:20 },
            { id:8, type:'chips', text:"Grand finale! Build a button that says 'Click Me!':", chips:["<button>","Click Me!","</button>"], correct:[0,1,2], bodyHtml:'<h1 style="color:#00FF88;font-family:sans-serif;margin:0 0 12px">I am a coder</h1><p style="color:#E2F0FF;font-family:sans-serif;margin:0 0 16px">I love coding!</p><button style="background:#00E5FF;border:none;padding:11px 26px;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;color:#0B1121">Click Me!</button>', xp:40 },
            { id:9, type:'complete', text:"🎉 LESSON COMPLETE! You built a real webpage — heading, paragraph, button. That's HTML. That's YOU. Welcome to the developer world.", xp:50 },
        ];

        const CATALOG = [
            { id:'web', label:'Web Dev', color:C.cyan, emoji:'🌐', courses:[
                { id:'html', title:'HTML Fundamentals', emoji:'📄', unlocked:true,  lessons:12, desc:'Structure the web from scratch' },
                { id:'css',  title:'CSS Styling',        emoji:'🎨', unlocked:false, lessons:15, desc:'Make pages beautiful & responsive' },
            ]}
        ];

        function XPBar({ xp, max=200 }) {
            const pct = Math.min((xp/max)*100,100);
            return (
                <div style={{ display:'flex', alignItems:'center', gap:7 }}>
                    <span style={{ color:C.amber, fontSize:11, fontWeight:700 }}>⚡{xp} XP</span>
                    <div style={{ width:72, height:5, background:C.dim, borderRadius:3, overflow:'hidden' }}>
                        <div style={{ width:`${pct}%`, height:'100%', background:`linear-gradient(90deg,${C.cyan},${C.green})` }} />
                    </div>
                </div>
            );
        }

        /* ─────────────────────────────────────────────────────────
           AUTH SCREEN
        ───────────────────────────────────────────────────────── */
        function AuthScreen({ onLogin }) {
            const [mode,setMode] = useState('login');
            const [email,setEmail] = useState('');
            const [pass,setPass] = useState('');
            const [loading,setLoading] = useState(false);

            const handleEmail = async () => {
                setLoading(true);
                try {
                    const { auth } = await getFirebase();
                    const { signInWithEmailAndPassword } = await import("https://esm.sh/firebase@10.7.1/auth");
                    await signInWithEmailAndPassword(auth, email, pass);
                } catch(e) { alert("Auth Error"); }
                setLoading(false);
            };

            return (
                <div style={{ minHeight:'100vh', background:C.bg, display:'flex', alignItems:'center', justifyContent:'center', fontFamily:"'JetBrains Mono',monospace" }}>
                    <div style={{ width:420, background:C.card, border:`1px solid ${C.border}`, borderRadius:22, padding:'44px 40px', textAlign:'center' }}>
                        <img src={LOGO_URL} style={{ width:80, height:80, borderRadius:15, marginBottom:20, border:`2px solid ${C.border}` }} />
                        <h1 style={{ color:C.cyan, margin:'0 0 10px 0', fontSize:22 }}>BG Code Tutor</h1>
                        <p style={{ color:C.muted, fontSize:12, marginBottom:30 }}>Build the future, one tag at a time.</p>
                        
                        <input value={email} onChange={e=>setEmail(e.target.value)} placeholder="Email" style={{ width:'100%', padding:12, marginBottom:10, borderRadius:10, border:`1px solid ${C.border}`, background:C.surface, color:'#fff' }} />
                        <input type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="Password" style={{ width:'100%', padding:12, marginBottom:20, borderRadius:10, border:`1px solid ${C.border}`, background:C.surface, color:'#fff' }} />
                        
                        <button onClick={handleEmail} style={{ width:'100%', padding:14, background:C.cyan, color:C.bg, border:'none', borderRadius:10, fontWeight:700, cursor:'pointer' }}>
                            {loading ? 'Connecting...' : 'Sign In →'}
                        </button>
                    </div>
                </div>
            );
        }

        /* ─────────────────────────────────────────────────────────
           HOME SCREEN
        ───────────────────────────────────────────────────────── */
        function HomeScreen({ user, xp, onStartLesson, onLogout }) {
            return (
                <div style={{ minHeight:'100vh', background:C.bg, fontFamily:"'JetBrains Mono',monospace" }}>
                    <div style={{ background:C.card, borderBottom:`1px solid ${C.border}`, padding:'0 30px', display:'flex', alignItems:'center', gap:16, height:65 }}>
                        <div style={{ display:'flex', alignItems:'center', gap:12, marginRight:'auto' }}>
                            <img src={LOGO_URL} style={{ width:35, height:35, borderRadius:8, border:`1px solid ${C.border}` }} />
                            <span style={{ color:C.cyan, fontWeight:700 }}>BG Code Tutor</span>
                        </div>
                        <XPBar xp={xp} />
                        <div onClick={onLogout} style={{ width:34, height:34, borderRadius:'50%', background:C.cyan, color:C.bg, display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', fontWeight:700 }}>
                            {user.avatar}
                        </div>
                    </div>

                    <div style={{ padding:'40px 60px' }}>
                        <h1>Welcome back, {user.name}!</h1>
                        <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(250px, 1fr))', gap:20, marginTop:30 }}>
                            {CATALOG[0].courses.map(c => (
                                <div key={c.id} onClick={onStartLesson} style={{ background:C.card, border:`1px solid ${C.border}`, padding:25, borderRadius:20, cursor:'pointer' }}>
                                    <div style={{ fontSize:30, marginBottom:10 }}>{c.emoji}</div>
                                    <h3>{c.title}</h3>
                                    <p style={{ color:C.muted, fontSize:12 }}>{c.desc}</p>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        /* ─────────────────────────────────────────────────────────
           ROOT APP
        ───────────────────────────────────────────────────────── */
        function App() {
            const [screen,setScreen] = useState('loading');
            const [user,setUser] = useState(null);
            const [xp,setXp] = useState(120);

            useEffect(()=>{
                (async()=>{
                    try {
                        const { auth } = await getFirebase();
                        const { onAuthStateChanged } = await import("https://esm.sh/firebase@10.7.1/auth");
                        onAuthStateChanged(auth, u =>{
                            if (u) {
                                setUser({ name:u.displayName || "Coder", email:u.email, avatar:u.email[0].toUpperCase() });
                                setScreen('home');
                            } else {
                                setScreen('auth');
                            }
                        });
                    } catch { setScreen('auth'); }
                })();
            },[]);

            if (screen==='loading') return (
                <div style={{ display:'flex', height:'100vh', alignItems:'center', justifyContent:'center', flexDirection:'column', background:C.bg }}>
                    <img src={LOGO_URL} style={{ width:100, height:100, borderRadius:20, animation:'logoSpin 2s infinite ease-in-out', border:`2px solid ${C.cyan}` }} />
                    <p style={{ color:C.cyan, marginTop:20, letterSpacing:2 }}>INITIALIZING BG TUTOR...</p>
                </div>
            );
            
            if (screen==='auth') return <AuthScreen onLogin={() => setScreen('home')} />;
            return <HomeScreen user={user} xp={xp} onStartLesson={() => alert("Starting Lesson...")} onLogout={() => setScreen('auth')} />;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
