<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BG Code Tutor — Learn. Code. Level Up.</title>
    <meta name="description" content="Interactive coding tutor with gamified lessons for HTML, CSS, JavaScript, and more.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-analytics-compat.js"></script>

    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root {
            --bg: hsl(222, 47%, 7%);
            --fg: hsl(210, 40%, 92%);
            --card: hsl(222, 40%, 10%);
            --primary: hsl(187, 100%, 50%);
            --primary-fg: hsl(222, 47%, 7%);
            --secondary: hsl(160, 84%, 39%);
            --muted: hsl(222, 30%, 15%);
            --muted-fg: hsl(215, 20%, 55%);
            --border: hsl(222, 30%, 18%);
            --accent: hsl(222, 30%, 18%);
            --destructive: hsl(0, 84%, 60%);
        }

        html, body { height: 100%; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--fg); overflow: hidden; }
        button { cursor: pointer; border: none; background: none; font-family: inherit; color: inherit; }
        input { font-family: inherit; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: hsl(222, 30%, 25%); border-radius: 3px; }

        /* Animations */
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .anim-slide { animation: slideUp 0.4s ease-out forwards; }

        #app { display: flex; height: 100vh; width: 100%; }

        /* Sidebar */
        .sidebar {
            width: 260px; background: hsl(222, 47%, 5%); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; padding: 24px 0; flex-shrink: 0; transition: transform 0.3s;
        }
        .sidebar .logo-area { padding: 0 20px; margin-bottom: 30px; display: flex; align-items: center; gap: 12px; }
        .sidebar .logo-area img { width: 40px; height: 40px; border-radius: 10px; box-shadow: 0 0 15px var(--primary); }
        .sidebar .logo-text h1 { font-size: 16px; font-weight: 800; letter-spacing: -0.5px; }
        .sidebar .logo-text p { font-size: 10px; color: var(--muted-fg); }

        .sidebar nav { flex: 1; }
        .sidebar nav button {
            width: 100%; display: flex; align-items: center; gap: 12px; padding: 12px 20px;
            font-size: 14px; color: var(--muted-fg); transition: 0.2s;
        }
        .sidebar nav button:hover, .sidebar nav button.active { color: var(--primary); background: var(--accent); }
        .sidebar nav button.active { border-right: 3px solid var(--primary); }

        /* Main Section */
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .topbar { height: 56px; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; border-bottom: 1px solid var(--border); background: rgba(0,0,0,0.2); }
        .content { flex: 1; overflow-y: auto; padding: 30px; }

        /* Dashboard Stats */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 16px; border: 1px solid var(--border); }
        .stat-card span { display: block; font-size: 12px; color: var(--muted-fg); margin-bottom: 4px; }
        .stat-card b { font-size: 20px; color: var(--primary); }

        /* Course Catalog */
        .search-box { margin-bottom: 24px; max-width: 400px; position: relative; }
        .search-box input { width: 100%; padding: 12px 16px; background: var(--muted); border: 1px solid var(--border); border-radius: 12px; color: white; outline: none; transition: 0.2s; }
        .search-box input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(187, 100, 50, 0.2); }

        .course-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; }
        .course-card { background: var(--card); padding: 24px; border-radius: 20px; border: 1px solid var(--border); transition: 0.3s; text-align: left; }
        .course-card:hover { border-color: var(--primary); transform: translateY(-5px); }
        .course-card .icon { font-size: 32px; margin-bottom: 16px; display: block; }
        .course-card h3 { margin-bottom: 8px; }
        .course-card p { font-size: 13px; color: var(--muted-fg); line-height: 1.5; }

        /* Lesson Workspace */
        .lesson-ui { display: flex; height: 100%; gap: 1px; background: var(--border); }
        .instruction-pane { width: 320px; background: var(--bg); padding: 24px; overflow-y: auto; border-right: 1px solid var(--border); }
        .workspace-pane { flex: 1; background: var(--bg); padding: 40px; display: flex; flex-direction: column; }
        .code-assembly { min-height: 120px; background: var(--card); border: 2px dashed var(--border); border-radius: 16px; padding: 20px; display: flex; flex-wrap: wrap; gap: 12px; margin: 24px 0; }
        .chip { padding: 10px 18px; background: var(--muted); border-radius: 10px; font-family: 'Fira Code', monospace; font-size: 14px; border: 1px solid var(--border); transition: 0.2s; }
        .chip:hover { border-color: var(--primary); color: var(--primary); }
        .chip.active { background: rgba(187, 100, 50, 0.1); border-color: var(--primary); color: var(--primary); }
        
        .btn-action { padding: 14px 28px; background: var(--primary); color: var(--primary-fg); border-radius: 12px; font-weight: 700; margin-top: auto; transition: 0.2s; }
        .btn-action:hover { opacity: 0.9; transform: scale(1.02); }

        /* Auth */
        .auth-container { height: 100vh; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle at center, #1a1c2c, #0d0f17); }
        .auth-card { width: 100%; max-width: 400px; background: var(--card); padding: 40px; border-radius: 24px; border: 1px solid var(--border); text-align: center; }
        .google-btn { width: 100%; padding: 14px; background: white; color: black; border-radius: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 20px; }

        @media (max-width: 768px) {
            .sidebar { position: fixed; left: 0; top: 0; bottom: 0; z-index: 1000; transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .instruction-pane { display: none; }
        }
    </style>
</head>
<body>

    <div id="app"></div>

    <script>
        // --- 1. CONFIGURATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyDwVt9oEUVKgYLgqThbYldIbq8HTm_eTmg",
            authDomain: "bg-code-tutor.firebaseapp.com",
            projectId: "bg-code-tutor",
            storageBucket: "bg-code-tutor.firebasestorage.app",
            messagingSenderId: "129372610030",
            appId: "1:129372610030:web:3b72e4ad2dba22951282ff",
            measurementId: "G-PYYXTLRN4X"
        };

        const LOGO_URL = "https://cdn-icons-png.flaticon.com/512/919/919827.png"; // Placeholder for BG Logo

        // --- 2. INITIALIZATION ---
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const analytics = firebase.analytics();

        const state = {
            user: null,
            progress: { xp: 0, level: 1, streak: 0, completed: [] },
            page: 'dashboard',
            loading: true,
            sidebarOpen: false,
            placedChips: []
        };

        const courses = [
            { id: 'html', name: 'HTML5 Mastery', icon: '🌐', desc: 'Build the skeleton of the internet.' },
            { id: 'css', name: 'Modern CSS', icon: '🎨', desc: 'Design beautiful, responsive UI.' },
            { id: 'js', name: 'JavaScript ES6', icon: '⚡', desc: 'Power logic and interactivity.' },
            { id: 'py', name: 'Python Pro', icon: '🐍', desc: 'Master automation and AI.' }
        ];

        // --- 3. CORE LOGIC ---
        function calcLevel(xp) { 
            // Leveling curve: Level 1 = 0XP, Lvl 2 = 100XP, Lvl 3 = 400XP, Lvl 4 = 900XP...
            return Math.floor(Math.sqrt(xp / 100)) + 1; 
        }

        const $ = (sel) => document.querySelector(sel);

        // --- 4. AUTH HANDLERS ---
        auth.onAuthStateChanged(async (user) => {
            state.user = user;
            if (user) {
                const doc = await db.collection('users').doc(user.uid).get();
                if (doc.exists) {
                    state.progress = doc.data();
                    state.progress.level = calcLevel(state.progress.xp || 0);
                } else {
                    const initialData = { xp: 0, streak: 1, completed: [] };
                    await db.collection('users').doc(user.uid).set(initialData);
                    state.progress = initialData;
                }
            }
            state.loading = false;
            render();
        });

        async function loginWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            try { await auth.signInWithPopup(provider); } catch (e) { alert(e.message); }
        }

        // --- 5. UI ACTIONS ---
        function navigate(page) {
            state.page = page;
            state.sidebarOpen = false;
            render();
        }

        function startChallenge(courseId) {
            state.page = 'lesson';
            state.placedChips = [];
            render();
        }

        function toggleChip(chipText) {
            if (state.placedChips.includes(chipText)) {
                state.placedChips = state.placedChips.filter(c => c !== chipText);
            } else {
                state.placedChips.push(chipText);
            }
            render();
        }

        async function submitCode() {
            const code = state.placedChips.join('');
            // Simple validation for Level 1 demo
            if (code === '<h1>Hello World</h1>') {
                alert("🎉 Amazing! You solved it! +50 XP");
                state.progress.xp += 50;
                state.progress.level = calcLevel(state.progress.xp);
                await db.collection('users').doc(state.user.uid).update({ xp: state.progress.xp });
                navigate('dashboard');
            } else {
                alert("❌ Not quite. Check the order of your tags!");
            }
        }

        // --- 6. RENDER ENGINE ---
        function render() {
            const root = $('#app');
            if (state.loading) {
                root.innerHTML = '<div style="margin:auto; color:var(--primary)">INITIALIZING BG CODE...</div>';
                return;
            }

            if (!state.user) {
                root.innerHTML = `
                    <div class="auth-container">
                        <div class="auth-card anim-slide">
                            <h1 style="color:var(--primary); margin-bottom:10px">BG Code Tutor</h1>
                            <p style="color:var(--muted-fg)">Learn. Code. Level Up.</p>
                            <button class="google-btn" onclick="loginWithGoogle()">
                                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="20">
                                Sign in with Google
                            </button>
                        </div>
                    </div>`;
                return;
            }

            root.innerHTML = `
                <div class="sidebar ${state.sidebarOpen ? 'open' : ''}">
                    <div class="logo-area">
                        <div style="background:var(--primary); width:35px; height:35px; border-radius:8px"></div>
                        <div class="logo-text"><h1>BG CODE</h1><p>Pro Learner</p></div>
                    </div>
                    <nav>
                        <button onclick="navigate('dashboard')" class="${state.page === 'dashboard' ? 'active' : ''}">Dashboard</button>
                        <button onclick="navigate('curriculum')" class="${state.page === 'curriculum' ? 'active' : ''}">Courses</button>
                        <button onclick="navigate('ai')" class="${state.page === 'ai' ? 'active' : ''}">AI Assistant</button>
                    </nav>
                    <div style="padding:20px; border-top:1px solid var(--border)">
                        <button style="color:var(--destructive); font-size:13px" onclick="auth.signOut()">Logout</button>
                    </div>
                </div>
                <div class="main">
                    <div class="topbar">
                        <button onclick="state.sidebarOpen=true; render()" style="display:flex; align-items:center">${state.sidebarOpen ? '' : '☰'}</button>
                        <div style="font-size:14px; font-weight:600">Level ${state.progress.level} Developer</div>
                        <div style="width:32px; height:32px; background:var(--muted); border-radius:50%"></div>
                    </div>
                    <div class="content">
                        ${renderPage()}
                    </div>
                </div>`;

            attachSearchLogic();
        }

        function renderPage() {
            if (state.page === 'dashboard') {
                return `
                    <div class="anim-slide">
                        <h2 style="margin-bottom:24px">Welcome back, ${state.user.displayName.split(' ')[0]}!</h2>
                        <div class="stats-grid">
                            <div class="stat-card"><span>TOTAL XP</span><b>${state.progress.xp}</b></div>
                            <div class="stat-card"><span>CURRENT RANK</span><b>Level ${state.progress.level}</b></div>
                            <div class="stat-card"><span>STREAK</span><b>${state.progress.streak} Days</b></div>
                        </div>
                        
                        <div class="search-box">
                            <input type="text" id="courseSearch" placeholder="Search for a skill (e.g. 'html')...">
                        </div>

                        <div class="course-grid">
                            ${courses.map(c => `
                                <div class="course-card" onclick="startChallenge('${c.id}')">
                                    <span class="icon">${c.icon}</span>
                                    <h3>${c.name}</h3>
                                    <p>${c.desc}</p>
                                </div>
                            `).join('')}
                        </div>
                    </div>`;
            }

            if (state.page === 'lesson') {
                return `
                    <div class="lesson-ui anim-slide" style="margin:-30px; height:calc(100% + 60px)">
                        <div class="instruction-pane">
                            <h3 style="color:var(--primary); margin-bottom:16px">The Challenge</h3>
                            <p style="font-size:14px; line-height:1.6; color:var(--fg)">
                                Every webpage starts with a heading. Your task is to build a top-level heading tag (h1) that displays the text "Hello World".
                            </p>
                            <div style="margin-top:24px; padding:16px; background:var(--muted); border-radius:12px; font-size:12px">
                                <b>Hint:</b> Tags must be opened and then closed with a slash.
                            </div>
                        </div>
                        <div class="workspace-pane">
                            <h2>Building Blocks</h2>
                            <div class="code-assembly" id="assembly">
                                ${state.placedChips.map(c => `<div class="chip active" onclick="toggleChip('${c}')">${c}</div>`).join('')}
                            </div>
                            <div style="display:flex; gap:12px; flex-wrap:wrap">
                                ${['<h1>', 'Hello World', '</h1>', '<p>', '</div>'].map(txt => `
                                    <div class="chip" onclick="toggleChip('${txt}')">${txt}</div>
                                `).join('')}
                            </div>
                            <button class="btn-action" onclick="submitCode()">VALIDATE CODE</button>
                        </div>
                    </div>`;
            }

            return `<h2>${state.page.toUpperCase()} PAGE</h2><p>Coming soon to your profile!</p>`;
        }

        // --- 7. STABLE SEARCH LOGIC ---
        function attachSearchLogic() {
            const input = $('#courseSearch');
            if (input) {
                input.focus(); // Keep focus after render if needed
                input.oninput = (e) => {
                    const query = e.target.value.toLowerCase();
                    const cards = document.querySelectorAll('.course-card');
                    cards.forEach(card => {
                        const title = card.querySelector('h3').innerText.toLowerCase();
                        card.style.display = title.includes(query) ? 'block' : 'none';
                    });
                };
            }
        }

        render();
    </script>
</body>
</html>
