<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BG Fame Advertisers</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#080d1a;--s1:#0e1628;--s2:#121e35;--border:rgba(0,180,216,0.18);--cyan:#00b4d8;--cyan-dim:rgba(0,180,216,0.12);--navy:#1b2a5e;--navy2:#243a7a;--gold:#f59e0b;--text:#e8f4f8;--muted:#7eafc4;--danger:#ef4444;--success:#22c55e}
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}
    body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,180,216,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,180,216,0.03) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0}
    body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 50% at 50% -10%,rgba(27,42,94,0.35),transparent 70%);pointer-events:none;z-index:0}
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    .fade-up{animation:fadeUp .5s ease both}
    .spinner{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}

    /* ── SPLASH ── */
    #splash{position:fixed;inset:0;z-index:1000;background:#06060f;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;transition:opacity .5s ease,transform .5s ease}
    #splash.hide{opacity:0;pointer-events:none;transform:scale(1.04)}
    .splash-logo{display:flex;flex-direction:column;align-items:center;gap:18px;animation:splashIn .7s cubic-bezier(.34,1.56,.64,1) both}
    @keyframes splashIn{from{opacity:0;transform:translateY(24px) scale(.92)}to{opacity:1;transform:translateY(0) scale(1)}}
    @keyframes splashBar{from{width:0}to{width:100%}}
    .splash-icon{width:72px;height:72px;background:linear-gradient(135deg,rgba(0,180,216,.2),rgba(27,42,94,.3));border:1px solid rgba(0,180,216,.4);border-radius:18px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
    .splash-icon::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(to right,transparent,#00b4d8,transparent)}
    .splash-wordmark{font-family:'Syne',sans-serif;font-weight:800;font-size:26px;text-align:center;line-height:1.15}
    .splash-wordmark .w1{color:#00b4d8;font-size:22px}
    .splash-wordmark .w2{color:rgba(232,234,246,.55);font-size:11px;font-weight:500;display:block;letter-spacing:4px;text-transform:uppercase;margin-top:6px}
    .splash-bar-wrap{width:120px;height:2px;background:rgba(0,229,255,.12);border-radius:2px;overflow:hidden;margin-top:8px}
    .splash-bar{height:100%;background:linear-gradient(to right,#00b4d8,#1b2a5e);border-radius:2px;animation:splashBar 1.4s cubic-bezier(.4,0,.2,1) .3s both}
    /* ── NAV LOGO ── */
    .nav-logo-wrap{display:flex;align-items:center;gap:12px;text-decoration:none}
    .nav-logo-icon{width:54px;height:54px;background:none;border:none;overflow:hidden;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
    #app{display:flex;flex-direction:column;min-height:100vh;position:relative;z-index:1}
    .navbar{height:80px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0 24px;background:rgba(12,12,30,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);z-index:50;position:sticky;top:0}
    .nav-brand{font-family:'Syne',sans-serif;font-weight:800;font-size:26px;background:linear-gradient(120deg,#00b4d8,#4a7fc1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .nav-row{display:flex;align-items:center;gap:8px}
    .btn-back{background:transparent;border:1px solid var(--border);border-radius:8px;padding:7px 14px;color:var(--muted);font-family:inherit;font-size:13px;cursor:pointer;display:none;transition:all .2s}
    .btn-back:hover{border-color:#00b4d8;color:var(--text)}
    /* DASHBOARD */
    #dashboard{display:none;flex:1;overflow-y:auto;padding:24px 18px}
    .dash-header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:24px;flex-wrap:wrap}
    .dash-title{font-family:'Syne',sans-serif;font-size:30px;font-weight:800;line-height:1.1}
    .dash-title .hi{color:var(--muted);font-size:12px;font-weight:400;display:block;margin-bottom:4px}
    .dash-title .glow{background:linear-gradient(120deg,#00b4d8,#4a7fc1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .btn-create{background:linear-gradient(135deg,#00b4d8,#1b2a5e);color:#000;border:none;border-radius:10px;padding:11px 20px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:7px;transition:all .2s;white-space:nowrap;align-self:flex-start}
    .btn-create:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,229,255,.25)}
    .stats-row{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:24px}
    .stat-card{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:16px 18px;position:relative;overflow:hidden}
    .stat-card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px}
    .stat-card.c1::after{background:linear-gradient(to right,#00b4d8,transparent)}
    .stat-card.c2::after{background:linear-gradient(to right,#1b2a5e,transparent)}
    .stat-label{font-size:11px;color:var(--muted);margin-bottom:5px;font-weight:500}
    .stat-val{font-family:'Syne',sans-serif;font-size:28px;font-weight:800}
    .stat-val.cyan{color:#00b4d8}.stat-val.indigo{color:#4a7fc1}
    .section-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;margin-bottom:12px}
    .ads-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
    .ad-card{background:var(--s1);border:1px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;transition:all .2s;position:relative}
    .ad-card:hover{border-color:#00b4d8;transform:translateY(-2px)}
    .ad-thumb{height:100px;display:flex;align-items:center;justify-content:center;font-size:28px}
    .ad-info{padding:7px 10px;border-top:1px solid var(--border)}
    .ad-name{font-size:11px;font-weight:600;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .ad-date{font-size:10px;color:var(--muted)}
    .ad-delete{position:absolute;top:5px;right:5px;background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);border-radius:5px;width:22px;height:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:10px;color:var(--danger);opacity:0;transition:opacity .2s}
    .ad-card:hover .ad-delete{opacity:1}
    .empty-state{grid-column:1/-1;text-align:center;padding:48px 20px}
    .empty-icon{font-size:44px;margin-bottom:12px}
    .empty-state p{font-size:14px;font-weight:500;margin-bottom:5px}
    .empty-state span{font-size:12px;color:var(--muted)}
    /* EDITOR */
    #editor{display:none;flex:1;flex-direction:column;overflow:hidden}
    .editor-layout{display:grid;grid-template-columns:195px 1fr 255px;height:calc(100vh - 80px)}
    .left-panel,.right-panel{background:var(--s1);overflow-y:auto;padding:12px}
    .left-panel{border-right:1px solid var(--border)}
    .right-panel{border-left:1px solid var(--border);display:flex;flex-direction:column;gap:10px}
    .panel-label{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:7px}
    .size-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-bottom:16px}
    .size-btn{background:var(--s2);border:1px solid var(--border);border-radius:7px;padding:6px 3px;text-align:center;cursor:pointer;transition:all .2s}
    .size-btn.active{border-color:#00b4d8;background:rgba(0,180,216,.1)}
    .size-icon{display:block;font-size:13px;margin-bottom:2px}
    .size-label{font-size:9px;color:var(--muted);font-weight:600}
    .size-btn.active .size-label{color:#00b4d8}
    /* THEME PICKER */
    .theme-search{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:7px;padding:7px 10px;color:var(--text);font-family:inherit;font-size:12px;outline:none;margin-bottom:8px}
    .theme-search:focus{border-color:#00b4d8}
    .theme-search::placeholder{color:var(--muted)}
    .tpl-list{display:flex;flex-direction:column;gap:5px;max-height:none}
    .tpl-card{border-radius:7px;overflow:hidden;border:2px solid transparent;cursor:pointer;transition:all .2s;flex-shrink:0}
    .tpl-card.active{border-color:#00b4d8}
    .tpl-card:hover:not(.active){border-color:rgba(0,180,216,.3)}
    .tpl-preview{height:52px;position:relative;overflow:hidden}
    .tpl-name{font-size:10px;font-weight:600;background:var(--s2);color:var(--muted);padding:3px 7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .tpl-card.active .tpl-name{color:#00b4d8}
    .canvas-wrap{background:#030309;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
    .canvas-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.018) 1px,transparent 1px);background-size:24px 24px}
    #ad-preview{position:relative;z-index:1;box-shadow:0 20px 70px rgba(0,0,0,.9),0 0 0 1px rgba(255,255,255,.05);overflow:hidden}
    .ctrl-group{display:flex;flex-direction:column;gap:4px}
    .ctrl-label{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.7px}
    .ctrl-input{background:var(--s2);border:1px solid var(--border);border-radius:7px;padding:8px 10px;color:var(--text);font-family:inherit;font-size:12px;outline:none;resize:none;transition:border-color .2s;width:100%}
    .ctrl-input:focus{border-color:#00b4d8}
    .ctrl-input::placeholder{color:var(--muted)}
    .btn-upload{width:100%;background:var(--s2);border:1.5px dashed var(--border);border-radius:7px;padding:10px;color:var(--muted);font-family:inherit;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:all .2s}
    .btn-upload:hover{border-color:#00b4d8;color:#00b4d8}
    .img-thumb{width:100%;height:70px;object-fit:cover;border-radius:6px;display:none;margin-bottom:3px}
    .editor-actions{margin-top:auto;display:flex;flex-direction:column;gap:6px;border-top:1px solid var(--border);padding-top:10px}
    .btn-dl{width:100%;background:linear-gradient(135deg,#00b4d8,#1b2a5e);border:none;border-radius:8px;padding:11px;color:#000;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:opacity .2s}
    .btn-dl:hover{opacity:.88}
    .btn-save{width:100%;background:transparent;border:1px solid var(--border);border-radius:8px;padding:9px;color:var(--text);font-family:inherit;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:all .2s}
    .btn-save:hover{border-color:#00b4d8;color:#00b4d8}
    /* MOBILE TABS */
    .mobile-tabs{display:none;flex-direction:column;flex-shrink:0;background:var(--s1);border-top:1px solid var(--border);flex:1;overflow:hidden}
    .mobile-tab-btns{display:flex;flex-shrink:0}
    .mobile-tab-btn{flex:1;padding:9px 4px;text-align:center;font-size:10px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
    .mobile-tab-btn.active{color:#00b4d8;border-bottom-color:#00b4d8}
    .mobile-panels{flex:1;overflow:hidden;position:relative}
    .mobile-panel{display:none;height:100%;overflow-y:auto;padding:10px}
    .mobile-panel.active{display:block}
    .size-grid-h{display:flex;gap:7px;margin-bottom:12px}
    .size-grid-h .size-btn{flex:1}
    .tpl-scroll{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;margin-bottom:4px}
    .tpl-scroll::-webkit-scrollbar{height:3px}
    .tpl-scroll .tpl-card{flex-shrink:0;width:82px}
    #toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;font-size:13px;z-index:9999;opacity:0;transition:all .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap}
    #toast.show{transform:translateX(-50%) translateY(0);opacity:1}
    #toast.success{border-color:var(--success);color:var(--success)}
    #toast.error{border-color:var(--danger);color:var(--danger)}
    #toast.info{border-color:#00b4d8;color:#00b4d8}
    @media(min-width:769px){#dashboard{padding:32px 28px}.dash-title{font-size:36px}.ads-grid{grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px}.ad-delete{opacity:0}.mobile-tabs{display:none!important}}
    @media(max-width:768px){.navbar{padding:0 13px}.nav-brand{font-size:13px}#dashboard{padding:16px 13px}.dash-title{font-size:22px}.btn-create{padding:9px 14px;font-size:12px}.editor-layout{display:flex;flex-direction:column;height:calc(100vh - 80px)}.left-panel{display:none}.canvas-wrap{height:220px;flex-shrink:0}.right-panel{display:none}.mobile-tabs{display:flex}.ad-delete{opacity:1}}
  </style>
</head>

  <div class="splash-logo">
    <div class="splash-icon">
      <svg width="44" height="44" viewBox="0 0 44 44" fill="none">

</div>
