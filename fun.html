<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fun with Bhavya Goel</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
  
  <style>
    /* ── EXACT FONT STYLING REQUESTED ── */
    body {
        font-family: 'Inter', sans-serif;
    }
    h1, h2, h3, h4, .logo, .nav-links a, .btn {
        font-family: 'Space Grotesk', sans-serif;
        text-transform: uppercase;
        letter-spacing: -1px;
    }

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#050810; --bg2:#080d18;
      --surface:rgba(255,255,255,0.04);
      --cyan:#00e5ff; --violet:#7c3aed;
      --border:rgba(0,229,255,0.12);
      --text:#e8eaf2; --muted:#6b7390;
      --card:#0d1120;
      --glow:0 0 28px rgba(0,229,255,0.32);
      --glow-sm:0 0 12px rgba(0,229,255,0.2);
      --ease:cubic-bezier(0.16,1,0.3,1);
    }
    html{scroll-behavior:smooth}
    body{background:var(--bg);color:var(--text);
         font-weight:300;min-height:100vh;overflow-x:hidden;cursor:none}
    a{color:inherit;text-decoration:none}

    /* ── BLOBS ── */
    .blob{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0;opacity:.12}
    .blob-1{width:450px;height:450px;background:rgba(0,229,255,0.8);top:-120px;right:-80px;animation:blobDrift1 14s ease-in-out infinite alternate}
    .blob-2{width:350px;height:350px;background:#7c3aed;bottom:-80px;left:-60px;animation:blobDrift2 18s ease-in-out infinite alternate}
    @keyframes blobDrift1{from{transform:translate(0,0)}to{transform:translate(-40px,50px) scale(1.1)}}
    @keyframes blobDrift2{from{transform:translate(0,0)}to{transform:translate(40px,-40px) scale(1.1)}}
    /* ── CURSOR ── */
    #c-dot{position:fixed;width:8px;height:8px;background:var(--cyan);border-radius:50%;
           pointer-events:none;z-index:9999;transform:translate(-50%,-50%);
           box-shadow:0 0 10px var(--cyan),0 0 22px rgba(0,229,255,0.45);
           transition:width .18s var(--ease),height .18s var(--ease)}
    #c-ring{position:fixed;width:38px;height:38px;border:1.5px solid rgba(0,229,255,0.45);
            border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);
            transition:width .28s var(--ease),height .28s var(--ease),border-color .28s,background .28s}
    body.clicking #c-dot{width:5px;height:5px}
    body.clicking #c-ring{background:rgba(0,229,255,0.08);border-color:rgba(0,229,255,0.8)}

    /* ── NOISE ── */
    body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.5;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E")}

    /* ── MESH ── */
    .mesh{position:fixed;inset:0;z-index:0;pointer-events:none;
      background:radial-gradient(circle at 18% 28%,rgba(0,229,255,0.055) 0%,transparent 42%),
                 radial-gradient(circle at 82% 72%,rgba(124,58,237,0.065) 0%,transparent 42%)}

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar{width:3px}
    ::-webkit-scrollbar-track{background:var(--bg)}
    ::-webkit-scrollbar-thumb{background:var(--cyan);border-radius:3px}

    /* ── NAV ── */
    nav{position:fixed;top:0;left:0;right:0;z-index:200;height:68px;padding:0 8%;
        display:flex;align-items:center;justify-content:space-between;
        background:rgba(5,8,16,0.75);backdrop-filter:blur(18px);
        border-bottom:1px solid var(--border);transition:box-shadow .35s}
    nav.scrolled{box-shadow:0 4px 40px rgba(0,0,0,.65)}
    .logo{font-size:1.15rem;font-weight:700;color:var(--cyan)}
    .logo span{color:var(--text)}
    .nav-links{display:flex;gap:2rem;align-items:center}
    .nav-links a{color:var(--muted);font-size:.83rem;font-weight:700;
                 transition:color .25s;position:relative}
    .nav-links a::after{content:'';position:absolute;bottom:-4px;left:0;right:0;height:1px;
                        background:var(--cyan);transform:scaleX(0);transform-origin:left;transition:transform .25s}
    .nav-links a:hover,.nav-links a.active{color:var(--cyan)}
    .nav-links a:hover::after,.nav-links a.active::after{transform:scaleX(1)}
    .nav-cta{background:transparent !important;border:1px solid var(--border) !important;
             color:var(--cyan) !important;padding:.38rem 1.1rem;border-radius:50px}
    .nav-cta:hover{background:rgba(0,229,255,0.07) !important;box-shadow:var(--glow-sm)}
    .nav-cta::after{display:none !important}

    /* ── HERO ── */
    .hero{position:relative;z-index:1;padding:9rem 5% 3.5rem;
          text-align:center;display:flex;flex-direction:column;align-items:center}
    .hero-logo{width:120px;height:120px;border-radius:50%;object-fit:cover;
               border:2px solid rgba(0,229,255,0.3);
               box-shadow:0 0 40px rgba(0,229,255,0.18);
               margin-bottom:1.5rem;animation:fadeUp .6s ease both}
    .eyebrow{display:inline-flex;align-items:center;gap:.5rem;font-size:.73rem;font-weight:700;
             font-family: 'Space Grotesk', sans-serif; text-transform: uppercase; letter-spacing: -1px;
             color:var(--cyan);
             border:1px solid var(--border);padding:.38rem 1rem;border-radius:50px;
             margin-bottom:1rem;animation:fadeUp .7s .05s ease both}
    .eyebrow::before{content:'';width:6px;height:6px;background:var(--cyan);border-radius:50%;
                     box-shadow:0 0 6px var(--cyan)}
    h1{font-size:clamp(2.4rem,6vw,5rem);font-weight:700;line-height:1.05;
       color:#fff;animation:fadeUp .8s .1s ease both}
    h1 .outline{color:transparent;-webkit-text-stroke:1.5px var(--cyan)}
    .tags{display:flex;flex-wrap:wrap;gap:.5rem;justify-content:center;
          margin-top:1.2rem;animation:fadeUp .8s .18s ease both}
    .tag{font-size:.73rem;padding:.3rem .85rem;border-radius:50px;
         border:1px solid var(--border);color:var(--muted)}
    .actions{display:flex;gap:1rem;margin-top:1.8rem;flex-wrap:wrap;justify-content:center;
             animation:fadeUp .8s .26s ease both}
    .btn{display:inline-flex;align-items:center;gap:.4rem;padding:.72rem 1.8rem;
         border-radius:50px;font-size:.88rem;font-weight:700;transition:all .35s var(--ease);}
    .btn-primary{background:var(--cyan);color:#050810;box-shadow:0 0 20px rgba(0,229,255,0.28)}
    .btn-primary:hover{background:#fff;box-shadow:0 0 34px rgba(0,229,255,0.55);transform:translateY(-3px)}
    .btn-ghost{border:1px solid var(--border);color:var(--text)}
    .btn-ghost:hover{border-color:var(--cyan);color:var(--cyan);box-shadow:var(--glow-sm);transform:translateY(-3px)}

    /* ── SECTIONS ── */
    .section{position:relative;z-index:1;padding:3.5rem 5%;max-width:1100px;margin:0 auto}
    .sec-label{font-size:.7rem;font-weight:700;
               font-family: 'Space Grotesk', sans-serif; text-transform: uppercase; letter-spacing: -1px;
               color:var(--cyan);margin-bottom:.5rem}
    .sec-label::before{content:'// ';opacity:.5}
    .sec-title{font-size:clamp(1.6rem,3.5vw,2.4rem);
               font-weight:700;color:#fff;margin-bottom:1.6rem; font-family: 'Space Grotesk', sans-serif; text-transform: uppercase; letter-spacing: -1px;}
    .sec-bar{width:42px;height:2px;background:linear-gradient(90deg,var(--cyan),transparent);
             border-radius:2px;margin-bottom:2rem}

    /* ── CONTENT TAGS ── */
    .content-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem}
    .ctag{background:var(--surface);border:1px solid var(--border);border-radius:14px;
          padding:1.5rem 1.2rem;text-align:center;transition:transform .3s var(--ease),border-color .3s,box-shadow .3s}
    .ctag:hover{transform:translateY(-4px);border-color:rgba(0,229,255,0.3);box-shadow:var(--glow-sm)}
    .ctag-emoji{font-size:1.9rem;margin-bottom:.65rem;display:block}
    .ctag-name{font-weight:700;font-size:.95rem;color:#fff; font-family: 'Space Grotesk', sans-serif; text-transform: uppercase; letter-spacing: -1px;}

    /* ── VIDEO GRID ── */
    .vid-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.3rem}
    .vid-card{background:var(--card);border:1px solid var(--border);border-radius:16px;
              overflow:hidden;transition:transform .3s var(--ease),border-color .3s,box-shadow .3s;cursor:none}
    .vid-card:hover{transform:translateY(-4px);border-color:rgba(0,229,255,0.3);
                    box-shadow:var(--glow),0 16px 40px rgba(0,0,0,.5)}
    .vid-card.playing{border-color:var(--cyan) !important;
                      box-shadow:0 0 0 2px rgba(0,229,255,0.25),0 20px 50px rgba(0,0,0,.7) !important;
                      transform:none !important}
    .v-thumb{position:relative;aspect-ratio:16/9;overflow:hidden;background:#0a0a14}
    .v-thumb img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s}
    .vid-card:hover .v-thumb img{transform:scale(1.04)}
    .play-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
                  background:rgba(0,0,0,.45);transition:background .25s}
    .vid-card:hover .play-overlay{background:rgba(0,0,0,.18)}
    .play-btn{width:52px;height:52px;background:var(--cyan);border-radius:50%;
              display:flex;align-items:center;justify-content:center;
              box-shadow:0 4px 22px rgba(0,229,255,0.45);transition:transform .2s}
    .vid-card:hover .play-btn{transform:scale(1.1)}
    .play-btn svg{width:20px;height:20px;fill:#050810;margin-left:4px}
    .v-player{display:none;aspect-ratio:16/9;background:#000}
    .v-player iframe{width:100%;height:100%;border:none;display:block}
    .vid-card.playing .v-thumb{display:none}
    .vid-card.playing .v-player{display:block}
    .v-info{padding:.8rem 1rem}
    .v-title{font-size:.82rem;font-weight:500;color:var(--text);line-height:1.4}

    /* ── FOOTER ── */
    footer{position:relative;z-index:1;padding:2.2rem 8%;text-align:center;
           font-size:.8rem;color:var(--muted);border-top:1px solid var(--border)}
    footer span{color:var(--cyan)}

    /* ── ANIMATIONS ── */
    @keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:none}}
    .reveal{opacity:0;transform:translateY(18px);transition:opacity .65s ease,transform .65s ease}
    .reveal.v{opacity:1;transform:none}

    @media(max-width:700px){
      nav{padding:0 5%}
      .nav-links a:not(.nav-cta){display:none}
    }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div id="c-dot"></div>
  <div id="c-ring"></div>
  <div class="mesh"></div>

  <nav id="navbar">
    <div class="logo">BHAVYA<span>.GOEL</span></div>
    <div class="nav-links">
      <a href="fun.html" class="active">Fun</a>
      <a href="knowledge.html">Knowledge</a>
      <a href="portfolio.html" class="nav-cta">Portfolio</a>
    </div>
  </nav>

  <div class="hero">
    <img class="hero-logo"
      src="https://i.ibb.co/F1Xw9sM/Chat-GPT-Image-Mar-6-2026-at-02-27-30-PM.png"
      alt="Fun with Bhavya Goel" referrerpolicy="no-referrer"/>
    <div class="eyebrow">YouTube Channel</div>
    <h1>Fun with<br/><span class="outline">Bhavya Goel</span></h1>
    <div class="tags">
      <span class="tag">Fun</span><span class="tag">Enjoy</span>
      <span class="tag">Travel</span><span class="tag">Singing</span>
      <span class="tag">Vlogs</span><span class="tag">Memories</span>
    </div>
    <div class="actions">
      <a href="https://www.youtube.com/@funwiththetalent" target="_blank" class="btn btn-primary">▶ Subscribe on YouTube</a>
      <a href="https://www.instagram.com/funwithbhavyagoel_7913/" target="_blank" class="btn btn-ghost">📸 Instagram</a>
    </div>
  </div>

  <section class="section">
    <p class="sec-label reveal">What I share</p>
    <h2 class="sec-title reveal">Content</h2>
    <div class="sec-bar reveal"></div>
    <div class="content-grid">
      <div class="ctag reveal"><span class="ctag-emoji">🎵</span><h3 class="ctag-name">Singing</h3></div>
      <div class="ctag reveal" style="transition-delay:.07s"><span class="ctag-emoji">🎥</span><h3 class="ctag-name">Vlogs</h3></div>
      <div class="ctag reveal" style="transition-delay:.14s"><span class="ctag-emoji">✈️</span><h3 class="ctag-name">Travel</h3></div>
      <div class="ctag reveal" style="transition-delay:.21s"><span class="ctag-emoji">📸</span><h3 class="ctag-name">Memories</h3></div>
    </div>
  </section>

  <section class="section" style="padding-top:0;background:var(--bg2);max-width:100%;padding-left:8%;padding-right:8%">
    <div style="max-width:1100px;margin:0 auto">
      <p class="sec-label reveal">Watch</p>
      <h2 class="sec-title reveal">My Videos</h2>
      <div class="sec-bar reveal"></div>
      <div class="vid-grid" id="vidGrid"></div>
    </div>
  </section>

  <footer><p>© 2026 <span>Bhavya Goel</span> | All Rights Reserved</p></footer>

  <script>
  /* ── CURSOR ── */
  (function(){
    var dot=document.getElementById('c-dot'), ring=document.getElementById('c-ring');
    var mx=window.innerWidth/2, my=window.innerHeight/2, rx=mx, ry=my;
    document.addEventListener('mousemove',function(e){
      mx=e.clientX; my=e.clientY;
      dot.style.left=mx+'px'; dot.style.top=my+'px';
    });
    (function lerp(){
      rx+=(mx-rx)*0.13; ry+=(my-ry)*0.13;
      ring.style.left=rx+'px'; ring.style.top=ry+'px';
      requestAnimationFrame(lerp);
    })();
    function grow(){ring.style.width='58px';ring.style.height='58px';ring.style.borderColor='rgba(0,229,255,0.75)'}
    function shrink(){ring.style.width='38px';ring.style.height='38px';ring.style.borderColor='rgba(0,229,255,0.45)'}
    document.querySelectorAll('a,button,.ctag,.vid-card').forEach(function(el){
      el.addEventListener('mouseenter',grow); el.addEventListener('mouseleave',shrink);
    });
    document.addEventListener('mousedown',function(){document.body.classList.add('clicking')});
    document.addEventListener('mouseup',function(){document.body.classList.remove('clicking')});
    document.addEventListener('mouseleave',function(){dot.style.opacity='0';ring.style.opacity='0'});
    document.addEventListener('mouseenter',function(){dot.style.opacity='1';ring.style.opacity='1'});
  })();

  /* ── NAV ── */
  window.addEventListener('scroll',function(){
    document.getElementById('navbar').classList.toggle('scrolled',window.scrollY>40);
  });

  /* ── VIDEOS ── */
  var VIDEOS=[
    {id:'puj2FtOyuvo',title:'Fun Video 1'},{id:'c6q3onWkzyQ',title:'Fun Video 2'},
    {id:'N8138Pf1ZJc',title:'Fun Video 3'},{id:'VtkgZtGhcKk',title:'Fun Video 4'},
    {id:'yTM-OABU77E',title:'Fun Video 5'},{id:'T9U3DQlOtwE',title:'Fun Video 6'},
    {id:'gp8-I4SJ00Y',title:'Fun Video 7'},{id:'BjNyFHuFhXA',title:'Fun Video 8'},
    {id:'d4DC77q0r3Y',title:'Fun Video 9'},{id:'fgWvIlJoQa0',title:'Fun Video 10'},
    {id:'hX3QoDpYrgA',title:'Fun Video 11'},{id:'CbHyNMvKZ64',title:'Fun Video 12'},
    {id:'yIDIiJOYOss',title:'Fun Video 13'},{id:'ECIezteoo9g',title:'Fun Video 14'},
    {id:'TmQNbnXzDIs',title:'Fun Video 15'},{id:'ZbmAJBVDTRM',title:'Fun Video 16'}
  ];
  var grid=document.getElementById('vidGrid');
  var ring_ref=document.getElementById('c-ring');
  function stopAll(){document.querySelectorAll('.vid-card.playing').forEach(function(c){c.classList.remove('playing');c.querySelector('iframe').src=''})}
  VIDEOS.forEach(function(v){
    var card=document.createElement('div'); card.className='vid-card reveal';
    card.innerHTML='<div class="v-thumb"><img src="https://i.ytimg.com/vi/'+v.id+'/hqdefault.jpg" alt="'+v.title+'" loading="lazy"/><div class="play-overlay"><div class="play-btn"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div></div></div><div class="v-player"><iframe src="" allow="autoplay;encrypted-media" allowfullscreen></iframe></div><div class="v-info"><div class="v-title">'+v.title+'</div></div>';
    card.querySelector('.v-thumb').addEventListener('click',function(){stopAll();card.querySelector('iframe').src='https://www.youtube.com/embed/'+v.id+'?autoplay=1';card.classList.add('playing');card.scrollIntoView({behavior:'smooth',block:'center'})});
    card.addEventListener('mouseenter',function(){ring_ref.style.width='58px';ring_ref.style.height='58px';ring_ref.style.borderColor='rgba(0,229,255,0.75)'});
    card.addEventListener('mouseleave',function(){ring_ref.style.width='38px';ring_ref.style.height='38px';ring_ref.style.borderColor='rgba(0,229,255,0.45)'});
    grid.appendChild(card);
    fetch('https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v='+v.id+'&format=json').then(function(r){return r.json()}).then(function(d){if(d.title)card.querySelector('.v-title').textContent=d.title}).catch(function(){});
  });

  /* ── REVEAL ── */
  (function(){
    var io=new IntersectionObserver(function(e){e.forEach(function(x){if(x.isIntersecting){x.target.classList.add('v');io.unobserve(x.target)}})},{threshold:.08});
    document.querySelectorAll('.reveal').forEach(function(el){io.observe(el)});
  })();
  </script>
</body>
</html>
