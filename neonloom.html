<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Neon Loom — Hand-Woven Light</title>
<style>
  :root{
    --cyan: #00e5ff;
    --magenta: #ff00e5;
  }
  html, body{
    margin:0; padding:0; overflow:hidden;
    background:#000;
    width:100%; height:100%;
    font-family: 'Courier New', Consolas, monospace;
  }
  /* The video element stays in the DOM (not display:none) so the browser
     keeps decoding frames, but it is invisible — we draw our own mirrored,
     stylized copy of it onto the canvas every frame. */
  #webcam{
    position:absolute;
    top:0; left:0;
    width:2px; height:2px;
    opacity:0.01;
    pointer-events:none;
  }
  canvas{ display:block; }

  #status{
    position:fixed;
    top:18px; left:18px;
    color:var(--cyan);
    font-size:12px;
    letter-spacing:2px;
    text-transform:uppercase;
    text-shadow:0 0 8px rgba(0,229,255,0.85), 0 0 2px rgba(0,229,255,0.9);
    z-index:10;
    pointer-events:none;
    transition:opacity 0.6s ease;
  }
  #status.hidden{ opacity:0; }
  #status.error{
    color:var(--magenta);
    text-shadow:0 0 8px rgba(255,0,229,0.85);
  }

  #controls{
    position:fixed; top:18px; right:18px; z-index:10;
    display:flex; gap:10px;
  }
  .ctrl-btn{
    width:42px; height:42px;
    border-radius:50%;
    border:1px solid rgba(0,229,255,0.55);
    background:rgba(4,10,18,0.55);
    color:var(--cyan);
    font-size:18px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    box-shadow:0 0 10px rgba(0,229,255,0.45), inset 0 0 8px rgba(0,229,255,0.15);
    transition:transform 0.15s ease, box-shadow 0.15s ease, opacity 0.3s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .ctrl-btn:hover, .ctrl-btn:active{
    transform:scale(1.08);
    box-shadow:0 0 16px rgba(0,229,255,0.75), inset 0 0 10px rgba(0,229,255,0.3);
  }
  .ctrl-btn:disabled{
    opacity:0.3; cursor:not-allowed; box-shadow:none;
  }
  .ctrl-btn.muted{
    border-color:rgba(255,0,229,0.55);
    color:var(--magenta);
    box-shadow:0 0 10px rgba(255,0,229,0.45);
  }
</style>
</head>
<body>

<video id="webcam" playsinline autoplay muted></video>
<div id="status">INITIALIZING CAMERA…</div>

<div id="controls">
  <button id="camSwitchBtn" class="ctrl-btn" title="Switch camera" aria-label="Switch front/back camera">⇄</button>
  <button id="muteBtn" class="ctrl-btn" title="Mute sound" aria-label="Mute sound effects">🔊</button>
</div>

<!-- p5.js -->
<script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
<!-- MediaPipe Hands -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.js"></script>

<script>
/* ============================================================
   NEON LOOM — Hand-Woven Light
   Two hands, mirrored on screen, glowing skeletons, and seven
   elastic neon threads strung between matching fingertips.
   Cyan = left hand · Magenta = right hand · Yellow = tension.
   Front/back camera switch + procedurally synthesized sound.
   ============================================================ */

// ---------- DOM ----------
const videoEl     = document.getElementById('webcam');
const statusEl    = document.getElementById('status');
const camSwitchBtn= document.getElementById('camSwitchBtn');
const muteBtn     = document.getElementById('muteBtn');

// ---------- MediaPipe / camera state ----------
let handsModel = null;
let latestResults = null;
let firstResultSeen = false;
let cameraLoopActive = false;
let currentFacing = 'user';   // 'user' = front, 'environment' = back
let mirrorEnabled = true;     // mirror only makes sense for the front camera
let statusFlashTimer = null;

// ---------- Hand smoothing state ----------
const leftHandState  = { alpha: 0, pts: null };
const rightHandState = { alpha: 0, pts: null };
const SMOOTHING = 0.4;
const FADE_IN   = 0.15;
const FADE_OUT  = 0.08;

// ---------- Finger layout (MediaPipe Hands 21-point model) ----------
const FINGER_CHAINS = [
  [0,1,2,3,4],     // thumb
  [0,5,6,7,8],     // index
  [0,9,10,11,12],  // middle
  [0,13,14,15,16], // ring
  [0,17,18,19,20]  // pinky
];
const FINGERTIPS = [4,8,12,16,20];

const STRING_PAIRS = [
  [4,4],[8,8],[12,12],[16,16],[20,20],
  [4,20],[20,4]
];
const stringStates = STRING_PAIRS.map(() => ({ prevDist: null, vibe: 0, lastPluck: -9999 }));

// ---------- Color palette ----------
let palette;
let vignette;

// ============================================================
// Audio — procedural Web Audio synthesis, no external assets
// ============================================================
let audioCtx = null;
let masterGain = null;
let droneGain = null;
let isMuted = false;
const SAVED_VOLUME = 0.55;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  masterGain = audioCtx.createGain();
  masterGain.gain.value = isMuted ? 0 : SAVED_VOLUME;
  masterGain.connect(audioCtx.destination);

  // Subtle ambient drone that swells slightly when hands are present.
  const d1 = audioCtx.createOscillator();
  const d2 = audioCtx.createOscillator();
  d1.type = 'sine'; d1.frequency.value = 110;
  d2.type = 'sine'; d2.frequency.value = 110 * 1.5;
  const droneFilter = audioCtx.createBiquadFilter();
  droneFilter.type = 'lowpass';
  droneFilter.frequency.value = 800;
  droneGain = audioCtx.createGain();
  droneGain.gain.value = 0;
  d1.connect(droneFilter);
  d2.connect(droneFilter);
  droneFilter.connect(droneGain);
  droneGain.connect(masterGain);
  d1.start();
  d2.start();
}

function unlockAudio() {
  initAudio();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
window.addEventListener('pointerdown', unlockAudio);
window.addEventListener('keydown', unlockAudio);

function playPluck(tension) {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  const freq = 220 + tension * 440; // tighter string -> higher pitch
  const osc = audioCtx.createOscillator();
  osc.type = 'triangle';
  osc.frequency.value = freq;
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(0.0001, now);
  gain.gain.exponentialRampToValueAtTime(0.22, now + 0.005);
  gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.35);
  osc.connect(gain);
  gain.connect(masterGain);
  osc.start(now);
  osc.stop(now + 0.4);
}

function playChime(rising) {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(rising ? 440 : 660, now);
  osc.frequency.exponentialRampToValueAtTime(rising ? 880 : 330, now + 0.25);
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(0.0001, now);
  gain.gain.exponentialRampToValueAtTime(0.16, now + 0.03);
  gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.4);
  osc.connect(gain);
  gain.connect(masterGain);
  osc.start(now);
  osc.stop(now + 0.45);
}

function playClick() {
  if (!audioCtx) return;
  const now = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  osc.type = 'square';
  osc.frequency.value = 1200;
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(0.12, now);
  gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.08);
  osc.connect(gain);
  gain.connect(masterGain);
  osc.start(now);
  osc.stop(now + 0.1);
}

muteBtn.addEventListener('click', () => {
  unlockAudio();
  isMuted = !isMuted;
  if (masterGain) masterGain.gain.value = isMuted ? 0 : SAVED_VOLUME;
  muteBtn.textContent = isMuted ? '🔇' : '🔊';
  muteBtn.classList.toggle('muted', isMuted);
});

// ============================================================
// p5 lifecycle
// ============================================================
function setup() {
  pixelDensity(1);
  createCanvas(windowWidth, windowHeight);
  textFont('Courier New');

  palette = {
    left:  { joint: color(0, 220, 255),  tip: color(150, 255, 255) },
    right: { joint: color(255, 0, 220),  tip: color(255, 160, 255) },
    tensionLow:  color(0, 255, 255),
    tensionMid:  color(255, 0, 255),
    tensionHigh: color(255, 225, 30)
  };

  buildVignette();
  initHandTracking();
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
  buildVignette();
}

function draw() {
  background(0);
  drawVideoCover();
  drawDarkAtmosphere();
  updateHandStates();
  drawHand(leftHandState,  palette.left);
  drawHand(rightHandState, palette.right);
  if (leftHandState.alpha > 0.05 && rightHandState.alpha > 0.05) {
    drawCradleStrings();
  }
  updateDrone();
  drawIdleHint();
  drawCornerMark();
}

function updateDrone() {
  if (!droneGain) return;
  const presence = (leftHandState.alpha + rightHandState.alpha) / 2;
  const target = 0.05 * presence;
  droneGain.gain.value = lerp(droneGain.gain.value, target, 0.05);
}

// ============================================================
// Camera setup, manual getUserMedia + frame pump (supports switching)
// ============================================================
function initHandTracking() {
  if (typeof Hands === 'undefined') {
    setStatus('HAND-TRACKING LIBRARY FAILED TO LOAD — CHECK CONNECTION', true);
    return;
  }

  handsModel = new Hands({
    locateFile: (file) =>
      `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/${file}`
  });

  handsModel.setOptions({
    maxNumHands: 2,
    modelComplexity: 1,
    minDetectionConfidence: 0.7,
    minTrackingConfidence: 0.6
  });

  handsModel.onResults((results) => {
    latestResults = results;
    if (!firstResultSeen) {
      firstResultSeen = true;
      setStatus('', false, true);
    }
  });

  startCameraStream('user')
    .then(() => {
      cameraLoopActive = true;
      requestAnimationFrame(pumpFrames);
      checkMultipleCameras();
    })
    .catch((err) => {
      console.error(err);
      setStatus('CAMERA ACCESS DENIED — ALLOW CAMERA PERMISSIONS AND RELOAD', true);
    });
}

async function startCameraStream(facingMode) {
  const constraints = {
    video: {
      facingMode: { ideal: facingMode },
      width: { ideal: 1280 },
      height: { ideal: 720 }
    },
    audio: false
  };
  const stream = await navigator.mediaDevices.getUserMedia(constraints);
  if (videoEl.srcObject) {
    videoEl.srcObject.getTracks().forEach((t) => t.stop());
  }
  videoEl.srcObject = stream;
  await videoEl.play();
  currentFacing = facingMode;
  mirrorEnabled = facingMode === 'user';
}

async function pumpFrames() {
  if (cameraLoopActive && videoEl.readyState >= 2 && handsModel) {
    try {
      await handsModel.send({ image: videoEl });
    } catch (e) { /* transient decode errors are safe to ignore */ }
  }
  requestAnimationFrame(pumpFrames);
}

async function switchCamera() {
  playClick();
  const newFacing = currentFacing === 'user' ? 'environment' : 'user';
  try {
    await startCameraStream(newFacing);
  } catch (err) {
    console.error(err);
    flashStatus('NO SECOND CAMERA AVAILABLE ON THIS DEVICE', true);
  }
}

async function checkMultipleCameras() {
  try {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const cams = devices.filter((d) => d.kind === 'videoinput');
    if (cams.length <= 1) {
      camSwitchBtn.disabled = true;
      camSwitchBtn.title = 'Only one camera detected';
      camSwitchBtn.style.opacity = 0.35;
    }
  } catch (e) { /* leave the button enabled as a safe fallback */ }
}

camSwitchBtn.addEventListener('click', () => {
  unlockAudio();
  switchCamera();
});

function setStatus(text, isError = false, hide = false) {
  statusEl.textContent = text;
  statusEl.classList.toggle('error', isError);
  statusEl.classList.toggle('hidden', hide);
}

function flashStatus(text, isError = true, durationMs = 2200) {
  clearTimeout(statusFlashTimer);
  setStatus(text, isError, false);
  statusFlashTimer = setTimeout(() => setStatus('', false, true), durationMs);
}

// ============================================================
// Video draw (mirrored when front-facing, "cover" fit, no letterboxing)
// ============================================================
function computeCoverRect(srcW, srcH, dstW, dstH) {
  const srcRatio = srcW / srcH;
  const dstRatio = dstW / dstH;
  let sx, sy, sw, sh;
  if (srcRatio > dstRatio) {
    sh = srcH; sw = srcH * dstRatio; sy = 0; sx = (srcW - sw) / 2;
  } else {
    sw = srcW; sh = srcW / dstRatio; sx = 0; sy = (srcH - sh) / 2;
  }
  return { sx, sy, sw, sh };
}

function drawVideoCover() {
  const srcW = videoEl.videoWidth, srcH = videoEl.videoHeight;
  if (!srcW || !srcH) return;
  const cover = computeCoverRect(srcW, srcH, width, height);
  drawingContext.save();
  if (mirrorEnabled) {
    drawingContext.translate(width, 0);
    drawingContext.scale(-1, 1);
  }
  drawingContext.drawImage(
    videoEl,
    cover.sx, cover.sy, cover.sw, cover.sh,
    0, 0, width, height
  );
  drawingContext.restore();
}

function drawDarkAtmosphere() {
  noStroke();
  fill(4, 8, 16, 110);
  rect(0, 0, width, height);
  if (vignette) image(vignette, 0, 0);
}

function buildVignette() {
  vignette = createGraphics(width, height);
  const ctx = vignette.drawingContext;
  const grad = ctx.createRadialGradient(
    width / 2, height / 2, Math.min(width, height) * 0.18,
    width / 2, height / 2, Math.max(width, height) * 0.72
  );
  grad.addColorStop(0, 'rgba(0,0,0,0)');
  grad.addColorStop(1, 'rgba(0,0,0,0.82)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, width, height);
}

// ============================================================
// Landmark mapping + hand-side assignment
// ============================================================
function landmarkToScreen(lm, srcW, srcH, cover) {
  const px = lm.x * srcW, py = lm.y * srcH;
  const rx = (px - cover.sx) / cover.sw;
  const ry = (py - cover.sy) / cover.sh;
  const dx = rx * width, dy = ry * height;
  const x = mirrorEnabled ? (width - dx) : dx;
  return { x, y: dy };
}

function updateHandStates() {
  const srcW = videoEl.videoWidth, srcH = videoEl.videoHeight;
  const lm = (latestResults && latestResults.multiHandLandmarks) || [];

  if (srcW && srcH && lm.length > 0) {
    const cover = computeCoverRect(srcW, srcH, width, height);
    const handsScreen = lm.map((landmarks) =>
      landmarks.map((p) => landmarkToScreen(p, srcW, srcH, cover))
    );
    handsScreen.sort((a, b) => a[0].x - b[0].x); // leftmost on screen first

    const leftPts  = handsScreen[0] || null;
    const rightPts = handsScreen[1] || null;

    leftPts  ? growHand(leftHandState, leftPts)   : shrinkHand(leftHandState);
    rightPts ? growHand(rightHandState, rightPts) : shrinkHand(rightHandState);
  } else {
    shrinkHand(leftHandState);
    shrinkHand(rightHandState);
  }
}

function growHand(state, targetPts) {
  if (!state.pts) {
    state.pts = targetPts.map((p) => ({ x: p.x, y: p.y }));
  } else {
    for (let i = 0; i < 21; i++) {
      state.pts[i].x = lerp(state.pts[i].x, targetPts[i].x, SMOOTHING);
      state.pts[i].y = lerp(state.pts[i].y, targetPts[i].y, SMOOTHING);
    }
  }
  const before = state.alpha;
  state.alpha = lerp(state.alpha, 1, FADE_IN);
  if (before < 0.5 && state.alpha >= 0.5) playChime(true);
}

function shrinkHand(state) {
  const before = state.alpha;
  state.alpha = lerp(state.alpha, 0, FADE_OUT);
  if (state.alpha < 0.01) state.alpha = 0;
  if (before >= 0.5 && state.alpha < 0.5) playChime(false);
}

// ============================================================
// Drawing: per-hand skeleton + glowing joints
// ============================================================
function rgbaStr(c, alphaMul = 1) {
  return `rgba(${red(c)},${green(c)},${blue(c)},${(alpha(c) / 255) * alphaMul})`;
}

function drawHand(state, pal) {
  if (!state.pts || state.alpha < 0.01) return;
  const a = state.alpha;
  drawSkeleton(state.pts, pal.joint, a);
  for (let i = 0; i < 21; i++) {
    const isTip = FINGERTIPS.includes(i);
    drawJointGlow(state.pts[i], isTip ? pal.tip : pal.joint, isTip ? 7 : 4.2, a);
  }
}

function drawSkeleton(pts, baseColor, a) {
  drawingContext.save();
  drawingContext.shadowBlur = 5;
  drawingContext.shadowColor = rgbaStr(baseColor, 0.5);
  stroke(red(baseColor), green(baseColor), blue(baseColor), 75 * a);
  strokeWeight(1.4);
  noFill();
  FINGER_CHAINS.forEach((chain) => {
    beginShape();
    chain.forEach((idx) => vertex(pts[idx].x, pts[idx].y));
    endShape();
  });
  drawingContext.restore();
}

function drawJointGlow(p, col, r, a) {
  drawingContext.save();
  drawingContext.shadowBlur = 18;
  drawingContext.shadowColor = rgbaStr(col, 0.9 * a);
  noStroke();
  fill(red(col), green(col), blue(col), 205 * a);
  ellipse(p.x, p.y, r * 2, r * 2);
  fill(255, 255, 255, 175 * a);
  ellipse(p.x, p.y, r * 0.85, r * 0.85);
  drawingContext.restore();
}

// ============================================================
// Drawing: elastic cradle strings between fingertips
// ============================================================
function drawCradleStrings() {
  const diag = Math.hypot(width, height);
  const maxDist = diag * 0.45;
  const minDist = 50;
  const alphaMul = Math.min(leftHandState.alpha, rightHandState.alpha);
  const t = millis() / 1000;

  STRING_PAIRS.forEach((pair, i) => {
    const p1 = leftHandState.pts[pair[0]];
    const p2 = rightHandState.pts[pair[1]];
    const d = Math.hypot(p2.x - p1.x, p2.y - p1.y);

    const st = stringStates[i];
    if (st.prevDist == null) st.prevDist = d;
    const delta = Math.abs(d - st.prevDist);
    st.prevDist = d;
    const boost = Math.min(delta * 1.8, 22);
    st.vibe = Math.min(st.vibe * 0.90 + boost * 0.6, 26);

    const tension = constrain(map(d, minDist, maxDist, 0, 1), 0, 1);

    if (boost > 5 && millis() - st.lastPluck > 130) {
      playPluck(tension);
      st.lastPluck = millis();
    }

    const col = tension < 0.5
      ? lerpColor(palette.tensionLow, palette.tensionMid, tension * 2)
      : lerpColor(palette.tensionMid, palette.tensionHigh, (tension - 0.5) * 2);
    const thickness = map(tension, 0, 1, 5.5, 1.4);
    const colA = color(red(col), green(col), blue(col), 235 * alphaMul);

    drawElasticString(p1, p2, colA, thickness, st.vibe, tension, t);
  });
}

function drawElasticString(p1, p2, colA, thickness, vibeAmp, tension, time) {
  const dx = p2.x - p1.x, dy = p2.y - p1.y;
  const len = Math.hypot(dx, dy) || 1;
  const nx = -dy / len, ny = dx / len;
  const segments = 16;

  const pts = [];
  for (let i = 0; i <= segments; i++) {
    const u = i / segments;
    const bx = lerp(p1.x, p2.x, u), by = lerp(p1.y, p2.y, u);
    const envelope = Math.sin(Math.PI * u);
    const wave = Math.sin(u * Math.PI * 7 + time * 9) * vibeAmp * envelope;
    pts.push({ x: bx + nx * wave, y: by + ny * wave });
  }

  drawingContext.save();
  drawingContext.shadowBlur = 12 + tension * 16;
  drawingContext.shadowColor = rgbaStr(colA, 0.9);
  stroke(colA);
  strokeWeight(thickness);
  noFill();
  beginShape();
  pts.forEach((p) => vertex(p.x, p.y));
  endShape();
  drawingContext.restore();

  stroke(255, 255, 255, alpha(colA) * 0.55);
  strokeWeight(Math.max(thickness * 0.3, 0.6));
  noFill();
  beginShape();
  pts.forEach((p) => vertex(p.x, p.y));
  endShape();
}

// ============================================================
// Idle hint + corner mark
// ============================================================
function drawIdleHint() {
  const bothGone = leftHandState.alpha < 0.05 && rightHandState.alpha < 0.05;
  if (!bothGone) return;
  const pulse = 0.6 + 0.4 * Math.sin(millis() / 600);
  drawingContext.save();
  drawingContext.shadowBlur = 16;
  drawingContext.shadowColor = 'rgba(0,229,255,0.85)';
  noStroke();
  fill(150, 235, 255, 150 * pulse);
  textAlign(CENTER, CENTER);
  textSize(15);
  text('RAISE BOTH HANDS INTO FRAME TO WEAVE THE LOOM', width / 2, height - 56);
  drawingContext.restore();
}

function drawCornerMark() {
  noStroke();
  fill(150, 220, 255, 90);
  textAlign(RIGHT, BOTTOM);
  textSize(11);
  text('NEON LOOM // HAND-WOVEN LIGHT', width - 18, height - 18);
}
</script>
</body>
</html>
